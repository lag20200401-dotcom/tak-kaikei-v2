<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ж•ҙдҪ“йҷўTAK зөҢе–¶з®ЎзҗҶ v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
<!-- v0.5: SheetJS + JSZip -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
  .tab-active { background:#0f766e; color:white; }
  .tab-inactive { background:#f1f5f9; color:#334155; }
  .tab-inactive:hover { background:#e2e8f0; }
  /* гӮӘгғјгғҲгӮігғігғ—гғӘгғјгғҲеҖҷиЈңгғӘгӮ№гғҲ */
  .suggest-list {
    max-height: 200px;
    overflow-y: auto;
  }
</style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="app()" x-init="init()" x-cloak>

<!-- ===== гғӯгғғгӮҜз”»йқў ===== -->
<template x-if="!unlocked">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="text-2xl font-bold text-slate-800">ж•ҙдҪ“йҷўTAK</div>
        <div class="text-sm text-slate-500 mt-1">зөҢе–¶з®ЎзҗҶ v2</div>
      </div>
      <input type="password" x-model="passcodeInput" @keyup.enter="tryUnlock()"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-center text-2xl tracking-widest"
        placeholder="гғ‘гӮ№гӮігғјгғү" maxlength="4">
      <button @click="tryUnlock()"
        class="w-full mt-4 bg-teal-700 hover:bg-teal-800 text-white font-medium py-3 rounded-lg">
        е…ҘгӮӢ
      </button>
      <div x-show="lockError" class="text-red-500 text-sm text-center mt-3" x-text="lockError"></div>
    </div>
  </div>
</template>

<!-- ===== гғЎгӮӨгғіз”»йқў ===== -->
<template x-if="unlocked">
<div>

<!-- гғҳгғғгғҖгғј -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <span class="font-bold text-slate-800">ж•ҙдҪ“йҷўTAK</span>
      <span class="text-slate-400 mx-2">/</span>
      <span class="text-sm text-slate-600">зөҢе–¶з®ЎзҗҶ v2</span>
      <span class="text-xs text-teal-600 ml-2 font-medium">v0.9.5</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs px-2 py-1 rounded"
            :class="cloudStatus==='жҺҘз¶ҡдёӯ' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
            x-text="'вҳҒ ' + cloudStatus"></span>
      <button @click="lock()" class="text-sm text-slate-500 hover:text-slate-800">гғӯгғғгӮҜ</button>
    </div>
  </div>

  <!-- гӮҝгғ– -->
  <div class="max-w-6xl mx-auto px-4 pb-2">
    <div class="flex gap-1 overflow-x-auto">
      <template x-for="t in tabs" :key="t.id">
        <button @click="currentTab = t.id"
          :class="currentTab === t.id ? 'tab-active' : 'tab-inactive'"
          class="px-4 py-2 rounded-t-lg text-sm font-medium whitespace-nowrap relative">
          <span x-text="t.label"></span>
          <!-- рҹҶ• v0.5: жңҲжң«еҮәеҠӣгӮҝгғ–гҒ®жңӘеҮәеҠӣгғҗгғғгӮё -->
          <span x-show="t.id === 'export' && pendingExports.length > 0"
                class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"
                x-text="pendingExports.length"></span>
        </button>
      </template>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto p-4">

  <!-- ====== гғҖгғғгӮ·гғҘгғңгғјгғү ====== -->
  <section x-show="currentTab==='dashboard'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-2">гғҖгғғгӮ·гғҘгғңгғјгғү</h2>
      <p class="text-sm text-slate-500">жә–еӮҷдёӯ</p>
      <p class="text-sm text-slate-500 mt-1">жқҘйҷўгғ»зү©иІ©гғ»зөҢиІ»гҒ®еҗҲиЁҲгӮөгғһгғӘгҒЁгҖҒжңӘе®ҢдәҶгӮўгғ©гғјгғҲгӮ’иЎЁзӨәдәҲе®ҡ</p>
    </div>
  </section>

  <!-- ====== жқҘйҷўиЁҳйҢІ ====== -->
  <section x-show="currentTab==='visits'" class="space-y-4">

    <!-- е…ҘеҠӣгғ•гӮ©гғјгғ  -->
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-slate-800">жқҘйҷўиЁҳйҢІ</h2>
        <div class="text-xs text-slate-400" x-text="'жң¬ж—Ҙ: ' + todayStr()"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
        <!-- ж—Ҙд»ҳ -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">ж—Ҙд»ҳ *</label>
          <input type="date" x-model="visitForm.date"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- йЎ§е®ўеҗҚ(гӮӘгғјгғҲгӮігғігғ—гғӘгғјгғҲ) -->
        <div class="md:col-span-3 relative">
          <label class="block text-xs text-slate-600 mb-1">йЎ§е®ўеҗҚ *</label>
          <input type="text" x-model="visitForm.customerName"
            @input="onCustomerInput()"
            @focus="showSuggest = true"
            @blur="setTimeout(() => showSuggest = false, 200)"
            placeholder="йЎ§е®ўеҗҚгӮ’е…ҘеҠӣ"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" autocomplete="off">
          <!-- гӮөгӮёгӮ§гӮ№гғҲ -->
          <div x-show="showSuggest && filteredCustomers.length > 0"
               class="suggest-list absolute z-20 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-lg">
            <template x-for="c in filteredCustomers" :key="c.id">
              <button @mousedown.prevent="selectCustomer(c)"
                class="block w-full text-left px-3 py-2 hover:bg-teal-50 text-sm">
                <span x-text="c.name"></span>
                <span x-show="c.visitCount" class="text-xs text-slate-400 ml-2"
                      x-text="'(' + c.visitCount + 'еӣһ)'"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- рҹҶ• v0.9.3: дҝқжңүеҲёгғ»гӮөгғ–гӮ№гӮҜгғҗгғҠгғј + жқҘйҷўеұҘжӯҙ(йЎ§е®ўеҗҚйҒёжҠһжҷӮгҒ«иЎЁзӨә) -->
        <div x-show="visitForm.customerName && visitForm.customerName.trim()"
             class="md:col-span-12 -mt-2 space-y-1.5">

          <!-- гғҗгғҠгғјиЎҢ(дҝқжңүеҲёгғ»гӮөгғ–гӮ№гӮҜ) -->
          <div class="flex flex-wrap gap-1.5 text-xs">
            <template x-for="t in getActiveTicketsForCustomer(visitForm.customerName)" :key="'banner-tk-' + t.id">
              <span class="inline-flex items-center gap-1 px-2 py-1 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded">
                рҹҺҹпёҸ <span x-text="t.ticketType"></span>
                ж®Ӣ<span class="font-bold" x-text="t.remainingCount"></span>еӣһ
              </span>
            </template>
            <template x-for="s in subscriptions.filter(s => s.status === 'active' && s.customerName === (visitForm.customerName || '').trim())" :key="'banner-sb-' + s.id">
              <span class="inline-flex items-center gap-1 px-2 py-1 bg-purple-50 border border-purple-200 text-purple-800 rounded">
                рҹ’і <span x-text="s.paymentMethod"></span>
                <span class="font-bold" x-text="s.units + 'еҸЈ'"></span>
              </span>
            </template>
          </div>
          <!-- еұҘжӯҙгғҳгғғгғҖгғјиЎҢ(еүҚеӣһжқҘйҷўж—Ҙ + еұ•й–ӢгғңгӮҝгғі) -->
          <div x-show="getCustomerVisitHistory(visitForm.customerName).length > 0"
               class="flex items-center gap-2 text-xs text-slate-600">
            <span class="inline-flex items-center gap-1">
              рҹ“… еүҚеӣһ
              <span class="font-medium" x-text="formatDateWithWeekday(getCustomerVisitHistory(visitForm.customerName)[0]?.date || '')"></span>
              <span class="text-slate-500" x-text="formatDaysAgo(getCustomerVisitHistory(visitForm.customerName)[0]?.date || '')"></span>
            </span>
            <button type="button"
                    @click="visitHistoryOpen = !visitHistoryOpen"
                    class="text-teal-700 hover:underline">
              <span x-show="!visitHistoryOpen">в–ј еұҘжӯҙ</span>
              <span x-show="visitHistoryOpen">в–І й–үгҒҳгӮӢ</span>
            </button>
          </div>

          <!-- еұҘжӯҙгғҶгғјгғ–гғ«(еұ•й–ӢжҷӮгҒ®гҒҝиЎЁзӨә) -->
          <div x-show="visitHistoryOpen && getCustomerVisitHistory(visitForm.customerName).length > 0"
               class="border border-slate-200 rounded overflow-hidden">
            <table class="w-full text-xs">
              <thead class="bg-slate-100 text-slate-600">
                <tr>
                  <th class="px-2 py-1 text-left">ж—Ҙд»ҳ</th>
                  <th class="px-2 py-1 text-left">гғЎгғӢгғҘгғј</th>
                  <th class="px-2 py-1 text-right">йҮ‘йЎҚ</th>
                  <th class="px-2 py-1 text-left">жӢ…еҪ“</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="h in getCustomerVisitHistory(visitForm.customerName)" :key="'hist-' + h.id">
                  <tr class="border-t border-slate-100">
                    <td class="px-2 py-1 whitespace-nowrap" x-text="formatDateWithWeekday(h.date)"></td>
                    <td class="px-2 py-1" x-text="h.menu"></td>
                    <td class="px-2 py-1 text-right text-slate-600" x-text="(h.amount > 0) ? ('ВҘ' + h.amount.toLocaleString()) : '-'"></td>
                    <td class="px-2 py-1 text-slate-600" x-text="h.staff"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

        </div>
        
       <!-- гғЎгғӢгғҘгғј(гғ—гғ«гғҖгӮҰгғі+иҮӘз”ұе…ҘеҠӣгғҸгӮӨгғ–гғӘгғғгғү) v0.6.5 -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">гғЎгғӢгғҘгғј *</label>
          <select @change="applyMenuPreset($event.target.value); $event.target.value=''"
            class="w-full px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-teal-50 mb-1 cursor-pointer">
            <option value="">рҹ“Ӣ гғ—гғӘгӮ»гғғгғҲгҒӢгӮүйҒёжҠһ...</option>
            <template x-for="preset in MENU_PRESETS" :key="preset.name">
              <option :value="preset.name" x-text="preset.amount !== null ? (preset.name + ' (ВҘ' + preset.amount.toLocaleString() + ')') : (preset.name + ' (йҮ‘йЎҚе…ҘеҠӣ)')"></option>
            </template>
          </select>
          <input type="text" x-model="visitForm.menu"
            placeholder="дҫӢ: ж•ҙдҪ“60еҲҶ / еӣһж•°еҲёж¶ҲеҢ–"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
        <!-- йҮ‘йЎҚ -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">йҮ‘йЎҚ(еҶҶ)</label>
          <input type="number" x-model.number="visitForm.amount" placeholder="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- жӢ…еҪ“иҖ… -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">жӢ…еҪ“иҖ… *</label>
          <select x-model="visitForm.staff"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="s in staffList" :key="s">
              <option :value="s" x-text="s"></option>
            </template>
          </select>
        </div>

        <!-- ж”Ҝжү•ж–№жі• -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">ж”Ҝжү•ж–№жі• *</label>
          <select x-model="visitForm.paymentMethod"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="p in paymentMethods" :key="p">
              <option :value="p" x-text="p"></option>
            </template>
          </select>
        </div>

        <!-- иҮӘеӢ•еҲӨе®ҡ: cashbookCategory -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">еҢәеҲҶ(иҮӘеӢ•еҲӨе®ҡ)</label>
          <div class="px-3 py-2 bg-slate-100 rounded-lg text-sm text-slate-700"
               x-text="autoCategory()"></div>
        </div>

        <!-- еӮҷиҖғ -->
        <div class="md:col-span-6">
          <label class="block text-xs text-slate-600 mb-1">еӮҷиҖғ</label>
          <input type="text" x-model="visitForm.note" placeholder="д»»ж„Ҹ"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- рҹҶ• v0.9.4 (гғ•гӮ§гғјгӮә1-2): зү©иІ©(д»»ж„Ҹ) -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">
            зү©иІ©йҮ‘йЎҚ <span class="text-slate-400">(д»»ж„Ҹ)</span>
          </label>
          <input type="number" x-model.number="visitForm.retailAmount" placeholder="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
        <div class="md:col-span-9">
          <label class="block text-xs text-slate-600 mb-1">
            зү©иІ©гғЎгғў <span class="text-slate-400">(д»»ж„Ҹ)</span>
          </label>
          <input type="text" x-model="visitForm.retailMemo" placeholder="дҫӢ: NMNГ—1, TeraVitaГ—2"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
      </div>

      <!-- дҝқеӯҳгғңгӮҝгғі -->
      <div class="flex justify-end gap-2 mt-4">
        <button @click="resetVisitForm()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">гӮҜгғӘгӮў</button>
        <button @click="saveVisit()" :disabled="!canSaveVisit() || saving"
          class="px-5 py-2 bg-teal-700 hover:bg-teal-800 disabled:bg-slate-300 text-white text-sm font-medium rounded-lg">
          <span x-show="!saving" x-text="visitForm.id ? 'жӣҙж–°' : 'дҝқеӯҳ'"></span>
          <span x-show="saving">дҝқеӯҳдёӯ...</span>
        </button>
      </div>

      <div x-show="visitMessage" class="mt-3 text-sm"
           :class="visitMessageType==='ok' ? 'text-emerald-600' : 'text-red-500'"
           x-text="visitMessage"></div>
    </div>

    <!-- жңҲеҲҘгғ•гӮЈгғ«гӮҝ -->
    <div class="bg-white rounded-xl shadow p-4 flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-600">иЎЁзӨәжңҲ:</label>
        <input type="month" x-model="visitFilterMonth"
               class="px-3 py-1 border border-slate-300 rounded-lg text-sm">
        <button @click="visitFilterMonth = currentMonthStr()" class="text-xs text-teal-700 hover:underline">д»ҠжңҲ</button>
      </div>
      <div class="text-sm text-slate-600">
        <span x-text="filteredVisits.length"></span>д»¶ / еҗҲиЁҲ
        <span class="font-bold text-slate-800" x-text="'ВҘ' + visitTotalAmount().toLocaleString()"></span>
      </div>
    </div>

    <!-- дёҖиҰ§ -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div x-show="filteredVisits.length === 0" class="p-8 text-center text-slate-400 text-sm">
        гҒ“гҒ®жңҲгҒ®жқҘйҷўиЁҳйҢІгҒҜгҒҫгҒ гҒӮгӮҠгҒҫгҒӣгӮ“
      </div>
      <div x-show="filteredVisits.length > 0" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">ж—Ҙд»ҳ</th>
              <th class="px-3 py-2 text-left">йЎ§е®ўеҗҚ</th>
              <th class="px-3 py-2 text-left">гғЎгғӢгғҘгғј</th>
              <th class="px-3 py-2 text-right">йҮ‘йЎҚ</th>
              <th class="px-3 py-2 text-left">жӢ…еҪ“</th>
              <th class="px-3 py-2 text-left">ж”Ҝжү•</th>
              <th class="px-3 py-2 text-left">еҢәеҲҶ</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
           <!-- рҹҶ• v0.8.5: ж—Ҙд»ҳгӮ°гғ«гғјгғ—гҒ”гҒЁгҒ«еҢәеҲҮгӮӢ -->
            <template x-for="group in groupedVisits" :key="group.date">
              <template x-for="(v, idx) in group.visits" :key="v.id">
                <tr class="border-t border-slate-100 hover:bg-slate-50">
                  <!-- еҗҢгҒҳж—ҘгҒ®1д»¶зӣ®гҒ гҒ‘ж—Ҙд»ҳгғҳгғғгғҖгғјгӮ»гғ«(rowspan)гӮ’иЎЁзӨә -->
                  <template x-if="idx === 0">
                    <td class="px-3 py-2 whitespace-nowrap bg-slate-50 font-medium border-r border-slate-200 align-top"
                        :rowspan="group.visits.length">
                      <div class="text-slate-800" x-text="formatDateWithWeekday(group.date)"></div>
                      <div class="text-xs text-slate-500 mt-1">
                        <span x-text="group.count + 'д»¶'"></span>
                      </div>
                      <div class="text-xs text-teal-700 font-bold mt-0.5"
                           x-text="'ВҘ' + group.dayTotal.toLocaleString()"></div>
                    </td>
                  </template>
                  <td class="px-3 py-2" x-text="v.customerName"></td>
                  <td class="px-3 py-2" x-text="v.menu"></td>
                  <td class="px-3 py-2 text-right" x-text="'ВҘ' + (v.amount||0).toLocaleString()"></td>
                  <td class="px-3 py-2" x-text="v.staff"></td>
                  <td class="px-3 py-2" x-text="v.paymentMethod"></td>
                  <td class="px-3 py-2">
                    <span class="text-xs px-2 py-0.5 rounded"
                          :class="categoryColor(v.cashbookCategory)"
                          x-text="v.cashbookCategory"></span>
                  </td>
                  <td class="px-3 py-2 text-right whitespace-nowrap">
                    <button @click="editVisit(v)" class="text-xs text-teal-700 hover:underline">з·ЁйӣҶ</button>
                    <button @click="deleteVisit(v)" class="text-xs text-red-500 hover:underline ml-2">еүҠйҷӨ</button>
                  </td>
                </tr>
              </template>
            </template>
          </tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ====== е•Ҷе“ҒгғһгӮ№гӮҝгғј ====== -->
  <section x-show="currentTab==='products'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-lg font-bold text-slate-800">е•Ҷе“ҒгғһгӮ№гӮҝгғј</h2>
          <p class="text-xs text-slate-500 mt-1">зү©иІ©гҒ§жүұгҒҶе•Ҷе“ҒгҒ®зҷ»йҢІгғ»з·ЁйӣҶ</p>
        </div>
        <button @click="openProductModal()"

    // ===== Firestore иіјиӘӯ(v0.6.4: customers_temp гҒҜ getDocs гҒ«еӨүжӣҙгҖҒд»–гҒҜ unsubscribe еҜҫеҝң) =====
    async subscribeAll() {
      const { db, collection, query, orderBy, onSnapshot, getDocs } = window._fb;

      // ж—ўеӯҳгғӘгӮ№гғҠгғјгӮ’е…ЁеҒңжӯў(еҶӘзӯүжҖ§зўәдҝқ: гғӯгғғгӮҜи§ЈйҷӨгӮ’з№°гӮҠиҝ”гҒ—гҒҰгӮӮгғӘгӮ№гғҠгғјгҒҢеў—ж®–гҒ—гҒӘгҒ„)
      this.unsubscribeAll();

      this.cloudStatus = 'жҺҘз¶ҡдёӯ';

      // в‘  customers_temp гҒҜ getDocs гҒ§1еӣһгҒ гҒ‘еҸ–еҫ—(localStorageгӮӯгғЈгғғгӮ·гғҘе„Әе…Ҳ)
      try {
        await this.loadCustomersTempOnce();
      } catch (err) {
        console.error('customers_temp еҸ–еҫ—гӮЁгғ©гғј:', err);
        this.cloudStatus = 'жҺҘз¶ҡгӮЁгғ©гғј';
      }

      // в‘Ў гӮөгӮӨгӮәгҒ®е°ҸгҒ•гҒ„гӮігғ¬гӮҜгӮ·гғ§гғігҒҜ onSnapshot з¶ӯжҢҒ(гғӘгӮўгғ«гӮҝгӮӨгғ жҖ§гӮ’дҝқгҒӨ)
      //    unsubscribe й–ўж•°гӮ’дҝқз®ЎгҒ—гҒҰгҒҠгҒҚгҖҒlockжҷӮгҒ«еҒңжӯўгҒ§гҒҚгӮӢгӮҲгҒҶгҒ«гҒҷгӮӢ
      const u1 = onSnapshot(query(collection(db, 'products'), orderBy('name')), snap => {
        this.products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = 'жҺҘз¶ҡгӮЁгғ©гғј'; });
      this.unsubscribers.push(u1);

      const u2 = onSnapshot(query(collection(db, 'visits'), orderBy('date', 'desc')), snap => {
        this.visits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = 'жҺҘз¶ҡгӮЁгғ©гғј'; });
      this.unsubscribers.push(u2);

      const u3 = onSnapshot(query(collection(db, 'sales'), orderBy('date', 'desc')), snap => {
        this.sales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = 'жҺҘз¶ҡгӮЁгғ©гғј'; });
      this.unsubscribers.push(u3);

      const u4 = onSnapshot(query(collection(db, 'expenses'), orderBy('date', 'desc')), snap => {
        this.expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = 'жҺҘз¶ҡгӮЁгғ©гғј'; });
      this.unsubscribers.push(u4);

      const u5 = onSnapshot(query(collection(db, 'ads'), orderBy('date', 'desc')), snap => {
        this.ads = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = 'жҺҘз¶ҡгӮЁгғ©гғј'; });
      this.unsubscribers.push(u5);

      const u6 = onSnapshot(query(collection(db, 'cash_deposits'), orderBy('date', 'desc')), snap => {
        this.cashDeposits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); });
      this.unsubscribers.push(u6);

      const u7 = onSnapshot(query(collection(db, 'monthlyExports'), orderBy('yearMonth', 'desc')), snap => {
        this.monthlyExports = snap.docs.map(d => {
          const data = d.data();
          let dt = null;
          if (data.exportedAt && typeof data.exportedAt.toDate === 'function') {
            dt = data.exportedAt.toDate();
          } else if (data.exportedAt) {
            dt = new Date(data.exportedAt);
          }
          return {
            id: d.id,

    // рҹҶ• v0.6.4: customers_temp гӮ’1еӣһгҒ гҒ‘еҸ–еҫ—(localStorageгӮӯгғЈгғғгӮ·гғҘгҒ§2еӣһзӣ®д»ҘйҷҚгӮ’й«ҳйҖҹеҢ–)
    async loadCustomersTempOnce() {
      const { db, collection, getDocs } = window._fb;
      const CACHE_KEY = 'tak_customersTemp_cache_v1';
      const CACHE_TTL_MS = 24 * 60 * 60 * 1000;  // 24жҷӮй–“

      // в‘  localStorageгӮӯгғЈгғғгӮ·гғҘгғҒгӮ§гғғгӮҜ
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          const obj = JSON.parse(cached);
          const age = Date.now() - (obj.savedAt || 0);
          if (obj.data && Array.isArray(obj.data) && age < CACHE_TTL_MS) {
            this.customersTemp = obj.data;
            this.customersTempLastFetch = obj.savedAt;
            console.log('вң“ customers_temp: localStorageгҒӢгӮү ' + obj.data.length + 'д»¶ еҫ©е…ғ (' + Math.round(age/1000/60) + 'еҲҶеүҚгҒ®гӮӯгғЈгғғгӮ·гғҘ)');
            return;  // FirestoreгҒҜеҸ©гҒӢгҒӘгҒ„
          }
        }
      } catch (e) {
        console.warn('localStorageиӘӯиҫјеӨұж•—:', e);
      }

      // в‘Ў гӮӯгғЈгғғгӮ·гғҘз„ЎеҠ№ вҶ’ getDocsгҒ§еҸ–еҫ—
      console.log('в–¶ customers_temp: FirestoreгҒӢгӮүеҸ–еҫ—дёӯ...');
      const snap = await getDocs(collection(db, 'customers_temp'));
      this.customersTemp = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      this.customersTempLastFetch = Date.now();
      console.log('вң“ customers_temp: FirestoreгҒӢгӮү ' + this.customersTemp.length + 'д»¶ еҸ–еҫ—');

      // в‘ў localStorageгҒ«дҝқеӯҳ
      this.persistCustomersTempCache();
    },

    // рҹҶ• v0.6.4: customers_temp гӮ’еј·еҲ¶еҶҚеҸ–еҫ—(гӮӯгғЈгғғгӮ·гғҘз ҙжЈ„)
    async refreshCustomersTemp() {
      try { localStorage.removeItem('tak_customersTemp_cache_v1'); } catch (e) {}
      this.customersTempLastFetch = 0;
      await this.loadCustomersTempOnce();
    },

    // рҹҶ• v0.6.4: гғЎгғўгғӘдёҠгҒ® customersTemp гҒ«1д»¶ иҝҪеҠ /жӣҙж–° + localStorageгӮӯгғЈгғғгӮ·гғҘгӮӮжӣҙж–°
    upsertCustomerLocal(customer) {
      if (!customer || !customer.id) return;
      const idx = this.customersTemp.findIndex(c => c.id === customer.id);
      if (idx >= 0) {
        this.customersTemp[idx] = { ...this.customersTemp[idx], ...customer };
      } else {
        this.customersTemp.push(customer);
      }
      this.persistCustomersTempCache();
    },

    // рҹҶ• v0.6.4: гғЎгғўгғӘдёҠгҒ® customersTemp гҒӢгӮү1д»¶еүҠйҷӨ + localStorageгӮӯгғЈгғғгӮ·гғҘгӮӮжӣҙж–°
    removeCustomerLocal(customerId) {
      this.customersTemp = this.customersTemp.filter(c => c.id !== customerId);
      this.persistCustomersTempCache();
    },

    // рҹҶ• v0.6.4: customers_temp гӮ’ localStorage гҒ«дҝқеӯҳ
    persistCustomersTempCache() {
      try {
        const sanitized = this.customersTemp.map(c => {
          const out = {};
          for (const k of Object.keys(c)) {
            const v = c[k];
            if (v && typeof v === 'object' && typeof v.toDate === 'function') continue;
            out[k] = v;
          }
          return out;
        });
        localStorage.setItem('tak_customersTemp_cache_v1', JSON.stringify({
          savedAt: Date.now(),
          data: sanitized
        }));
      } catch (e) {
        console.warn('localStorageгӮӯгғЈгғғгӮ·гғҘжӣҙж–°еӨұж•—:', e);
      }
    },

    applyMenuPreset(presetName) {

    autoCategory() {
      const m = this.visitForm.menu || '';
      const p = this.visitForm.paymentMethod || '';
      if (m.includes('дјҡе“Ўж”Ҝжү•гҒ„') || p === 'гӮөгғ–гӮ№гӮҜ') return 'гӮөгғ–гӮ№гӮҜ';
      if (m.includes('еӣһж•°еҲё') && (m.includes('иіје…Ҙ') || m.includes('еҲёиІ©еЈІ'))) return 'еӣһж•°еҲёиіје…Ҙ';
      if (p === 'еӣһж•°еҲёж¶ҲеҢ–' || m.includes('еӣһж•°еҲёж¶ҲеҢ–')) return 'еӣһж•°еҲёж¶ҲеҢ–';
      if (m.match(/(жөңжқҫ|иўӢдә•)?(\d+)еӣһеҲё?/) && (m.includes('иіје…Ҙ') || m.includes('иІ©еЈІ'))) return 'еӣһж•°еҲёиіје…Ҙ';
      return 'йғҪеәҰжү•гҒ„';
    },

    categoryColor(cat) {
      switch(cat) {
        case 'гӮөгғ–гӮ№гӮҜ':     return 'bg-purple-100 text-purple-700';
        case 'еӣһж•°еҲёиіје…Ҙ':   return 'bg-blue-100 text-blue-700';
        case 'еӣһж•°еҲёж¶ҲеҢ–':   return 'bg-sky-100 text-sky-700';
        case 'йғҪеәҰжү•гҒ„':     return 'bg-emerald-100 text-emerald-700';
        default:             return 'bg-slate-100 text-slate-600';
      }

   get filteredVisits() {
      if (!this.visitFilterMonth) return this.visits;
      return this.visits.filter(v => (v.date || '').startsWith(this.visitFilterMonth));
    },
    visitTotalAmount() {
      return this.filteredVisits.reduce((s, v) => s + (v.amount || 0), 0);
    },
    // рҹҶ• v0.8.5: ж—Ҙд»ҳгҒ§гӮ°гғ«гғјгғ”гғігӮ° вҶ’ [{ date, count, dayTotal, visits[] }, ...]
    get groupedVisits() {
      const map = {};
      for (const v of this.filteredVisits) {
        const key = v.date || '';
        if (!map[key]) {
          map[key] = { date: key, count: 0, dayTotal: 0, visits: [] };
        }
        map[key].count++;
        map[key].dayTotal += Number(v.amount) || 0;
        map[key].visits.push(v);
      }
      // ж—Ҙд»ҳгҒ®ж–°гҒ—гҒ„й Ҷ
      return Object.values(map).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    },
    // рҹҶ• v0.8.5: ж—Ҙд»ҳгҒ«жӣңж—ҘгӮ’д»ҳгҒ‘гӮӢ(2026-05-19 вҶ’ 2026-05-19(зҒ«))
    formatDateWithWeekday(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      const weekdays = ['ж—Ҙ', 'жңҲ', 'зҒ«', 'ж°ҙ', 'жңЁ', 'йҮ‘', 'еңҹ'];
      return `${dateStr}(${weekdays[d.getDay()]})`;
    },

    async saveVisit() {
      if (!this.canSaveVisit()) return;
      const { db, collection, doc, getDoc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      this.visitMessage = '';

      try {
        const v = this.visitForm;
        const cat = this.autoCategory();

        // рҹҶ• v0.8.1: з·ЁйӣҶжҷӮгҒҜж—§visitsгғҮгғјгӮҝгӮ’еҸ–еҫ—(еҫҢгҒ§гғӯгғјгғ«гғҗгғғгӮҜгҒ«дҪҝгҒҶ)
        let oldVisit = null;
        if (v.id) {
          try {
            const oldSnap = await getDoc(doc(db, 'visits', v.id));
            if (oldSnap.exists()) oldVisit = { id: oldSnap.id, ...oldSnap.data() };
          } catch (e) {
            console.warn('ж—§visitsеҸ–еҫ—еӨұж•—:', e);
          }
        }

        let customerId = v.customerId;
        if (!customerId) {
          const existing = this.customersTemp.find(c => c.name === v.customerName.trim());
          if (existing) {
            customerId = existing.id;
          } else {
            const newRef = doc(collection(db, 'customers_temp'));
            customerId = newRef.id;
            const newCustomerData = {
              name: v.customerName.trim(),
              source: 'visit-auto',
              visitCount: 1
            };
            await setDoc(newRef, {
              ...newCustomerData,
              createdAt: serverTimestamp()
            });
            // рҹҶ• v0.6.4: гғЎгғўгғӘ + localStorageгӮӯгғЈгғғгӮ·гғҘгӮӮжӣҙж–°
            this.upsertCustomerLocal({ id: customerId, ...newCustomerData });
          }
        }

        const ref = v.id
          ? doc(db, 'visits', v.id)
          : doc(collection(db, 'visits'));

        const data = {
          date: v.date,
          customerName: v.customerName.trim(),
          customerId: customerId,
          menu: v.menu.trim(),
          amount: v.amount || 0,
          staff: v.staff,
          paymentMethod: v.paymentMethod,
          cashbookCategory: cat,
          note: v.note || '',
          retailAmount: Number(v.retailAmount) || 0,
          retailMemo: (v.retailMemo || '').trim(),
          updatedAt: serverTimestamp()
        };
        if (!v.id) data.createdAt = serverTimestamp();

        await setDoc(ref, data, { merge: true });

        // рҹҶ• v0.8.1: еӣһж•°еҲёиҮӘеӢ•йҖЈжҗә
        let warning = '';
        try {
          // в‘  з·ЁйӣҶжҷӮ: ж—§йҖЈжҗәгӮ’гғӯгғјгғ«гғҗгғғгӮҜ
          if (oldVisit) {
            await this.rollbackTicketLink(oldVisit);
          }
          // в‘Ў ж–°йҖЈжҗәгӮ’йҒ©з”Ё(дҝқеӯҳеҫҢгҒ®гғҮгғјгӮҝгҒ§)
          const savedVisit = { id: ref.id, ...data };
          const result = await this.applyTicketLink(savedVisit, ref.id);
          if (result.warning) warning = result.warning;
        } catch (e) {
          console.error('еӣһж•°еҲёйҖЈжҗәгӮЁгғ©гғј:', e);
          warning = 'еӣһж•°еҲёйҖЈжҗәгҒ§гӮЁгғ©гғј: ' + e.message;
        }

        this.visitMessage = (v.id ? 'жӣҙж–°гҒ—гҒҫгҒ—гҒҹ' : 'дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ') + (warning ? ' / ' + warning : '');
        this.visitMessageType = warning ? 'err' : 'ok';
        this.resetVisitForm();
        setTimeout(() => this.visitMessage = '', warning ? 6000 : 2500);
      } catch (e) {
        console.error(e);
        this.visitMessage = 'гӮЁгғ©гғј: ' + e.message;
        this.visitMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },

    // ===== рҹҶ• v0.6: йЎ§е®ўCSVеҸ–иҫј =====
    // ============================================

    onCustomerCsvSelected(event) {
      const f = event.target.files && event.target.files[0];
      this.customerCsvFile = f || null;
      this.customerCsvRows = [];
      this.customerCsvError = '';
      this.customerCsvProgress = '';
    },

    resetCustomerCsv() {
      this.customerCsvFile = null;
      this.customerCsvRows = [];
      this.customerCsvError = '';
      this.customerCsvProgress = '';
      // гғ•гӮЎгӮӨгғ«йҒёжҠһUIгӮӮгӮҜгғӘгӮў
      const inputs = document.querySelectorAll('input[type="file"][accept*="csv"]');
      inputs.forEach(i => { i.value = ''; });
    },

    async parseCustomerCsv() {
      if (!this.customerCsvFile) return;
      this.customerCsvError = '';
      this.customerCsvRows = [];
      this.customerCsvProgress = 'иӘӯгҒҝиҫјгҒҝдёӯ...';

      try {
        const buf = await this.customerCsvFile.arrayBuffer();
        let text = '';

        if (this.customerCsvEncoding === 'utf-8') {
          text = new TextDecoder('utf-8').decode(buf);
        } else if (this.customerCsvEncoding === 'shift-jis') {
          text = new TextDecoder('shift-jis').decode(buf);
        } else {
          // auto: гҒҫгҒҡShift-JISгҒ§и©ҰгҒ—гҒҰгҖҒж–Үеӯ—еҢ–гҒ‘гҒҢеӨҡгҒқгҒҶгҒӘгӮүUTF-8
          const sjis = new TextDecoder('shift-jis', { fatal: false }).decode(buf);
          const utf8 = new TextDecoder('utf-8', { fatal: false }).decode(buf);
          // \uFFFD(зҪ®жҸӣж–Үеӯ—)гҒҢе°‘гҒӘгҒ„ж–№гӮ’жҺЎз”Ё
          const sjisBad = (sjis.match(/\uFFFD/g) || []).length;
          const utf8Bad = (utf8.match(/\uFFFD/g) || []).length;
          text = sjisBad <= utf8Bad ? sjis : utf8;
        }

        // BOMйҷӨеҺ»
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

        const rows = this.parseCsvText(text);
        if (rows.length < 2) {
          this.customerCsvError = 'гғҮгғјгӮҝиЎҢгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“(гғҳгғғгғҖгғј+1иЎҢд»ҘдёҠгҒҢеҝ…иҰҒ)';
          this.customerCsvProgress = '';
          return;
        }

        const header = rows[0].map(h => (h || '').trim());
        const colIndex = (names) => {
          for (const n of names) {
            const idx = header.findIndex(h => h === n || h.includes(n));
            if (idx >= 0) return idx;
          }
          return -1;
        };

        // еҲ—гғһгғғгғ”гғігӮ°(еӣІгҒ„иҫјгҒҝиҒ·дәәжғіе®ҡ)
        const map = {
          customerNo: colIndex(['йЎ§е®ўNo', 'йЎ§е®ўз•ӘеҸ·', 'No']),
          name:       colIndex(['йЎ§е®ўеҗҚ', 'ж°ҸеҗҚ', 'еҗҚеүҚ']),
          furigana:   colIndex(['гҒөгӮҠгҒҢгҒӘ', 'гғ•гғӘгӮ¬гғҠ', 'гӮ«гғҠ']),
          gender:     colIndex(['жҖ§еҲҘ']),
          postalCode: colIndex(['йғөдҫҝз•ӘеҸ·', 'гҖ’']),
          address1:   colIndex(['дҪҸжүҖпј‘', 'дҪҸжүҖ1', 'дҪҸжүҖ']),
          address2:   colIndex(['дҪҸжүҖпј’', 'дҪҸжүҖ2']),
          phone1:     colIndex(['йӣ»и©ұ-1', 'йӣ»и©ұ1', 'йӣ»и©ұ']),
          phone2:     colIndex(['йӣ»и©ұ-2', 'йӣ»и©ұ2', 'жҗәеёҜ']),
          email:      colIndex(['гғЎгғјгғ«гӮўгғүгғ¬гӮ№', 'гғЎгғјгғ«', 'Email', 'E-mail']),
          birthDate:  colIndex(['з”ҹе№ҙжңҲж—Ҙ', 'иӘ•з”ҹж—Ҙ']),
          age:        colIndex(['е№ҙйҪў']),
          ageGroup:   colIndex(['е№ҙд»Ј']),
          occupation: colIndex(['иҒ·жҘӯ']),
          motive:     colIndex(['еӢ•ж©ҹ', 'гҒҚгҒЈгҒӢгҒ‘']),
          lastVisitDate: colIndex(['жңҖзөӮжқҘеә—ж—Ҙ', 'жңҖзөӮжқҘйҷўж—Ҙ']),
          totalVisitCount: colIndex(['жқҘеә—еӣһж•°', 'жқҘйҷўеӣһж•°', 'з·ҸжқҘеә—ж•°'])
        };

        if (map.name < 0) {
          this.customerCsvError = 'гҖҢйЎ§е®ўеҗҚгҖҚеҲ—гҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“гҖӮCSVгҒ®гғҳгғғгғҖгғјиЎҢгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';
          this.customerCsvProgress = '';
          return;
        }

        // ж—ўеӯҳcustomers_temp еҗҚеүҚвҶ’еҖҷиЈңй…ҚеҲ—гғһгғғгғ—(еҗҢе§“еҗҢеҗҚеҜҫеҝң)
        const existingByName = {};
        for (const c of this.customersTemp) {
          if (c.name) {
            const key = c.name.trim();
            if (!existingByName[key]) existingByName[key] = [];
            existingByName[key].push(c);
          }
        }

        // йӣ»и©ұз•ӘеҸ·жӯЈиҰҸеҢ–(гғҸгӮӨгғ•гғігғ»е…Ёи§’гғ»з©әзҷҪйҷӨеҺ»)
        const normPhone = (p) => (p || '').replace(/[\s\-пјҚвҖ”гғј]/g, '').replace(/[пјҗ-пјҷ]/g, ch =>
          String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
        );

        const out = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || r.length === 0 || r.every(c => !c)) continue;
          const get = (key) => map[key] >= 0 ? (r[map[key]] || '').trim() : '';

          const name = get('name');
          if (!name) continue;  // еҗҚеүҚгҒӘгҒ—иЎҢгҒҜгӮ№гӮӯгғғгғ—

          const phone1 = get('phone1');
          const phone2 = get('phone2');
          const birthDate = this.normalizeDate(get('birthDate'));

          // еҗҢеҗҚеҖҷиЈңгӮ’еҸ–еҫ—
          const candidates = existingByName[name] || [];
          const phoneN = normPhone(phone1);
          const phone2N = normPhone(phone2);

          // еҖҷиЈңгҒ”гҒЁгҒ«иӯҳеҲҘжғ…е ұгҒ®дёҖиҮҙеәҰгӮ’еҲӨе®ҡ
          const scoredCandidates = candidates.map(c => {
            const cPhone1 = normPhone(c.phone1);
            const cPhone2 = normPhone(c.phone2);
            const cBirth = c.birthDate || '';
            // дёҖиҮҙеҲӨе®ҡ
            const phoneMatch = phoneN && (phoneN === cPhone1 || phoneN === cPhone2)
                            || phone2N && (phone2N === cPhone1 || phone2N === cPhone2);
            const birthMatch = birthDate && cBirth && birthDate === cBirth;
            return { candidate: c, phoneMatch, birthMatch };
          });

          // иҮӘеӢ•гғһгғјгӮёеҸҜеҗҰеҲӨе®ҡ(жҘөеҠӣгғҹгӮ№гӮ’йҒҝгҒ‘гӮӢеҺігҒ—гӮҒжқЎд»¶)
          // гғ»еҖҷиЈңгӮјгғӯ вҶ’ ж–°иҰҸ
          // гғ»еҖҷиЈң1дәә гҒӢгҒӨ йӣ»и©ұorз”ҹе№ҙжңҲж—ҘгҒҢдёҖиҮҙ вҶ’ иҮӘеӢ•merge(е®үе…Ё)
          // гғ»еҖҷиЈң1дәә гҒӢгҒӨ иӯҳеҲҘжғ…е ұгҒӘгҒ—(ж—ўеӯҳtempиҮӘеӢ•з”ҹжҲҗ) вҶ’ иҰҒжүӢеӢ•зўәиӘҚ
          // гғ»еҖҷиЈң1дәә гҒӢгҒӨ иӯҳеҲҘжғ…е ұгҒӮгӮӢгҒҢдёҚдёҖиҮҙ вҶ’ еҲҘдәәгҒ®еҸҜиғҪжҖ§еӨ§гҖҒиҰҒжүӢеӢ•зўәиӘҚ
          // гғ»еҖҷиЈң2дәәд»ҘдёҠ вҶ’ еҝ…гҒҡиҰҒжүӢеӢ•зўәиӘҚ
          let action = 'new';
          let matchedId = null;
          let matchedName = '';
          let matchWarning = '';
          let safeAutoMerge = false;

          if (candidates.length === 0) {
            action = 'new';
          } else if (candidates.length === 1) {
            const sc = scoredCandidates[0];
            const c = sc.candidate;
            const cHasIdInfo = normPhone(c.phone1) || normPhone(c.phone2) || c.birthDate;

            if (sc.phoneMatch || sc.birthMatch) {
              // иӯҳеҲҘжғ…е ұдёҖиҮҙ вҶ’ е®үе…ЁгҒ«иҮӘеӢ•merge
              action = 'merge:' + c.id;
              matchedId = c.id;
              matchedName = c.name;
              safeAutoMerge = true;
            } else if (!cHasIdInfo) {
              // ж—ўеӯҳгҒ«иӯҳеҲҘжғ…е ұгҒӘгҒ—(иҮӘеӢ•з”ҹжҲҗtemp) вҶ’ еҗҢеҗҚ1дәәгҒӘгҒ®гҒ§жҜ”ијғзҡ„е®үе…ЁгҒ гҒҢеҝөгҒ®гҒҹгӮҒиӯҰе‘Ҡ
              action = 'new';  // вҡ пёҸ гғҮгғ•гӮ©гғ«гғҲж–°иҰҸ(е®үе…ЁеҒҙ)
              matchedId = c.id;
              matchedName = c.name;
              matchWarning = 'еҗҢеҗҚ1дәә(ж—ўеӯҳгҒ«иӯҳеҲҘжғ…е ұгҒӘгҒ—) вҖ” иҰҒзўәиӘҚ';
            } else {
              // иӯҳеҲҘжғ…е ұгҒӮгӮӢгҒҢдёҚдёҖиҮҙ вҶ’ еҲҘдәәгҒ®еҸҜиғҪжҖ§
              action = 'new';
              matchedId = c.id;
              matchedName = c.name;
              matchWarning = 'еҗҢеҗҚгҒ гҒҢйӣ»и©ұ/з”ҹе№ҙжңҲж—ҘгҒҢдёҚдёҖиҮҙ вҖ” еҲҘдәәгҒ®еҸҜиғҪжҖ§';
            }
          } else {
            // еҗҢе§“еҗҢеҗҚ2дәәд»ҘдёҠ вҶ’ зө¶еҜҫгҒ«иҮӘеӢ•гғһгғјгӮёгҒ—гҒӘгҒ„
            action = 'new';
            matchWarning = `вҡ пёҸ еҗҢеҗҚ${candidates.length}дәә вҖ” еҝ…гҒҡжүӢеӢ•зўәиӘҚ`;
          }

          out.push({
            _idx: out.length,  // е…ғй…ҚеҲ—й ҶгӮӨгғігғҮгғғгӮҜгӮ№(гғ•гӮЈгғ«гӮҝиЎЁзӨәгҒ§гӮӮдҝқжҢҒ)
            customerNo: get('customerNo'),
            name: name,
            furigana: this.toHiragana(get('furigana')),
            gender: get('gender'),
            postalCode: get('postalCode'),
            address1: get('address1'),
            address2: get('address2'),
            phone1: phone1,
            phone2: phone2,
            email: get('email'),
            birthDate: birthDate,
            age: this.toNumber(get('age')),
            ageGroup: get('ageGroup'),
            occupation: get('occupation'),
            motive: get('motive'),
            lastVisitDate: this.normalizeDate(get('lastVisitDate')),
            totalVisitCount: this.toNumber(get('totalVisitCount')),
            // гғ—гғ¬гғ“гғҘгғјз”Ё
            matchedExisting: candidates.length > 0,
            matchedId: matchedId,
            matchedName: matchedName,
            matchWarning: matchWarning,
            safeAutoMerge: safeAutoMerge,
            // еҗҢеҗҚеҖҷиЈңгғӘгӮ№гғҲ(жүӢеӢ•йҒёжҠһз”Ё)
            candidateList: candidates.map(c => ({
              id: c.id,
              name: c.name,
              phone1: c.phone1 || '',
              phone2: c.phone2 || '',
              birthDate: c.birthDate || '',
              address1: c.address1 || ''
            })),
            action: action
          });
        }

        this.customerCsvRows = out;
        this.customerCsvProgress = `${out.length}д»¶иӘӯгҒҝиҫјгҒҝе®ҢдәҶ`;
      } catch (err) {
        console.error(err);
        this.customerCsvError = 'иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј: ' + err.message;
        this.customerCsvProgress = '';
      }
    },

    // з°Ўжҳ“CSVгғ‘гғјгӮө(гғҖгғ–гғ«гӮҜгӮ©гғјгғҲеҜҫеҝң)
    parseCsvText(text) {
      const rows = [];
      let cur = [];
      let cell = '';
      let inQuote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuote) {
          if (ch === '"') {
            if (text[i + 1] === '"') { cell += '"'; i++; }
            else inQuote = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') inQuote = true;
          else if (ch === ',') { cur.push(cell); cell = ''; }
          else if (ch === '\r') { /* skip */ }
          else if (ch === '\n') { cur.push(cell); rows.push(cur); cur = []; cell = ''; }
          else cell += ch;
        }
      }
      if (cell.length > 0 || cur.length > 0) { cur.push(cell); rows.push(cur); }
      return rows;
    },

    // гӮ«гӮҝгӮ«гғҠвҶ’гҒІгӮүгҒҢгҒӘ(еӣІгҒ„иҫјгҒҝиҒ·дәәгҒҢгӮ«гӮҝгӮ«гғҠгҒ§еҮәеҠӣгҒҷгӮӢе ҙеҗҲгҒ«еҜҫеҝң)
    toHiragana(s) {
      if (!s) return '';
      return s.replace(/[\u30A1-\u30F6]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    },

    toNumber(s) {
      if (!s) return null;
      const n = parseInt(String(s).replace(/[^\d]/g, ''), 10);
      return isNaN(n) ? null : n;
    },

    // ж—Ҙд»ҳжӯЈиҰҸеҢ–: "2024/3/5", "2024-3-5", "S50.4.1" зӯү вҶ’ "YYYY-MM-DD" or null
    normalizeDate(s) {
      if (!s) return null;
      s = s.trim();
      // YYYY-MM-DD or YYYY/MM/DD or YYYY.MM.DD
      let m = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
      if (m) {
        return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      }
      // е’ҢжҡҰгҒҜд»ҠеӣһгӮ№гӮӯгғғгғ—(еҝ…иҰҒгҒӘгӮүжӢЎејө)
      return null;
    },

    setAllCustomerAction(action) {
      // е®үе…ЁгҒ®гҒҹгӮҒгҖҢе…ЁгҒҰж–°иҰҸгҖҚгҖҢе…ЁгҒҰиЈңе®ҢгҖҚгҒҜе»ғжӯўгҖӮгҖҢе…ЁгҒҰгӮ№гӮӯгғғгғ—гҖҚгҒ®гҒҝжҸҗдҫӣгҖӮ
      // еҗ„иЎҢгҒ®еҲӨж–ӯгҒҜжүӢеӢ•гҒ§иЎҢгҒҶгҖӮ
      if (action !== 'skip') return;
      for (const r of this.customerCsvRows) {
        r.action = 'skip';
      }
    },

    get filteredCustomerCsvRows() {
      if (this.customerCsvShowWarningsOnly) {
        return this.customerCsvRows.filter(r => r.matchWarning);
      }
      return this.customerCsvRows;
    },

    get customerCsvCounts() {
      const c = { new: 0, merge: 0, skip: 0, warnings: 0 };
      for (const r of this.customerCsvRows) {
        if (r.action === 'new') c.new++;
        else if (r.action && r.action.startsWith('merge')) c.merge++;
        else c.skip++;
        // иҰҒзўәиӘҚиӯҰе‘Ҡ(еҮҰзҗҶгҒ«й–ўгӮҸгӮүгҒҡгӮ«гӮҰгғігғҲ)
        if (r.matchWarning) c.warnings++;
      }
      return c;
    },

    async executeCustomerCsv() {
      if (this.customerCsvRows.length === 0) return;
      const counts = this.customerCsvCounts;
      const total = counts.new + counts.merge;
      if (total === 0) return;

      // иӯҰе‘ҠиЎҢгҒҢж®ӢгҒЈгҒҰгҒ„гӮӢгҒӢгғҒгӮ§гғғгӮҜ
      const remainingWarnings = this.customerCsvRows.filter(r =>
        r.matchWarning && r.action !== 'skip'
      ).length;

      let warnMsg = '';
      if (remainingWarnings > 0) {
        warnMsg = `\n\nвҡ пёҸ жіЁж„Ҹ: ${remainingWarnings}д»¶гҒ®иҰҒзўәиӘҚиЎҢгҒҢгӮ№гӮӯгғғгғ—д»ҘеӨ–гҒ«гҒӘгҒЈгҒҰгҒ„гҒҫгҒҷгҖӮ\nгҒ“гӮҢгӮүгҒҜеҲҘдәәгҒ®еҸҜиғҪжҖ§гҒҢгҒӮгӮҠгҒҫгҒҷгҖӮжң¬еҪ“гҒ«жҠ•е…ҘгҒ—гҒҫгҒҷгҒӢ?`;
      }

      if (!confirm(`ж–°иҰҸиҝҪеҠ  ${counts.new}д»¶ / ж—ўеӯҳиЈңе®Ң ${counts.merge}д»¶ гӮ’жҠ•е…ҘгҒ—гҒҫгҒҷгҖӮ${warnMsg}`)) return;

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.customerCsvImporting = true;
      let success = 0;
      let errors = 0;

      try {
        const target = this.customerCsvRows.filter(r => r.action !== 'skip');
        for (let i = 0; i < target.length; i++) {
          const r = target[i];
          this.customerCsvProgress = `жҠ•е…Ҙдёӯ... ${i + 1} / ${target.length}`;

          try {
            const payload = this.buildCustomerPayload(r);
            let ref;
            // action гҒҜ 'new' or 'merge:<id>' гҒ®еҪўејҸ
            if (r.action && r.action.startsWith('merge:')) {
              const targetId = r.action.substring(6);  // 'merge:'гӮ’йҷӨеҺ»
              if (!targetId) {
                throw new Error('mergeе…ҲIDгҒҢдёҚжӯЈ');
              }
              ref = doc(db, 'customers_temp', targetId);
              payload.updatedAt = serverTimestamp();
            } else {
              ref = doc(collection(db, 'customers_temp'));
              payload.createdAt = serverTimestamp();
              payload.updatedAt = serverTimestamp();
              payload.source = 'csv-kakoikomi';
            }
            // mergeгҒ®е ҙеҗҲгҒҜиЈңе®Ң(з©әж–Үеӯ—гӮ’дёҠжӣёгҒҚгҒ—гҒӘгҒ„гӮҲгҒҶгҖҒз©әгҒҜpayloadгҒӢгӮүйҷӨеӨ–жёҲгҒҝ)
            await setDoc(ref, payload, { merge: true });
            success++;
          } catch (err) {
            console.error('иЎҢ' + (i + 1) + 'гӮЁгғ©гғј', err);
            errors++;
          }
        }

        this.customerCsvProgress = `е®ҢдәҶ: жҲҗеҠҹ ${success}д»¶ / гӮЁгғ©гғј ${errors}д»¶ / customers_tempеҶҚеҸ–еҫ—дёӯ...`;
        // рҹҶ• v0.6.4: еӨ§йҮҸжҠ•е…ҘеҫҢгҒҜгғЎгғўгғӘгҒ®ж•ҙеҗҲжҖ§гӮ’дҝқгҒӨгҒҹгӮҒеј·еҲ¶еҶҚеҸ–еҫ—
        try {
          await this.refreshCustomersTemp();
          this.customerCsvProgress = `е®ҢдәҶ: жҲҗеҠҹ ${success}д»¶ / гӮЁгғ©гғј ${errors}д»¶ / customers_temp ${this.customersTemp.length}д»¶`;
        } catch (e) {
          console.warn('customers_tempеҶҚеҸ–еҫ—гӮЁгғ©гғј:', e);

    get activeProducts() {

    get filteredSales() {
      if (!this.salesFilterMonth) return this.sales;
      return this.sales.filter(s => (s.date || '').startsWith(this.salesFilterMonth));
    },

    get salesByProduct() {
      const map = {};
      for (const s of this.filteredSales) {
        const key = s.productName || '(е•Ҷе“ҒеҗҚгҒӘгҒ—)';
        if (!map[key]) {
          map[key] = { productName: key, salesQty: 0, sampleQty: 0, totalAmount: 0 };
        }
        if (s.isSample) {
          map[key].sampleQty += Number(s.quantity) || 0;
        } else {
          map[key].salesQty += Number(s.quantity) || 0;
        }
        map[key].totalAmount += Number(s.amount) || 0;
      }
      return Object.values(map).sort((a, b) => b.totalAmount - a.totalAmount);

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      this.salesMessage = '';

      try {
        const s = this.salesForm;

        let customerId = s.customerId;
        if (s.customerName && s.customerName.trim() && !customerId) {
          const trimmedName = s.customerName.trim();
          const existing = this.customersTemp.find(c => c.name === trimmedName);

          } else {

            this.upsertCustomerLocal({ id: customerId, ...newCustomerData });

          productId: s.productId || null,
          productName: s.productName,
          unitPrice: Number(s.unitPrice) || 0,
          quantity: Number(s.quantity) || 1,
          amount: s.isSample ? 0 : (Number(s.amount) || 0),
          paymentMethod: s.paymentMethod || 'зҸҫйҮ‘',
          customerId: customerId || null,
          customerName: (s.customerName || '').trim(),
          staff: s.staff || 'TAK',
          isSample: !!s.isSample,
          note: s.note || '',
          updatedAt: serverTimestamp()
        };
        if (!s.id) data.createdAt = serverTimestamp();

        await setDoc(ref, data, { merge: true });

    openSalesBulkImport() {
      this.salesBulkModalOpen = true;
      this.salesBulkText = '';
      this.salesBulkPreview = [];
      this.salesBulkError = '';
    },

    parseSalesBulk() {
      this.salesBulkError = '';
      this.salesBulkPreview = [];

      let parsed;
      try {
        parsed = JSON.parse(this.salesBulkText);
      } catch (e) {
        this.salesBulkError = 'JSON parseгӮЁгғ©гғј: ' + e.message;
        return;
      }

      if (!Array.isArray(parsed)) {
        this.salesBulkError = 'JSONгҒҜй…ҚеҲ—гҒ§гҒӮгӮӢеҝ…иҰҒгҒҢгҒӮгӮҠгҒҫгҒҷ';
        return;
      }

      this.salesBulkPreview = parsed.map((item) => {
        const out = {
          date: item.date || '',
          productName: item.productName || '',
          quantity: Number(item.quantity) || 0,
          unitPrice: Number(item.unitPrice) || 0,
          amount: 0,
          paymentMethod: item.paymentMethod || 'зҸҫйҮ‘',
          customerName: item.customerName || '',
          staff: item.staff || 'TAK',
          isSample: !!item.isSample,
          note: item.note || '',
          productId: null,
          error: ''
        };

        if (!out.date) out.error = 'ж—Ҙд»ҳгҒӘгҒ—';
        else if (!out.productName) out.error = 'е•Ҷе“ҒеҗҚгҒӘгҒ—';
        else if (out.quantity <= 0) out.error = 'ж•°йҮҸдёҚжӯЈ';

        if (!out.error) {
          const product = this.products.find(p => p.name === out.productName);
          if (!product) {
            out.error = `е•Ҷе“ҒгғһгӮ№гӮҝгғјгҒ«еӯҳеңЁгҒ—гҒӘгҒ„: ${out.productName}`;
          } else {
            out.productId = product.id;
            if (out.unitPrice === 0) out.unitPrice = Number(product.sellingPrice) || 0;
          }
        }

        if (out.isSample) {
          out.amount = 0;
        } else if (item.amount !== undefined && item.amount !== null) {
          out.amount = Number(item.amount) || 0;
        } else {
          out.amount = out.unitPrice * out.quantity;
        }

        return out;
      });
    },

      }

    async autoTransferSampleCost() {
      const month = this.expenseFilterMonth || this.currentMonthStr();
      if (!month) {
        alert('иЎЁзӨәжңҲгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
        return;
      }

      const monthSales = this.sales.filter(s =>
        s.isSample && (s.date || '').startsWith(month)
      );

      if (monthSales.length === 0) {
        alert(`${month} гҒ«гӮөгғігғ—гғ«жҸҗдҫӣиЁҳйҢІгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“`);
        return;
      }

      const breakdown = {};
      let totalCost = 0;
      for (const s of monthSales) {
        const prod = this.products.find(p => p.id === s.productId || p.name === s.productName);
        const dealerPrice = prod ? (Number(prod.dealerPrice) || 0) : 0;
        const qty = Number(s.quantity) || 0;
        const cost = dealerPrice * qty;
        const key = s.productName || '(дёҚжҳҺ)';
        if (!breakdown[key]) breakdown[key] = { qty: 0, cost: 0 };
        breakdown[key].qty += qty;
        breakdown[key].cost += cost;
        totalCost += cost;
      }

      if (totalCost === 0) {
        alert('еҺҹдҫЎжғ…е ұгҒҢзҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒӘгҒ„е•Ҷе“ҒгҒ°гҒӢгӮҠгҒ§гҒҷгҖӮе•Ҷе“ҒгғһгӮ№гӮҝгғјгҒ§гҖҢд»ЈзҗҶеә—дҫЎж јгҖҚгӮ’иЁӯе®ҡгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
        return;
      }

      const noteParts = Object.entries(breakdown)
        .map(([name, v]) => `${name}Г—${v.qty}(ВҘ${v.cost.toLocaleString()})`)
        .join(' / ');
      const noteText = `[иҮӘеӢ•]гӮөгғігғ—гғ«еҺҹдҫЎ ${noteParts}`;

      const existing = this.expenses.find(e => e.isAutoSample && e.sampleMonth === month);

      const msg = existing
        ? `${month} гҒ®иҮӘеӢ•и»ўиЁҳгғ¬гӮігғјгғүгҒҢж—ўгҒ«гҒӮгӮҠгҒҫгҒҷ(ВҘ${(existing.amount||0).toLocaleString()})гҖӮ\nВҘ${totalCost.toLocaleString()} гҒ§дёҠжӣёгҒҚгҒ—гҒҫгҒҷгҒӢ?`
        : `${month} гҒ®гӮөгғігғ—гғ«еҺҹдҫЎ ВҘ${totalCost.toLocaleString()} гӮ’иІ©дҝғиІ»гҒЁгҒ—гҒҰи»ўиЁҳгҒ—гҒҫгҒҷгҒӢ?\n\n${noteText}`;

      if (!confirm(msg)) return;

      const { db, collection, doc, setDoc, deleteDoc, serverTimestamp } = window._fb;
      this.saving = true;

      try {
        if (existing) {
          await deleteDoc(doc(db, 'expenses', existing.id));
        }

        const lastDay = this.lastDayOfMonth(month);

        const ref = doc(collection(db, 'expenses'));
        await setDoc(ref, {
          date: lastDay,
          category: 'иІ©дҝғиІ»',
          amount: totalCost,
          paymentMethod: 'гҒқгҒ®д»–',
          note: noteText,
          isAutoSample: true,
          sampleMonth: month,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        this.expenseMessage = `гӮөгғігғ—гғ«еҺҹдҫЎ ВҘ${totalCost.toLocaleString()} гӮ’и»ўиЁҳгҒ—гҒҫгҒ—гҒҹ`;
        this.expenseMessageType = 'ok';
        setTimeout(() => this.expenseMessage = '', 4000);
      } catch (err) {
        console.error(err);
        alert('и»ўиЁҳгӮЁгғ©гғј: ' + err.message);
      } finally {
        this.saving = false;
      }
    },

      const last = new Date(y, m, 0).getDate();
      return `${y}-${String(m).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
    },

      const map = {};
      const total = this.filteredAds.reduce((s, a) => s + (Number(a.amount) || 0), 0);
      for (const a of this.filteredAds) {
        const key = a.category || '(жңӘеҲҶйЎһ)';

          map[key] = { category: key, count: 0, totalAmount: 0, percent: 0 };
        }
        map[key].count++;
        map[key].totalAmount += Number(a.amount) || 0;
      }
      const arr = Object.values(map);
      for (const row of arr) {
        row.percent = total > 0 ? Math.round((row.totalAmount / total) * 1000) / 10 : 0;
      }
      return arr.sort((a, b) => b.totalAmount - a.totalAmount);

    async onCashbookMonthChange() {

    async loadCashbookCarry(month) {
      if (!month) return;
      const { db, doc, getDoc, setDoc, serverTimestamp } = window._fb;
      try {
        const ref = doc(db, 'cashbook_carry', month);
        const snap = await getDoc(ref);

        if (snap.exists() && snap.data().isManual === true) {
          this.cashbookCarry = Number(snap.data().carryAmount) || 0;
          this.cashbookCarryIsManual = true;
          return;
        }

        const prev = this.prevMonth(month);
        const prevSnap = await getDoc(doc(db, 'cashbook_carry', prev));
        if (prevSnap.exists()) {
          const prevSummary = this.calcMonthCashSummary(prev);
          const carry = (Number(prevSnap.data().carryAmount) || 0)
                      + prevSummary.income - prevSummary.expense;

          const oldCarry = snap.exists() ? (Number(snap.data().carryAmount) || 0) : null;
          if (oldCarry !== carry) {
            await setDoc(ref, {
              yearMonth: month,
              carryAmount: carry,
              isManual: false,
              updatedAt: serverTimestamp(),
              ...(snap.exists() ? {} : { createdAt: serverTimestamp() })
            }, { merge: true });
          }
          this.cashbookCarry = carry;
          this.cashbookCarryIsManual = false;
        } else {
          this.cashbookCarry = 0;
          this.cashbookCarryIsManual = false;
        }
      } catch (err) {
        console.error(err);
        this.cashbookMessage = 'з№°и¶ҠиӘӯиҫјгӮЁгғ©гғј: ' + err.message;
        this.cashbookMessageType = 'err';
      }
    },

      const { db, doc, setDoc, serverTimestamp } = window._fb;
      try {
        const value = Number(this.cashbookCarryEditValue) || 0;
        await setDoc(doc(db, 'cashbook_carry', this.cashbookMonth), {
          yearMonth: this.cashbookMonth,
          carryAmount: value,
          isManual: true,
          updatedAt: serverTimestamp()
        }, { merge: true });
        this.cashbookCarry = value;
        this.cashbookCarryIsManual = true;
        this.cashbookCarryEditing = false;
        this.cashbookMessage = 'з№°и¶ҠгӮ’жӣҙж–°гҒ—гҒҫгҒ—гҒҹ';
        this.cashbookMessageType = 'ok';
        setTimeout(() => this.cashbookMessage = '', 2500);

  prevMonth(yyyymm) {
      const [y, m] = yyyymm.split('-').map(Number);
      const d = new Date(y, m - 2, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    },

    // рҹҶ• v0.9.4-fix: гҖҢзҸҫйҮ‘жүұгҒ„гҖҚгҒ®ж”Ҝжү•ж–№жі•гӮ’еҲӨе®ҡ(гғӘгӮҜгғ«гғјгғҲеҜҫеҝң)
    // зҸҫйҮ‘ / гғӘгӮҜгғ«гғјгғҲ вҶ’ зҸҫйҮ‘еҮәзҙҚеёігҒ«иЁҳйҢІгҖҒдјқзҘЁNoд»ҳдёҺеҜҫиұЎ
    isCashLikePayment(pm) {
      return pm === 'зҸҫйҮ‘' || pm === 'гғӘгӮҜгғ«гғјгғҲ';
    },

    // рҹҶ• v0.9.0-a1: зҝҢжңҲгӮ’ 'YYYY-MM' еҪўејҸгҒ§иҝ”гҒҷ(жңҲж¬Ўжү•гҒ„иҫјгҒҝз”ҹжҲҗгҒ®гғҮгғ•гӮ©гғ«гғҲеҖӨ)
    getDefaultPaymentTargetMonth() {
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      const y = next.getFullYear();
      const m = String(next.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    },

    calcMonthCashSummary(month) {
      let income = 0, expense = 0;
      for (const v of this.visits) {
        // еЈІдёҠ(жқҘйҷў)гҒҜгҖҢзҸҫйҮ‘гҖҚгҒ®гҒҝгҖӮгҖҢгғӘгӮҜгғ«гғјгғҲгҖҚгҒҜж”Ҝжү•ж–№жі•гҒЁгҒ—гҒҰзҸҫе®ҹзҡ„гҒ«гҒӮгӮҠеҫ—гҒӘгҒ„гҒ®гҒ§йҷӨеӨ–
        if ((v.date || '').startsWith(month) && v.paymentMethod === 'зҸҫйҮ‘') {
          income += Number(v.amount) || 0;
        }
      }
      for (const s of this.sales) {
        // зү©иІ©еЈІдёҠгӮӮеҗҢгҒҳгҒҸгҖҢзҸҫйҮ‘гҖҚгҒ®гҒҝ
        if ((s.date || '').startsWith(month) && s.paymentMethod === 'зҸҫйҮ‘' && !s.isSample) {
          income += Number(s.amount) || 0;
        }
      }
      for (const e of this.expenses) {
        // зөҢиІ»гҒҜгҖҢзҸҫйҮ‘гҖҚгҖҢгғӘгӮҜгғ«гғјгғҲгҖҚгҒ®дёЎж–№гӮ’зҸҫйҮ‘жүұгҒ„гҒ«еҗ«гӮҒгӮӢ(v0.9.4-fix)
        if ((e.date || '').startsWith(month) && this.isCashLikePayment(e.paymentMethod)) {
          expense += Number(e.amount) || 0;
        }
      }
      for (const a of this.ads) {
        // еәғе‘ҠиІ»гӮӮеҗҢж§ҳгҒ«гҖҢзҸҫйҮ‘гҖҚгҖҢгғӘгӮҜгғ«гғјгғҲгҖҚгӮ’зҸҫйҮ‘жүұгҒ„гҒ«еҗ«гӮҒгӮӢ(v0.9.4-fix)
        if ((a.date || '').startsWith(month) && this.isCashLikePayment(a.paymentMethod)) {
          expense += Number(a.amount) || 0;
        }
      }
      // рҹҶ• v0.5: йҠҖиЎҢй җгҒ‘е…ҘгӮҢгӮӮиІёж–№гҒЁгҒ—гҒҰеҠ з®—
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(month)) {
          expense += Number(d.amount) || 0;
        }
      }
      return { income, expense };
    },

    get cashbookEntries() {
      const m = this.cashbookMonth;
      if (!m) return [];
      const list = [];

      for (const v of this.visits) {
        if ((v.date || '').startsWith(m) && v.paymentMethod === 'зҸҫйҮ‘') {
          list.push({
            date: v.date,

          list.push({
            date: s.date,
            type: 'зү©иІ©',
            desc: `${s.productName} Г— ${s.quantity}`,
            income: Number(s.amount) || 0,
            expense: 0
          });
        }
      }
      for (const e of this.expenses) {
        // гҖҢзҸҫйҮ‘гҖҚгҖҢгғӘгӮҜгғ«гғјгғҲгҖҚгҒ®дёЎж–№гӮ’зҸҫйҮ‘жүұгҒ„гҒЁгҒ—гҒҰеҮәзҙҚеёігҒ«иЎЁзӨә(v0.9.4-fix)
        if ((e.date || '').startsWith(m) && this.isCashLikePayment(e.paymentMethod)) {
          const pmTag = e.paymentMethod === 'гғӘгӮҜгғ«гғјгғҲ' ? ' [гғӘгӮҜгғ«гғјгғҲ]' : '';
          list.push({
            date: e.date,

            desc: `${e.category}${pmTag}${e.note ? ' / ' + e.note : ''}`,
            income: 0,

          });
        }
      }
      for (const a of this.ads) {
        // гҖҢзҸҫйҮ‘гҖҚгҖҢгғӘгӮҜгғ«гғјгғҲгҖҚгҒ®дёЎж–№гӮ’зҸҫйҮ‘жүұгҒ„гҒЁгҒ—гҒҰеҮәзҙҚеёігҒ«иЎЁзӨә(v0.9.4-fix)
        if ((a.date || '').startsWith(m) && this.isCashLikePayment(a.paymentMethod)) {
          const pmTag = a.paymentMethod === 'гғӘгӮҜгғ«гғјгғҲ' ? ' [гғӘгӮҜгғ«гғјгғҲ]' : '';
          list.push({
            date: a.date,
            type: 'еәғе‘ҠиІ»',
            desc: `${a.category}${pmTag}${a.note ? ' / ' + a.note : ''}`,
            income: 0,
            expense: Number(a.amount) || 0
          });
        }
      }
      // рҹҶ• v0.5: йҠҖиЎҢй җгҒ‘е…ҘгӮҢ
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(m)) {
          list.push({
            date: d.date,
            type: 'й җе…Ҙ',
            desc: `зҸҫйҮ‘е…ҘйҮ‘${d.bankName ? '(' + d.bankName + ')' : ''}${d.note ? ' / ' + d.note : ''}`,
            income: 0,
            expense: Number(d.amount) || 0
          });
        }
      }

      list.sort((x, y) => (x.date < y.date ? -1 : x.date > y.date ? 1 : 0));
      let bal = Number(this.cashbookCarry) || 0;
      for (const item of list) {
        bal = bal + item.income - item.expense;
        item.balance = bal;
      }
      return list;
    },

    get cashbookSummary() {
      const m = this.cashbookMonth;
      const sum = this.calcMonthCashSummary(m);
      return {
        income: sum.income,

      };

    get cashbookByCategory() {
      const m = this.cashbookMonth;
      const incomeMap = { 'жқҘйҷўеЈІдёҠ(зҸҫйҮ‘)': 0, 'зү©иІ©еЈІдёҠ(зҸҫйҮ‘)': 0 };
      const expenseMap = {};

      for (const v of this.visits) {
        if ((v.date || '').startsWith(m) && v.paymentMethod === 'зҸҫйҮ‘') {
          incomeMap['жқҘйҷўеЈІдёҠ(зҸҫйҮ‘)'] += Number(v.amount) || 0;
        }
      }
      for (const s of this.sales) {
        if ((s.date || '').startsWith(m) && s.paymentMethod === 'зҸҫйҮ‘' && !s.isSample) {
          incomeMap['зү©иІ©еЈІдёҠ(зҸҫйҮ‘)'] += Number(s.amount) || 0;
        }
      }
     for (const e of this.expenses) {
        // гҖҢзҸҫйҮ‘гҖҚгҖҢгғӘгӮҜгғ«гғјгғҲгҖҚгҒ®дёЎж–№гӮ’зҸҫйҮ‘жүұгҒ„гҒЁгҒ—гҒҰгӮ«гғҶгӮҙгғӘйӣҶиЁҲгҒ«еҗ«гӮҒгӮӢ(v0.9.4-fix)
        if ((e.date || '').startsWith(m) && this.isCashLikePayment(e.paymentMethod)) {
          const k = e.category || '(жңӘеҲҶйЎһ)';
          expenseMap[k] = (expenseMap[k] || 0) + (Number(e.amount) || 0);
        }
      }
      for (const a of this.ads) {
        // гҖҢзҸҫйҮ‘гҖҚгҖҢгғӘгӮҜгғ«гғјгғҲгҖҚгҒ®дёЎж–№гӮ’зҸҫйҮ‘жүұгҒ„гҒЁгҒ—гҒҰгӮ«гғҶгӮҙгғӘйӣҶиЁҲгҒ«еҗ«гӮҒгӮӢ(v0.9.4-fix)
        if ((a.date || '').startsWith(m) && this.isCashLikePayment(a.paymentMethod)) {
          const k = `еәғе‘ҠиІ» / ${a.category}`;
          expenseMap[k] = (expenseMap[k] || 0) + (Number(a.amount) || 0);
        }
      }
      // рҹҶ• v0.5: йҠҖиЎҢй җгҒ‘е…ҘгӮҢ
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(m)) {
          const k = `зҸҫйҮ‘е…ҘйҮ‘${d.bankName ? '(' + d.bankName + ')' : ''}`;
          expenseMap[k] = (expenseMap[k] || 0) + (Number(d.amount) || 0);
        }
      }

      const incomeRows = Object.entries(incomeMap)
        .filter(([_, v]) => v > 0)
        .map(([name, amount]) => ({ name, amount }));
      const expenseRows = Object.entries(expenseMap)
        .map(([name, amount]) => ({ name, amount }))
        .sort((a, b) => b.amount - a.amount);

      return { incomeRows, expenseRows };
    },

    emptyDeposit() {

    },

    // ============================================
    // ===== рҹҶ• v0.7: д»•е…ҘиЁҳйҢІж©ҹиғҪ(еҹәжң¬) =====
    // ============================================

    // ============================================
    // ===== рҹҶ• v0.8: еӣһж•°еҲёгғҳгғ«гғ‘гғјй–ўж•° =====
    // ============================================

    emptyTicket() {
      return {
        id: null,
        customerName: '',
        ticketType: '',
        applicableMenu: 'seitai',
        purchaseDate: this.todayStr(),
        totalCount: 0,
        usedCount: 0,
        remainingCount: 0,
        unitPrice: 0,
        remainingValue: 0,
        purchasePrice: 0,
        expiryDate: '',
        lastUsedDate: null,
        status: 'active',
        isLegacy: false,
        linkedVisitId: null,
        note: ''
      };
    },

    resetTicketForm() {
      this.ticketForm = this.emptyTicket();
      this.ticketMessage = '';
    },

    // иіје…Ҙж—ҘгҒӢгӮүNгғ¶жңҲеҫҢгҒ®жңҹйҷҗгӮ’иЁҲз®— вҶ’ 'YYYY-MM-DD'
    calcExpiryDate(purchaseDate, months) {
      if (!purchaseDate) return '';
      const d = new Date(purchaseDate);
      if (isNaN(d.getTime())) return '';
      d.setMonth(d.getMonth() + (Number(months) || 12));
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    },

    // гғҸгӮӨгғ–гғӘгғғгғүе»¶й•·: max(зҸҫеңЁжңҹйҷҗ, еҲ©з”Ёж—Ҙ+Nгғ¶жңҲ)
    extendExpiryDate(currentExpiry, usedDate, months) {
      const proposed = this.calcExpiryDate(usedDate, months);
      if (!currentExpiry) return proposed;
      if (!proposed) return currentExpiry;
      return proposed > currentExpiry ? proposed : currentExpiry;
    },

    // жңҹйҷҗгҒҫгҒ§гҒ®ж®Ӣж—Ҙж•°(йҒҺгҒҺгҒҰгҒ„гӮҢгҒ°гғһгӮӨгғҠгӮ№)
    getDaysUntilExpiry(expiryDate) {
      if (!expiryDate) return null;
      const expiry = new Date(expiryDate);
      const today = new Date(this.todayStr());
      if (isNaN(expiry.getTime())) return null;
      const diffMs = expiry.getTime() - today.getTime();
      return Math.floor(diffMs / (1000 * 60 * 60 * 24));
    },

    // гғҒгӮұгғғгғҲгҒ®гӮ№гғҶгғјгӮҝгӮ№гӮ’еҲӨе®ҡ
    // active = ж®ӢгҒӮгӮҠ&жңҹйҷҗеҶ… / used_up = ж®Ӣ0 / expired = жңҹйҷҗеҲҮгӮҢ
    getTicketStatus(ticket) {
      if (!ticket) return 'active';
      const remaining = Number(ticket.remainingCount) || 0;
      if (remaining <= 0) return 'used_up';
      const days = this.getDaysUntilExpiry(ticket.expiryDate);
      if (days !== null && days < 0) return 'expired';
      return 'active';
    },

    // гғЎгғӢгғҘгғјеҗҚ вҶ’ йҒ©з”ЁеҢәеҲҶ('seitai' / 'maintenance' / null)
    getMenuCategory(menuName) {
      if (!menuName) return null;
      if (menuName.includes('ж•ҙдҪ“') || menuName.includes('гӮӨгғігғҮгӮЈгғҗ')) return 'seitai';
      if (menuName.includes('гғЎгғігғҶгғҠгғігӮ№')) return 'maintenance';
      return null;
    },

    // еҲёзЁ®еҗҚ вҶ’ TICKET_TYPES гҒ®гӮӯгғј
    detectTicketTypeFromMenu(menuName) {
      if (!menuName) return null;
      if (menuName.includes('еӣһж•°еҲёиіје…ҘгғЎгғігғҶгғҠгғігӮ№5еӣһ')) return 'гғЎгғігғҶгғҠгғігӮ№5еӣһеҲё';
      if (menuName.includes('еӣһж•°еҲёиіје…Ҙж•ҙдҪ“10еӣһ')) return 'ж•ҙдҪ“10еӣһеҲё';
      if (menuName.includes('еӣһж•°еҲёиіје…Ҙж•ҙдҪ“20еӣһ')) return 'ж•ҙдҪ“20еӣһеҲё';
      if (menuName.includes('еӣһж•°еҲёиіје…Ҙж•ҙдҪ“30еӣһ')) return 'ж•ҙдҪ“30еӣһеҲё';
      return null;
    },

    // гғҒгӮұгғғгғҲгҒ®еҪ“и©ІгғЎгғӢгғҘгғјгҒ§гҒ®дҪҝз”ЁеҸҜеҗҰеҲӨе®ҡ
    isTicketUsableForMenu(ticket, menuCategory) {
      if (!ticket) return false;
      if (ticket.status && ticket.status !== 'active') return false;
      const am = ticket.applicableMenu;
      if (am === 'all') return true;
      if (am === menuCategory) return true;
      return false;
    },

   // йЎ§е®ўгҒ®гӮўгӮҜгғҶгӮЈгғ–гғҒгӮұгғғгғҲгӮ’еҸ–еҫ—(еҸӨгҒ„иіје…Ҙж—Ҙй Ҷ)
    getActiveTicketsForCustomer(customerName) {
      if (!customerName) return [];
      return this.tickets
        .filter(t => t.customerName === customerName)
        .filter(t => this.getTicketStatus(t) === 'active')
        .sort((a, b) => (a.purchaseDate || '').localeCompare(b.purchaseDate || ''));
    },

    // рҹҶ• v0.9.3: йЎ§е®ўгҒ®жқҘйҷўеұҘжӯҙ(зӣҙиҝ‘10д»¶гҖҒж–°гҒ—гҒ„й Ҷ)
    getCustomerVisitHistory(customerName) {
      if (!customerName) return [];
      const name = customerName.trim();
      if (!name) return [];
      return this.visits
        .filter(v => v.customerName === name)
        .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
        .slice(0, 10);
    },

    // рҹҶ• v0.9.3: зөҢйҒҺж—Ҙж•°гӮ’гҖҢNж—ҘеүҚгҖҚгҖҢ1йҖұй–“еүҚгҖҚгҖҢ3гғ¶жңҲеүҚгҖҚеҪўејҸгҒ§иҝ”гҒҷ
    formatDaysAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const today = new Date(this.todayStr());
      if (isNaN(d.getTime())) return '';
      const diffDays = Math.floor((today.getTime() - d.getTime()) / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return 'жңӘжқҘ';
      if (diffDays === 0) return 'жң¬ж—Ҙ';
      if (diffDays === 1) return 'жҳЁж—Ҙ';
      if (diffDays < 7) return diffDays + 'ж—ҘеүҚ';
      if (diffDays < 30) return Math.floor(diffDays / 7) + 'йҖұй–“еүҚ';
      if (diffDays < 365) return Math.floor(diffDays / 30) + 'гғ¶жңҲеүҚ';
      return Math.floor(diffDays / 365) + 'е№ҙеүҚ';
    },
    
    // рҹҶ• v0.9.1: з·ЁйӣҶдёӯгҒ®еҲёгҒ®еҲ©з”ЁеұҘжӯҙ(visitsз”ұжқҘ)
    // еҗҢгҒҳйЎ§е®ў Г— еҗҢгҒҳйҒ©з”ЁеҢәеҲҶ гҒ® visits гӮ’иіје…Ҙж—ҘгҖңжңҹйҷҗж—ҘгҒ®зҜ„еӣІгҒ§еҸ–еҫ—
    getEditingTicketHistory() {
      const t = this.ticketForm;
      if (!t || !t.id || !t.customerName) return [];
      const am = t.applicableMenu || 'seitai';
      const purchase = t.purchaseDate || '';
      const expiry = t.expiryDate || '';
      return this.visits
        .filter(v => {
          if (v.customerName !== t.customerName) return false;
          if (v.paymentMethod !== 'еӣһж•°еҲёж¶ҲеҢ–') return false;
          const vd = v.date || '';
          if (purchase && vd < purchase) return false;
          if (expiry && vd > expiry) return false;
          const vc = this.getMenuCategory(v.menu || '');
          if (am === 'all') return true;
          return vc === am;
        })
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    },
    // === гғҒгӮұгғғгғҲдҝқеӯҳ(жүӢеӢ•) ===
    canSaveTicket() {
      const t = this.ticketForm;
      return t.customerName && t.ticketType && t.purchaseDate
          && Number(t.totalCount) > 0 && t.expiryDate;
    },

    async saveTicket() {

        this.ticketMessage = t.id ? 'жӣҙж–°гҒ—гҒҫгҒ—гҒҹ' : 'дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ';
        this.ticketMessageType = 'ok';
        this.resetTicketForm();
        setTimeout(() => this.ticketMessage = '', 2500);
      } catch (err) {

    editTicket(t) {
      this.ticketForm = {

    async deleteTicket(t) {
      const label = `${t.customerName} / ${t.ticketType} / ж®Ӣ${t.remainingCount}еӣһ`;
      if (!confirm(`еӣһж•°еҲёгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢ?\n\n${label}\n\nгҒ“гҒ®ж“ҚдҪңгҒҜеҸ–гӮҠж¶ҲгҒӣгҒҫгҒӣгӮ“гҖӮ`)) return;

    // еҲёзЁ®йҒёжҠһжҷӮгҒ«гғҮгғ•гӮ©гғ«гғҲеҖӨгӮ’иҮӘеӢ•жҠ•е…Ҙ(жүӢеӢ•гғ•гӮ©гғјгғ з”Ё)
    onTicketTypeSelected() {
      const t = this.ticketForm;
      const tpl = this.TICKET_TYPES[t.ticketType];
      if (!tpl) return;
      t.totalCount = tpl.count;
      t.usedCount = 0;

      t.purchasePrice = tpl.price;
      t.applicableMenu = tpl.applicableMenu;
