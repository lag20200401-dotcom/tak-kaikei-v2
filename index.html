    },

    // ===== /v0.8 еӣһж•°еҲёгғҳгғ«гғ‘гғјй–ўж•° =====
    // ============================================
    // ===== рҹҶ• v0.8.1 гғ‘гғғгғҒ#3-#7: еӣһж•°еҲёиҮӘеӢ•йҖЈжҗә =====
    // ============================================

    // visit гҒ® paymentMethod гҒЁгғЎгғӢгғҘгғјеҗҚгҒӢгӮүйҖЈжҗәгӮўгӮҜгӮ·гғ§гғігӮ’еҲӨе®ҡ
    // жҲ»гӮҠеҖӨ: 'purchase' | 'consume' | 'none'
    detectVisitTicketAction(visit) {
      if (!visit) return 'none';
      const pm = visit.paymentMethod || '';
      const menu = visit.menu || '';

      // ж¶ҲеҢ–еҲӨе®ҡ: paymentMethod гҒҢжҳҺзӨәзҡ„гҒ«гҖҢеӣһж•°еҲёж¶ҲеҢ–гҖҚ
      if (pm === 'еӣһж•°еҲёж¶ҲеҢ–') return 'consume';

      // иіје…ҘеҲӨе®ҡ: гғЎгғӢгғҘгғјеҗҚгҒ«гҖҢеӣһж•°еҲёиіје…ҘгҖҚгҒҢеҗ«гҒҫгӮҢгҖҒгҒӢгҒӨ TICKET_TYPES гҒ§иӯҳеҲҘеҸҜиғҪ
      if (menu.includes('еӣһж•°еҲёиіје…Ҙ') && this.detectTicketTypeFromMenu(menu)) {
        return 'purchase';
      }
      return 'none';
    },

    // ж—§visits гҒ®йҖЈжҗәгӮ’гғӯгғјгғ«гғҗгғғгӮҜ
    // - purchase гҒ гҒЈгҒҹе ҙеҗҲ: зҙҗд»ҳгҒҸ ticket гӮ’еүҠйҷӨ
    // - consume гҒ гҒЈгҒҹе ҙеҗҲ: зҙҗд»ҳгҒҸ ticket гҒ® usedCount гӮ’1жёӣгӮүгҒҷ(ж®Ӣж•°+1гҖҒstatusеҫ©жҙ»)
    async rollbackTicketLink(oldVisit) {
      const action = this.detectVisitTicketAction(oldVisit);
      if (action === 'none') return;

      const { db, doc, setDoc, deleteDoc, serverTimestamp } = window._fb;

      // зҙҗд»ҳгҒҸ ticket гӮ’жҺўгҒҷ(linkedVisitId гҒ§жӨңзҙў)
      // вҖ» гғЎгғўгғӘдёҠгҒ® this.tickets гӮ’дҝЎй ј(onSnapshotгҒ§жңҖж–°еҢ–гҒ•гӮҢгҒҰгҒ„гӮӢ)
      const linkedTickets = this.tickets.filter(t => t.linkedVisitId === oldVisit.id);

      if (action === 'purchase') {
        // иіје…ҘгҒ®гғӯгғјгғ«гғҗгғғгӮҜ: дҪңжҲҗгҒ—гҒҹеҲёгӮ’еүҠйҷӨ
        for (const t of linkedTickets) {
          try {
            await deleteDoc(doc(db, 'tickets', t.id));
            console.log('вң“ еӣһж•°еҲёеүҠйҷӨ(иіје…Ҙгғӯгғјгғ«гғҗгғғгӮҜ):', t.ticketType);
          } catch (e) {
            console.error('еҲёеүҠйҷӨеӨұж•—:', e);
          }
        }
      } else if (action === 'consume') {
        // ж¶ҲеҢ–гҒ®гғӯгғјгғ«гғҗгғғгӮҜ: usedCount -1 / remainingCount +1
        // вҖ» йҖҡеёёгҒҜ1жһҡгҒ гҒ‘зҙҗд»ҳгҒ„гҒҰгҒ„гӮӢжғіе®ҡ
        for (const t of linkedTickets) {
          try {
            const newUsed = Math.max(0, (Number(t.usedCount) || 0) - 1);
            const total = Number(t.totalCount) || 0;
            const newRemaining = total - newUsed;
            const unitPrice = Number(t.unitPrice) || 0;
            // жңҹйҷҗеҲҮгӮҢгҒ§гҒӘгҒ‘гӮҢгҒ° active гҒ«еҫ©жҙ»
            const days = this.getDaysUntilExpiry(t.expiryDate);
            const newStatus = (days !== null && days < 0) ? 'expired'
                            : newRemaining <= 0 ? 'used_up' : 'active';
            await setDoc(doc(db, 'tickets', t.id), {
              usedCount: newUsed,
              remainingCount: newRemaining,
              remainingValue: newRemaining * unitPrice,
              status: newStatus,
              updatedAt: serverTimestamp()
            }, { merge: true });
            console.log('вң“ еӣһж•°еҲёж®Ӣж•°еҫ©е…ғ(ж¶ҲеҢ–гғӯгғјгғ«гғҗгғғгӮҜ):', t.ticketType, 'ж®Ӣ', newRemaining);
          } catch (e) {
            console.error('еҲёж®Ӣж•°еҫ©е…ғеӨұж•—:', e);
          }
        }
      }
    },

    // ж–°visits гҒ®йҖЈжҗәгӮ’йҒ©з”Ё
    // жҲ»гӮҠеҖӨ: { ok: boolean, warning: string }
    async applyTicketLink(visit, visitId) {
      const action = this.detectVisitTicketAction(visit);
      if (action === 'none') return { ok: true, warning: '' };

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;

      if (action === 'purchase') {
        // еҲёзЁ®гӮ’гғЎгғӢгғҘгғјеҗҚгҒӢгӮүеҲӨе®ҡ
        const typeKey = this.detectTicketTypeFromMenu(visit.menu);
        if (!typeKey) {
          return { ok: false, warning: 'вҡ пёҸ еҲёзЁ®гӮ’иҮӘеӢ•еҲӨе®ҡгҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮеӣһж•°еҲёгӮҝгғ–гҒ§жүӢеӢ•иҝҪеҠ гҒ—гҒҰгҒҸгҒ гҒ•гҒ„' };
        }
        const tpl = this.TICKET_TYPES[typeKey];
        if (!tpl) {
          return { ok: false, warning: 'вҡ пёҸ еҲёзЁ®гғҶгғігғ—гғ¬гғјгғҲгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“: ' + typeKey };
        }

        try {
          const newRef = doc(collection(db, 'tickets'));
          const expiryDate = this.calcExpiryDate(visit.date, tpl.expiryMonths);
          await setDoc(newRef, {
            customerName: visit.customerName,
            ticketType: typeKey,
            applicableMenu: tpl.applicableMenu,
            purchaseDate: visit.date,
            totalCount: tpl.count,
            usedCount: 0,
            remainingCount: tpl.count,
            unitPrice: tpl.unitPrice,
            remainingValue: tpl.count * tpl.unitPrice,
            purchasePrice: tpl.price,
            expiryDate: expiryDate,
            lastUsedDate: null,
            status: 'active',
            isLegacy: false,
            linkedVisitId: visitId,
            note: '',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          console.log('вң“ еӣһж•°еҲёдҪңжҲҗ(иіје…ҘйҖЈжҗә):', typeKey, visit.customerName);
          return { ok: true, warning: '' };
        } catch (e) {
          console.error('еҲёдҪңжҲҗеӨұж•—:', e);
          return { ok: false, warning: 'вҡ пёҸ еҲёдҪңжҲҗгӮЁгғ©гғј: ' + e.message };
        }
      }

      if (action === 'consume') {
        // гғЎгғӢгғҘгғјеҗҚгҒӢгӮүйҒ©з”ЁеҢәеҲҶгӮ’еҲӨе®ҡ
        const menuCat = this.getMenuCategory(visit.menu);
        if (!menuCat) {
          return { ok: false, warning: 'вҡ пёҸ гғЎгғӢгғҘгғјгҒӢгӮүйҒ©з”ЁеҢәеҲҶгӮ’еҲӨе®ҡгҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ(ж•ҙдҪ“/гғЎгғігғҶгғҠгғігӮ№гҒ®гҒ„гҒҡгӮҢгҒӢеҝ…й Ҳ)' };
        }

        // йЎ§е®ўгҒ®гӮўгӮҜгғҶгӮЈгғ–еҲёгӮ’еҸӨгҒ„й ҶгҒ«еҸ–еҫ—гҒ—гҖҒйҒ©з”ЁеҸҜиғҪгҒӘжңҖеҲқгҒ®еҲёгӮ’йҒёгҒ¶
        const actives = this.getActiveTicketsForCustomer(visit.customerName);
        const usable = actives.find(t => this.isTicketUsableForMenu(t, menuCat));

        if (!usable) {
          return {
            ok: false,
            warning: `вҡ пёҸ ${visit.customerName}гҒ®йҒ©з”ЁеҸҜиғҪгҒӘеӣһж•°еҲё(${menuCat})гҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“гҖӮеӣһж•°еҲёгӮҝгғ–гҒ§жүӢеӢ•иҝҪеҠ гҒ—гҒҰгҒҸгҒ гҒ•гҒ„`
          };
        }

        try {
          const newUsed = (Number(usable.usedCount) || 0) + 1;
          const total = Number(usable.totalCount) || 0;
          const newRemaining = Math.max(0, total - newUsed);
          const unitPrice = Number(usable.unitPrice) || 0;
          // гғҸгӮӨгғ–гғӘгғғгғүжңҹйҷҗе»¶й•·: max(зҸҫеңЁжңҹйҷҗ, еҲ©з”Ёж—Ҙ+12гғ¶жңҲ)
          const newExpiry = this.extendExpiryDate(usable.expiryDate, visit.date, 12);
          const newStatus = newRemaining <= 0 ? 'used_up' : 'active';

          await setDoc(doc(db, 'tickets', usable.id), {
            usedCount: newUsed,
            remainingCount: newRemaining,
            remainingValue: newRemaining * unitPrice,
            expiryDate: newExpiry,
            lastUsedDate: visit.date,
            status: newStatus,
            linkedVisitId: visitId,
            updatedAt: serverTimestamp()
          }, { merge: true });

          console.log('вң“ еӣһж•°еҲёж¶ҲеҢ–:', usable.ticketType, visit.customerName, 'ж®Ӣ', newRemaining);
          return { ok: true, warning: '' };
        } catch (e) {
          console.error('еҲёж¶ҲеҢ–еӨұж•—:', e);
          return { ok: false, warning: 'вҡ пёҸ еҲёж¶ҲеҢ–гӮЁгғ©гғј: ' + e.message };
        }
      }

      return { ok: true, warning: '' };
    },

    // ===== /v0.8.1 гғ‘гғғгғҒ#3-#7 =====
    // ============================================
    // ===== рҹҶ• v0.8.2 гғ‘гғғгғҒ#8: еӣһж•°еҲёгӮҝгғ–йӣҶиЁҲ =====
    // ============================================

    // е…ЁгғҒгӮұгғғгғҲгӮ’жңҖж–°гҒ®гӮ№гғҶгғјгӮҝгӮ№гҒ«жӯЈиҰҸеҢ–гҒ—гҒҰиҝ”гҒҷ
    // (FirestoreгҒ® status гғ•гӮЈгғјгғ«гғүгҒҢеҸӨгҒҸгҒҰгӮӮгҖҒжңҹйҷҗеҲҮгӮҢгҒӘгӮү expired гҒЁиҝ”гҒҷ)
    get normalizedTickets() {
      return this.tickets.map(t => ({
        ...t,
        _status: this.getTicketStatus(t),
        _daysLeft: this.getDaysUntilExpiry(t.expiryDate)
      }));
    },

    // жңҹйҷҗеҲҮгӮҢгҒ гҒҢж®Ӣж•°гҒҢгҒӮгӮӢгҖҢдәӢж•…гҖҚеҲё(иӯҰе‘ҠеҜҫиұЎ)
    get expiredButHasRemaining() {
      return this.normalizedTickets.filter(t =>
        t._status === 'expired' && (Number(t.remainingCount) || 0) > 0
      );
    },

    // гӮ№гғҶгғјгӮҝгӮ№еҲҘд»¶ж•°(гӮөгғһгғӘгғјгӮ«гғјгғүз”Ё)
    get ticketCounts() {
      const c = { active: 0, expiring: 0, expired: 0, used_up: 0, legacy: 0, total: 0 };
      for (const t of this.normalizedTickets) {
        c.total++;
        if (t.isLegacy) c.legacy++;
        if (t._status === 'active') {
          c.active++;
          if (t._daysLeft !== null && t._daysLeft <= 30) c.expiring++;
        } else if (t._status === 'expired') {
          c.expired++;
        } else if (t._status === 'used_up') {
          c.used_up++;
        }
      }
      return c;
    },

   // зҸҫеңЁгҒ®гғ•гӮЈгғ«гӮҝгҒ«еҗҲиҮҙгҒҷгӮӢгғҒгӮұгғғгғҲ
    get filteredTickets() {
      const f = this.ticketFilter;
      const q = (this.ticketSearchName || '').trim();
      return this.normalizedTickets.filter(t => {
        // рҹҶ• v0.8.4: еҗҚеүҚжӨңзҙўгғ•гӮЈгғ«гӮҝ
        if (q && !(t.customerName || '').includes(q)) return false;
        if (f === 'all') return true;
        if (f === 'legacy') return !!t.isLegacy;
        if (f === 'expiring') {
          return t._status === 'active' && t._daysLeft !== null && t._daysLeft <= 30;
        }
        if (f === 'active') return t._status === 'active';
        if (f === 'expired') return t._status === 'expired';
        if (f === 'used_up') return t._status === 'used_up';
        return true;
      });
    },

    // йЎ§е®ўеҗҚгҒ§гӮ°гғ«гғјгғ”гғігӮ° вҶ’ [{ customerName, tickets[], totalRemaining }, ...]
    get groupedTickets() {
      const map = {};
      for (const t of this.filteredTickets) {
        const key = t.customerName || '(йЎ§е®ўеҗҚгҒӘгҒ—)';
        if (!map[key]) {
          map[key] = { customerName: key, tickets: [], totalRemaining: 0, totalValue: 0 };
        }
        map[key].tickets.push(t);
        if (t._status === 'active') {
          map[key].totalRemaining += Number(t.remainingCount) || 0;
          map[key].totalValue += Number(t.remainingValue) || 0;
        }
      }
      // гӮ°гғ«гғјгғ—еҶ…гҒ®гғҒгӮұгғғгғҲгӮ’иіје…Ҙж—ҘжҳҮй Ҷ
      for (const k in map) {
        map[k].tickets.sort((a, b) => (a.purchaseDate || '').localeCompare(b.purchaseDate || ''));
      }
      // гӮ°гғ«гғјгғ—гӮ’йЎ§е®ўеҗҚгҒ§гӮҪгғјгғҲ(гҒөгӮҠгҒҢгҒӘгҒҢгҒӮгӮҢгҒ°е„Әе…ҲгҖҒгҒӘгҒ‘гӮҢгҒ°еҗҚеүҚ)
      return Object.values(map).sort((a, b) =>
        (a.customerName || '').localeCompare(b.customerName || '', 'ja')
      );
    },

    // ж®Ӣж•°гғҗгғғгӮёгҒ®иүІгӮҜгғ©гӮ№
    ticketCountColor(count, status) {
      if (status === 'expired' || status === 'used_up') return 'bg-slate-200 text-slate-500';
      const n = Number(count) || 0;
      if (n === 0) return 'bg-slate-200 text-slate-500';
      if (n <= 2) return 'bg-red-100 text-red-700';
      if (n <= 5) return 'bg-amber-100 text-amber-700';
      return 'bg-emerald-100 text-emerald-700';
    },

    // жңҹйҷҗгҒ®иүІгӮҜгғ©гӮ№
    expiryDateColor(daysLeft) {
      if (daysLeft === null) return 'text-slate-400';
      if (daysLeft < 0) return 'text-red-600 font-bold';
      if (daysLeft <= 30) return 'text-amber-600 font-medium';
      return 'text-slate-600';
    },

    // жңҹйҷҗиЎЁзӨәз”ЁгғҶгӮӯгӮ№гғҲ
    formatExpiry(t) {
      if (!t.expiryDate) return '-';
      const d = t._daysLeft;
      if (d === null) return t.expiryDate;
      if (d < 0) return `${t.expiryDate} (${Math.abs(d)}ж—ҘзөҢйҒҺ)`;
      if (d === 0) return `${t.expiryDate} (жң¬ж—Ҙ)`;
      if (d <= 30) return `${t.expiryDate} (ж®Ӣ${d}ж—Ҙ)`;
      return t.expiryDate;
    },

    // гӮ№гғҶгғјгӮҝгӮ№иЎЁзӨәз”ЁгғҶгӮӯгӮ№гғҲгғ»иүІ
    statusLabel(status) {
      return { active: 'жңүеҠ№', used_up: 'дҪҝгҒ„еҲҮгӮҠ', expired: 'жңҹйҷҗеҲҮгӮҢ' }[status] || status;
    },
    statusColor(status) {
      return {
        active: 'bg-emerald-100 text-emerald-700',
        used_up: 'bg-slate-200 text-slate-600',
        expired: 'bg-red-100 text-red-700'
      }[status] || 'bg-slate-100 text-slate-600';
    },

    // йҒ©з”ЁеҢәеҲҶгҒ®иЎЁзӨәеҗҚ
    applicableMenuLabel(am) {
      return { all: 'е…ЁгғЎгғӢгғҘгғј', seitai: 'ж•ҙдҪ“', maintenance: 'гғЎгғігғҶгғҠгғігӮ№' }[am] || am;
    },

    // жүӢеӢ•иҝҪеҠ гғўгғјгғҖгғ«й–Ӣй–ү
    ticketModalOpen: false,
    openTicketModal() {
      this.resetTicketForm();
      this.ticketModalOpen = true;
    },
    openTicketModalForEdit(t) {
      this.editTicket(t);
      this.ticketModalOpen = true;
    },

    // ===== /v0.8.2 гғ‘гғғгғҒ#8 йӣҶиЁҲ =====
    // ===== /v0.8 еӣһж•°еҲёгғҳгғ«гғ‘гғјй–ўж•° =====
    // ============================================
    // ===== рҹҶ• v0.9: гӮөгғ–гӮ№гӮҜгғҳгғ«гғ‘гғјй–ўж•° =====
    // ============================================

    // гғ•гӮЈгғ«гӮҝеҫҢгҒ®гӮөгғ–гӮ№гӮҜдёҖиҰ§
    get filteredSubscriptions() {
      const f = this.subscriptionFilter;
      const q = (this.subscriptionSearchName || '').trim();
      return this.subscriptions.filter(s => {
        if (q && !(s.customerName || '').includes(q)) return false;
        if (f === 'all') return true;
        return s.status === f;
      });
    },

    // гӮөгғһгғӘгғј(гӮўгӮҜгғҶгӮЈгғ–д»¶ж•°гғ»жңҲж¬Ўе…ҘйҮ‘еҗҲиЁҲ)
    get subscriptionSummary() {
      let activeCount = 0;
      let monthlyTotal = 0;
      for (const s of this.subscriptions) {
        if (s.status === 'active') {
          activeCount++;
          monthlyTotal += Number(s.monthlyAmount) || 0;
        }
      }
      return { activeCount, monthlyTotal };
    },

    // зҠ¶ж…ӢгҒ®иЎЁзӨәиүІ
    subscriptionStatusColor(status) {
      return {
        active:    'bg-emerald-100 text-emerald-700',
        paused:    'bg-amber-100 text-amber-700',
        cancelled: 'bg-slate-200 text-slate-600'
      }[status] || 'bg-slate-100 text-slate-600';
    },

    // зҠ¶ж…ӢгҒ®иЎЁзӨәгғҶгӮӯгӮ№гғҲ
    subscriptionStatusLabel(status) {
      return {
        active:    'гӮўгӮҜгғҶгӮЈгғ–',
        paused:    'дёҖжҷӮеҒңжӯў',
        cancelled: 'и§Јзҙ„жёҲ'
      }[status] || status;
    },

    // ===== CRUDй–ўж•°(жң¬зү©) =====
    
    emptySubscription() {
      return {
        id: null,
        customerName: '',
        customerId: null,
        planType: 'subsc_square',
        unitAmount: 8800,
        units: 1,
        monthlyAmount: 8800,
        paymentMethod: 'гӮ№гӮҜгӮЁгӮў',
        startDate: this.todayStr(),
        endDate: null,
        status: 'active',
        billingDay: 1,
        note: ''
      };
    },

    resetSubscriptionForm() {
      this.subscriptionForm = this.emptySubscription();
      this.subscriptionMessage = '';
    },

    canSaveSubscription() {
      const s = this.subscriptionForm;
      return s.customerName && s.planType && s.units >= 1 && s.startDate;
    },

    openSubscriptionModal() {
      this.resetSubscriptionForm();
      this.subscriptionModalOpen = true;
    },

    editSubscription(s) {
      // ж—ўеӯҳеҘ‘зҙ„гғҮгғјгӮҝгӮ’гғ•гӮ©гғјгғ гҒ«еұ•й–ӢгҒ—гҒҰгғўгғјгғҖгғ«гӮ’й–ӢгҒҸ
      this.subscriptionForm = {
        id: s.id,
        customerName: s.customerName || '',
        customerId: s.customerId || null,
        planType: s.planType || 'subsc_square',
        unitAmount: Number(s.unitAmount) || 8800,
        units: Number(s.units) || 1,
        monthlyAmount: Number(s.monthlyAmount) || 8800,
        paymentMethod: s.paymentMethod || (s.planType === 'subsc_life' ? 'гғ©гӮӨгғ•гӮ«гғјгғү' : 'гӮ№гӮҜгӮЁгӮў'),
        startDate: s.startDate || this.todayStr(),
        endDate: s.endDate || null,
        status: s.status || 'active',
        billingDay: s.planType === 'subsc_square' ? 1 : null,
        note: s.note || ''
      };
      this.subscriptionMessage = '';
      this.subscriptionModalOpen = true;
    },
    async saveSubscription() {
      if (!this.canSaveSubscription()) {
        this.subscriptionMessage = 'еҝ…й Ҳй …зӣ®гҒҢжңӘе…ҘеҠӣгҒ§гҒҷ';
        this.subscriptionMessageType = 'err';
        return;
      }
      // рҹҶ• v0.9.0-b2: еҲқеӣһ payment иҮӘеӢ•з”ҹжҲҗ
      // ж–°иҰҸгӮ№гӮҜгӮЁгӮўеҘ‘зҙ„гҒ§ startYM >= д»ҠжңҲ гҒ®е ҙеҗҲгҖҒеҘ‘зҙ„гғһгӮ№гӮҝгғј+еҲқеӣһpaymentгӮ’еҗҢгҒҳwriteBatchгҒ§жӣёгҒҚиҫјгӮҖгҖӮ
      // еҲқеӣһpaymentгҒҜ status='paid'(еҘ‘зҙ„ж—ҘгҒ«жұәжёҲжёҲгҒЁгҒ—гҒҰжүұгҒҶ)гҖӮ
      const { db, collection, doc, writeBatch, serverTimestamp } = window._fb;
      this.saving = true;
      this.subscriptionMessage = '';

      try {
        const s = this.subscriptionForm;
        const unitAmount = Number(s.unitAmount) || 8800;
        const units = Number(s.units) || 1;
        const monthlyAmount = unitAmount * units;
        const isNew = !s.id;

        const subRef = isNew
          ? doc(collection(db, 'subscriptions'))
          : doc(db, 'subscriptions', s.id);

        const subData = {
          customerName: (s.customerName || '').trim(),
          customerId: s.customerId || null,
          planType: s.planType,
          unitAmount: unitAmount,
          units: units,
          monthlyAmount: monthlyAmount,
          paymentMethod: s.paymentMethod,
          startDate: s.startDate,
          endDate: s.endDate || null,
          status: s.status || 'active',
          billingDay: s.planType === 'subsc_square' ? 1 : null,
          note: s.note || '',
          updatedAt: serverTimestamp()
        };
        if (isNew) subData.createdAt = serverTimestamp();
        // writeBatch гҒ§жӣёгҒҚиҫјгҒҝ
        const batch = writeBatch(db);
        batch.set(subRef, subData, { merge: !isNew });

        // рҹҶ• еҲқеӣһ payment иҮӘеӢ•з”ҹжҲҗеҲӨе®ҡ
        // жқЎд»¶: ж–°иҰҸ AND гӮ№гӮҜгӮЁгӮў AND startYM >= д»ҠжңҲ
        let firstPaymentGenerated = false;
        if (isNew && s.planType === 'subsc_square') {
          const startYM = (s.startDate || '').substring(0, 7);
          const todayYM = this.todayStr().substring(0, 7);
          if (startYM && startYM >= todayYM) {
            const paymentRef = doc(collection(db, 'subscription_payments'));
            batch.set(paymentRef, {
              subscriptionId: subRef.id,
              customerName: (s.customerName || '').trim(),
              customerId: s.customerId || null,
              yearMonth: startYM,
              scheduledDate: s.startDate,
              paidDate: s.startDate,
              amount: monthlyAmount,
              status: 'paid',
              paymentMethod: 'гӮ№гӮҜгӮЁгӮў',
              note: 'еҲқеӣһгғ»еҘ‘зҙ„ж—ҘжұәжёҲ',
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp()
            });
            firstPaymentGenerated = true;
          }
        }

        await batch.commit();

        this.subscriptionMessage = (isNew ? 'иҝҪеҠ гҒ—гҒҫгҒ—гҒҹ' : 'жӣҙж–°гҒ—гҒҫгҒ—гҒҹ')
          + (firstPaymentGenerated ? ' / еҲқеӣһжү•гҒ„иҫјгҒҝиЁҳйҢІгӮӮз”ҹжҲҗ' : '');
        this.subscriptionMessageType = 'ok';
        this.resetSubscriptionForm();
        setTimeout(() => this.subscriptionMessage = '', 3000);
      } catch (e) {
        console.error(e);
        this.subscriptionMessage = 'гӮЁгғ©гғј: ' + e.message;
        this.subscriptionMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },
    // рҹҶ• v0.9.0-b3: еҖӢеҲҘ paid еҢ–(жңӘе…ҘйҮ‘ вҶ’ е…ҘйҮ‘жёҲ)
    async markAsPaid(p) {
      const { db, doc, writeBatch, serverTimestamp } = window._fb;
      this.saving = true;
      try {
        const batch = writeBatch(db);
        batch.update(doc(db, 'subscription_payments', p.id), {
          status: 'paid',
          paidDate: this.todayStr(),
          updatedAt: serverTimestamp()
        });
        await batch.commit();
        this.subscriptionMessage = `${p.customerName} гӮ’е…ҘйҮ‘жёҲгҒ«гҒ—гҒҫгҒ—гҒҹ`;
        this.subscriptionMessageType = 'ok';
        setTimeout(() => this.subscriptionMessage = '', 3000);
      } catch (e) {
        console.error(e);
        this.subscriptionMessage = 'гӮЁгғ©гғј: ' + e.message;
        this.subscriptionMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },
// рҹҶ• v0.9.0-b4: жңҲеҚҳдҪҚгҒ§жңӘе…ҘйҮ‘гӮ’дёҖжӢ¬ paid еҢ–
    async markAllAsPaid() {
      const pendings = this.filteredPayments.filter(p => p.status === 'pending');
      if (pendings.length === 0) {
        alert('е…ҘйҮ‘еҫ…гҒЎгҒ®и«ӢжұӮгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“');
        return;
      }
      const total = pendings.reduce((s, p) => s + (p.amount || 0), 0);

        `${this.paymentTargetMonth} гҒ®жңӘе…ҘйҮ‘ ${pendings.length} д»¶\n` +
        `(ВҘ${total.toLocaleString()})гӮ’е…ЁгҒҰе…ҘйҮ‘жёҲгҒ«гҒ—гҒҫгҒҷгҒӢ?`
      )) return;

      const { db, doc, writeBatch, serverTimestamp } = window._fb;
      this.saving = true;
      try {
        const today = this.todayStr();
        const batch = writeBatch(db);
        pendings.forEach(p => {
          batch.update(doc(db, 'subscription_payments', p.id), {
            status: 'paid',
            paidDate: today,
            updatedAt: serverTimestamp()
          });

        await batch.commit();
        this.subscriptionMessage = `${pendings.length} д»¶гӮ’е…ҘйҮ‘жёҲгҒ«гҒ—гҒҫгҒ—гҒҹ(ВҘ${total.toLocaleString()})`;
        this.subscriptionMessageType = 'ok';
        setTimeout(() => this.subscriptionMessage = '', 4000);
      } catch (e) {
        console.error(e);
        this.subscriptionMessage = 'гӮЁгғ©гғј: ' + e.message;
        this.subscriptionMessageType = 'err';

        this.saving = false;
      }
    },
    // рҹҶ• v0.9.0-b3: еҖӢеҲҘ paid еҸ–ж¶Ҳ(е…ҘйҮ‘жёҲ вҶ’ жңӘе…ҘйҮ‘)
    async markAsPending(p) {
      if (!confirm(`${p.customerName} гҒ®е…ҘйҮ‘гӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢ?`)) return;
      const { db, doc, writeBatch, serverTimestamp } = window._fb;
      this.saving = true;
      try {
        const batch = writeBatch(db);
        batch.update(doc(db, 'subscription_payments', p.id), {
          status: 'pending',
          paidDate: null,
          updatedAt: serverTimestamp()
        });
        await batch.commit();
        this.subscriptionMessage = `${p.customerName} гӮ’жңӘе…ҘйҮ‘гҒ«жҲ»гҒ—гҒҫгҒ—гҒҹ`;
        this.subscriptionMessageType = 'ok';
        setTimeout(() => this.subscriptionMessage = '', 3000);
      } catch (e) {
        console.error(e);
        this.subscriptionMessage = 'гӮЁгғ©гғј: ' + e.message;
        this.subscriptionMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },
   async deleteSubscription(s) {
      const label = `${s.customerName} / ${s.planType === 'subsc_square' ? 'гӮ№гӮҜгӮЁгӮў' : 'гғ©гӮӨгғ•'} ${s.units}еҸЈ ВҘ${(s.monthlyAmount||0).toLocaleString()}/жңҲ`;
      const { db, collection, doc, deleteDoc, query, where, getDocs, writeBatch, serverTimestamp } = window._fb;

      // зҙҗд»ҳгҒҸжңӘжү•гҒ„ payment гӮ’еҸ–еҫ—
      const pendingSnap = await getDocs(
        query(collection(db, 'subscription_payments'),
          where('subscriptionId', '==', s.id),
          where('status', '==', 'pending'))
      );
      const pendingCount = pendingSnap.size;

      const msg = pendingCount > 0
        ? `гӮөгғ–гӮ№гӮҜеҘ‘зҙ„гӮ’еүҠйҷӨгҒ—гҒҫгҒҷ:\n\n${label}\n\nвҡ пёҸ зҙҗд»ҳгҒҸжңӘжү•гҒ„гҒ®и«ӢжұӮгҒҢ ${pendingCount} д»¶гҒӮгӮҠгҒҫгҒҷгҖӮ\nеҘ‘зҙ„гҒЁдёҖз·’гҒ«еүҠйҷӨгҒ•гӮҢгҒҫгҒҷгҖӮ\n\nгҒ“гҒ®ж“ҚдҪңгҒҜеҸ–гӮҠж¶ҲгҒӣгҒҫгҒӣгӮ“гҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢ?`
        : `гӮөгғ–гӮ№гӮҜеҘ‘зҙ„гӮ’еүҠйҷӨгҒ—гҒҫгҒҷ:\n\n${label}\n\nгҒ“гҒ®ж“ҚдҪңгҒҜеҸ–гӮҠж¶ҲгҒӣгҒҫгҒӣгӮ“гҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢ?`;

      if (!confirm(msg)) return;

      this.saving = true;
      try {
        const batch = writeBatch(db);
        batch.delete(doc(db, 'subscriptions', s.id));
        pendingSnap.docs.forEach(d => batch.delete(doc(db, 'subscription_payments', d.id)));
        await batch.commit();

        this.subscriptionMessage = pendingCount > 0
          ? `еҘ‘зҙ„гӮ’еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ(жңӘжү•гҒ„ ${pendingCount} д»¶гӮӮеүҠйҷӨ)`
          : 'еҘ‘зҙ„гӮ’еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ';
        this.subscriptionMessageType = 'ok';
        setTimeout(() => this.subscriptionMessage = '', 4000);
      } catch (err) {
        alert('еүҠйҷӨгӮЁгғ©гғј: ' + err.message);
      } finally {
        this.saving = false;
      }
    },

// ===== рҹҶ• v0.9.0-a2: жңҲж¬Ўжү•гҒ„иҫјгҒҝиЁҳйҢІ =====

    // еҜҫиұЎжңҲгҒ®paymentдёҖиҰ§
    get filteredPayments() {
      const ym = this.paymentTargetMonth;
      if (!ym) return [];
      return this.subscriptionPayments
        .filter(p => p.yearMonth === ym)
        .sort((a, b) => {
          // жңӘе…ҘйҮ‘гӮ’е…ҲгҒ«гҖҒгҒқгҒ®дёӯгҒ§йЎ§е®ўеҗҚжҳҮй Ҷ
          if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
          return (a.customerName || '').localeCompare(b.customerName || '', 'ja');
        });
    },

    // рҹҶ• v0.9.0-d: жңҲеҶ…гӮөгғ–гӮ№гӮҜеҲ©з”Ёеӣһж•°гӮ’йЎ§е®ўеҗҚгҒ”гҒЁгҒ«йӣҶиЁҲ
    get visitCountsByCustomerForMonth() {
      const ym = this.paymentTargetMonth;
      if (!ym) return {};
      const counts = {};
      for (const v of this.visits) {
        if (!(v.date || '').startsWith(ym)) continue;
        if (v.paymentMethod !== 'гӮөгғ–гӮ№гӮҜеҲ©з”Ё') continue;
        const name = v.customerName || '';
        if (!counts[name]) counts[name] = { count: 0, dates: [] };
        counts[name].count++;
        counts[name].dates.push(v.date);
      }
      return counts;
    },

    // рҹҶ• v0.9.0-d: жңҲеҶ…жқҘйҷўгҒ®иЎЁзӨәиүІгӮҜгғ©гӮ№
    subscUsageColor(count, status) {
      if (status !== 'paid') return 'text-slate-400';
      if (count === 0) return 'text-amber-600 font-bold';
      if (count === 1) return 'text-emerald-600 font-medium';
      return 'text-blue-600 font-medium';
    },
    // гӮөгғһгғӘгғј(д»¶ж•°гғ»йҮ‘йЎҚ)
    get paymentSummary() {
      const list = this.filteredPayments;
      let paid = 0, pending = 0, paidAmount = 0, pendingAmount = 0;
      for (const p of list) {
        if (p.status === 'paid') {
          paid++;
          paidAmount += Number(p.amount) || 0;
        } else {
          pending++;
          pendingAmount += Number(p.amount) || 0;
        }
      }
      return {
        total: list.length,
        totalAmount: paidAmount + pendingAmount,
        paid, paidAmount,
        pending, pendingAmount
      };
    },

    // жңҲж¬ЎдёҖжӢ¬з”ҹжҲҗ
    async generateMonthlyPayments() {
      const yearMonth = this.paymentTargetMonth;
      if (!yearMonth) {
        alert('еҜҫиұЎжңҲгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
        return;
      }
      const { db, collection, doc, writeBatch, serverTimestamp } = window._fb;

      // 1. ж—ўеӯҳгғҒгӮ§гғғгӮҜ
      const existing = this.subscriptionPayments.filter(p => p.yearMonth === yearMonth);
      if (existing.length > 0) {
        if (!confirm(`${yearMonth} гҒ®и«ӢжұӮгҒҜж—ўгҒ« ${existing.length} д»¶з”ҹжҲҗгҒ•гӮҢгҒҰгҒ„гҒҫгҒҷгҖӮ\n\nж—ўеӯҳеҘ‘зҙ„гҒ«еҜҫгҒ—гҒҰиҝҪеҠ гҒ§з”ҹжҲҗгҒ—гҒҫгҒҷгҒӢ?\n(ж—ўгҒ«з”ҹжҲҗжёҲгҒҝгҒ®еҘ‘зҙ„гҒҜгӮ№гӮӯгғғгғ—гҒ•гӮҢгҒҫгҒҷ)`)) return;
      }

      // 2. йҒҺеҺ»жңҲгҒёгҒ®з”ҹжҲҗиӯҰе‘Ҡ
      const todayYM = this.todayStr().substring(0, 7);
      if (yearMonth < todayYM) {
        if (!confirm(`вҡ пёҸ ${yearMonth} гҒҜйҒҺеҺ»жңҲгҒ§гҒҷгҖӮ\n\nжң¬еҪ“гҒ«з”ҹжҲҗгҒ—гҒҫгҒҷгҒӢ?`)) return;
      }

      // 3. гӮўгӮҜгғҶгӮЈгғ–гҒӘ subsc_square еҘ‘зҙ„гӮ’еҸ–еҫ—
      const activeSquare = this.subscriptions.filter(s =>
        s.status === 'active' && s.planType === 'subsc_square'
      );

      if (activeSquare.length === 0) {
        alert('гӮўгӮҜгғҶгӮЈгғ–гҒӘгӮ№гӮҜгӮЁгӮўеҘ‘зҙ„гҒҢгҒӮгӮҠгҒҫгҒӣгӮ“');
        return;
      }

      // 4. ж—ўеӯҳ payment гҒҢз„ЎгҒ„еҘ‘зҙ„гҒ гҒ‘з”ҹжҲҗеҜҫиұЎ
      const existingSubIds = new Set(existing.map(p => p.subscriptionId));
      const targets = activeSquare.filter(s => !existingSubIds.has(s.id));

      if (targets.length === 0) {
        alert(`${yearMonth} гҒ®и«ӢжұӮгҒҜе…ЁгҒҰгҒ®еҘ‘зҙ„гҒ«гҒӨгҒ„гҒҰж—ўгҒ«з”ҹжҲҗжёҲгҒҝгҒ§гҒҷ`);
        return;
      }

      // 5. зўәиӘҚгғҖгӮӨгӮўгғӯгӮ°
      const total = targets.reduce((sum, s) => sum + (s.monthlyAmount || 0), 0);
      const preview = targets.slice(0, 10).map(s =>
        `гғ»${s.customerName} ВҘ${(s.monthlyAmount || 0).toLocaleString()}`
      ).join('\n');
      const more = targets.length > 10 ? `\n... д»– ${targets.length - 10} д»¶` : '';
      if (!confirm(
        `${yearMonth} гҒ®и«ӢжұӮгӮ’ ${targets.length} д»¶ з”ҹжҲҗгҒ—гҒҫгҒҷгҖӮ\n\n` +
        `еҗҲиЁҲ: ВҘ${total.toLocaleString()}\n\n` +
        preview + more
      )) return;

      // 6. дёҖжӢ¬жӣёгҒҚиҫјгҒҝ(writeBatch)
      this.saving = true;
      try {
        const batch = writeBatch(db);
        const [year, month] = yearMonth.split('-');
        const scheduledDate = `${year}-${month}-01`;

        targets.forEach(s => {
          const ref = doc(collection(db, 'subscription_payments'));
          batch.set(ref, {
            subscriptionId: s.id,
            customerName: s.customerName,
            customerId: s.customerId || null,
            yearMonth: yearMonth,
            scheduledDate: scheduledDate,
            paidDate: null,
            amount: s.monthlyAmount,
            status: 'pending',    
            paymentMethod: 'гӮ№гӮҜгӮЁгӮў',
            note: '',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
        });

        await batch.commit();
        this.subscriptionMessage = `${targets.length} д»¶гҒ®и«ӢжұӮгӮ’з”ҹжҲҗгҒ—гҒҫгҒ—гҒҹ(еҗҲиЁҲ ВҘ${total.toLocaleString()})`;
        this.subscriptionMessageType = 'ok';
        setTimeout(() => this.subscriptionMessage = '', 5000);
      } catch (e) {
        console.error(e);
        this.subscriptionMessage = 'з”ҹжҲҗгӮЁгғ©гғј: ' + e.message;
        this.subscriptionMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },

    // ===== /v0.9.0-a2 жңҲж¬Ўжү•гҒ„иҫјгҒҝиЁҳйҢІ =====
    // ===== /v0.9 гӮөгғ–гӮ№гӮҜгғҳгғ«гғ‘гғјй–ўж•° =====

    // ============================================
    // ===== рҹҶ• v0.9.5: жңҲй–“зөұиЁҲгӮЁгғігӮёгғі =====
    // ============================================

    // йЎ§е®ўгҒ®еҲқеӣһжқҘйҷўж—ҘгӮ’еҸ–еҫ—(customers_tempе„Әе…ҲгҖҒгҒӘгҒ‘гӮҢгҒ°visitsгҒ®жңҖеҸӨжқҘйҷў)
    _getFirstVisitDate(customerName) {
      const c = this.customersTemp.find(c => c.name === customerName);
      if (c && c.firstVisitDate) return c.firstVisitDate;
      const vs = this.visits
        .filter(v => v.customerName === customerName)
        .map(v => v.date || '')
        .filter(Boolean)
        .sort();
      return vs.length ? vs[0] : null;
    },

    // жқҘйҷўгҒҢгҖҢж–°иҰҸжңҹй–“еҶ…(еҲқеӣһжқҘйҷўж—ҘгҒӢгӮү30ж—Ҙд»ҘеҶ…)гҖҚгҒӢеҲӨе®ҡ
    _isNewWithin30Days(visit) {
      const fvd = this._getFirstVisitDate(visit.customerName);
      if (!fvd) return false;
      const start = new Date(fvd);
      const vd = new Date(visit.date || '');
      if (isNaN(start.getTime()) || isNaN(vd.getTime())) return false;
      const diff = Math.floor((vd.getTime() - start.getTime()) / 86400000);
      return diff >= 0 && diff <= 30;
    },

    // еЈІдёҠгҒ®еҮәгҒ©гҒ“гӮҚеҲҘеҶ…иЁі(ж–°иҰҸ/ж—ўеӯҳйғҪеәҰ/гӮөгғ–гӮ№гӮҜжңҲж¬Ў/еӣһж•°еҲёиіје…Ҙ/зү©иІ©)
    _calcRevenueBreakdown(ym) {
      let shinki = 0, kizonToto = 0, kaisuukenKonyu = 0, busshan = 0, subscMonthly = 0;
      for (const v of this.visits) {
        if (!(v.date || '').startsWith(ym)) continue;
        const cat = v.cashbookCategory || '';
        const amt = Number(v.amount) || 0;
        if (cat === 'еӣһж•°еҲёиіје…Ҙ') {
          kaisuukenKonyu += amt;
        } else if (cat === 'йғҪеәҰжү•гҒ„') {
          if (this._isNewWithin30Days(v)) shinki += amt;
          else kizonToto += amt;
        }
      }
      for (const s of this.sales) {
        if (!(s.date || '').startsWith(ym)) continue;
        if (s.isSample) continue;
        busshan += Number(s.amount) || 0;
      }
      for (const p of this.subscriptionPayments) {
        if (p.yearMonth !== ym) continue;
        if (p.status !== 'paid') continue;
        subscMonthly += Number(p.amount) || 0;
      }
      const total = shinki + kizonToto + kaisuukenKonyu + busshan + subscMonthly;
      return { shinki, kizonToto, kaisuukenKonyu, busshan, subscMonthly, total };
    },

    // йЎ§е®ў1дәәгҒ®зҙҜиЁҲеЈІдёҠ(visits + sales + subscription_payments paid)
    _calcCustomerLtv(customerName) {
      let total = 0;
      for (const v of this.visits) {
        if (v.customerName === customerName) total += Number(v.amount) || 0;
      }
      for (const s of this.sales) {
        if (s.customerName === customerName && !s.isSample) total += Number(s.amount) || 0;
      }
      for (const p of this.subscriptionPayments) {
        if (p.customerName === customerName && p.status === 'paid') total += Number(p.amount) || 0;
      }
      return total;
    },

    // рҹҶ• v0.9.6: ads.category гӮ’ firstSource еҹәжә–еҗҚгҒ«жӯЈиҰҸеҢ–(жңӘзҷ»йҢІгҒӘгӮүгҒқгҒ®гҒҫгҒҫ)
    normalizeMediaName(name) {
      return this.MEDIA_NAME_MAP[name] || name;
    },

    // еӘ’дҪ“еҲҘгҒ®ж–°иҰҸе®ўLTVйӣҶиЁҲ(еҪ“жңҲacquisitionMonthгҒ®ж–°иҰҸе®ўгҒҢеҜҫиұЎ)
    _calcMediaLtv(ym) {
      const newCustomers = this.customersTemp.filter(c => c.acquisitionMonth === ym && c.firstSource);
      const map = {};
      for (const c of newCustomers) {
        const src = c.firstSource || 'гҒқгҒ®д»–';
        if (!map[src]) map[src] = { source: src, count: 0, totalLtv: 0 };
        map[src].count++;
        map[src].totalLtv += this._calcCustomerLtv(c.name);
      }
      const adByMedia = {};
      for (const a of this.ads) {
       if (!(a.date || '').startsWith(ym)) continue;
        const k = this.normalizeMediaName(a.category || 'гҒқгҒ®д»–');
        adByMedia[k] = (adByMedia[k] || 0) + (Number(a.amount) || 0);
      }
      return Object.values(map).map(r => ({
        source: r.source,
        count: r.count,
        totalLtv: r.totalLtv,
        avgLtv: r.count > 0 ? Math.round(r.totalLtv / r.count) : 0,
        adCost: adByMedia[r.source] || 0,
        roas: (adByMedia[r.source] || 0) > 0 ? Math.round((r.totalLtv / adByMedia[r.source]) * 100) : null
      })).sort((a, b) => b.totalLtv - a.totalLtv);
    },

    // еҪ“жңҲгҒ®еҲёзЁ®еҲҘ еӣһж•°еҲёиіје…ҘйӣҶиЁҲ(tickets гҒ® purchaseDate гғҷгғјгӮ№гҖҒLegacyйҷӨеӨ–)
    _calcTicketSales(ym) {
      const map = {};
      let totalCount = 0, totalAmount = 0;
      for (const t of this.tickets) {
        if (t.isLegacy) continue;
        if (!(t.purchaseDate || '').startsWith(ym)) continue;
        const key = t.ticketType || '(дёҚжҳҺ)';
        if (!map[key]) map[key] = { ticketType: key, count: 0, amount: 0 };
        map[key].count++;
        map[key].amount += Number(t.purchasePrice) || 0;
        totalCount++;
        totalAmount += Number(t.purchasePrice) || 0;
      }
      return { byType: Object.values(map), totalCount, totalAmount };
    },

    // гӮөгғ–гӮ№гӮҜзҠ¶жіҒгӮөгғһгғӘгғј(еҪ“жңҲ)
    _calcSubscStats(ym) {
      const payments = this.subscriptionPayments.filter(p => p.yearMonth === ym);
      let paidCount = 0, paidAmount = 0, pendingCount = 0;
      for (const p of payments) {
        if (p.status === 'paid') { paidCount++; paidAmount += Number(p.amount) || 0; }
        else { pendingCount++; }
      }
      const activeCount = this.subscriptions.filter(s => s.status === 'active').length;
      return { activeCount, paidCount, paidAmount, pendingCount };
    },

    // еӣһж•°еҲёгҒ®еңЁеә«зҠ¶жіҒгӮөгғһгғӘгғј(жңҲйқһдҫқеӯҳгғ»зҸҫжҷӮзӮ№)
    _calcTicketStock() {
      let active = 0, expiring = 0, expiredRemain = 0;
      for (const t of this.tickets) {
        const st = this.getTicketStatus(t);
        const days = this.getDaysUntilExpiry(t.expiryDate);
        if (st === 'active') {
          active++;
          if (days !== null && days <= 30) expiring++;
        } else if (st === 'expired' && (Number(t.remainingCount) || 0) > 0) {
          expiredRemain++;
        }
      }
      return { active, expiring, expiredRemain };
    },

    // рҹҺҜ жңҲй–“зөұиЁҲгҒ®е…ЁйғЁе…ҘгӮҠ(з”»йқўгғ»Excelе…ұз”ЁгҒ®еҝғиҮ“йғЁ)
    getMonthlyStats(ym) {
      if (!ym) return null;
      const revenue = this._calcRevenueBreakdown(ym);
      const media = this._calcMediaLtv(ym);
      const tickets = this._calcTicketSales(ym);
      const subsc = this._calcSubscStats(ym);
      const ticketStock = this._calcTicketStock();
      const newCount = this.customersTemp.filter(c => c.acquisitionMonth === ym).length;

    async applyInquiryAttribution(f) {
      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      const nameKey = (f.customerName || '').trim();
      if (!nameKey) return;
      const acqMonth = (f.date || '').slice(0, 7);
      const existing = this.customersTemp.find(c => c.name === nameKey);
      if (existing) {
        const patch = {};
        if (!existing.firstSource)      patch.firstSource = f.source;
        if (!existing.firstChannel)     patch.firstChannel = f.channel;
        if (!existing.firstInquiryDate) patch.firstInquiryDate = f.date;
        if (!existing.acquisitionMonth) patch.acquisitionMonth = acqMonth;
        if (f.firstVisitDate && !existing.firstVisitDate) patch.firstVisitDate = f.firstVisitDate;
        if (Object.keys(patch).length === 0) return;
        await setDoc(doc(db, 'customers_temp', existing.id), { ...patch, updatedAt: serverTimestamp() }, { merge: true });

      } else {
        const newRef = doc(collection(db, 'customers_temp'));
        const nc = {
          name: nameKey, source: 'inquiry-auto',
          firstSource: f.source, firstChannel: f.channel,
          firstInquiryDate: f.date, firstVisitDate: f.firstVisitDate || null,
          acquisitionMonth: acqMonth
        };
        await setDoc(newRef, { ...nc, createdAt: serverTimestamp() });
        this.upsertCustomerLocal({ id: newRef.id, ...nc });
      }
    },

    get pendingExports() {

      const exportedSet = new Set(this.monthlyExports.map(h => h.yearMonth));

        const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

        zip.file(`${ym}_зҸҫйҮ‘еҮәзҙҚеёі.xlsx`, cashbookBuf);
        zip.file(`${ym}_зү©иІ©з®ЎзҗҶиЎЁ.xlsx`, salesBuf);
        zip.file(`${ym}_еәғе‘ҠиІ»еҶ…иЁі.xlsx`, adsBuf);
        zip.file(`${ym}_жңҲй–“зөұиЁҲ.xlsx`, statsBuf);
        const zipBlob = await zip.generateAsync({ type: 'blob' });

        // гғҖгӮҰгғігғӯгғјгғү
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${ym}_жңҲжң«иіҮж–ҷ.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        log('рҹ’ҫ еҮәеҠӣеұҘжӯҙгӮ’иЁҳйҢІдёӯ...');
        await this.recordExportHistory(ym);
        log(`вң… е®ҢдәҶ! ${ym}_жңҲжң«иіҮж–ҷ.zip гӮ’гғҖгӮҰгғігғӯгғјгғүгҒ—гҒҫгҒ—гҒҹ`);
      } catch (err) {
        log(`вқҢ гӮЁгғ©гғј: ${err.message}`);
        console.error(err);
      } finally {
        this.isGeneratingExcel = false;
      }
    },

    collectMonthEndData(ym) {
      const visits = this.visits.filter(v => (v.date || '').startsWith(ym));
      const sales = this.sales.filter(s => (s.date || '').startsWith(ym));
      const expenses = this.expenses.filter(e => (e.date || '').startsWith(ym));
      const ads = this.ads.filter(a => (a.date || '').startsWith(ym));
      const cashDeposits = this.cashDeposits.filter(d => (d.date || '').startsWith(ym));
      const purchases = this.purchases.filter(p => (p.date || '').startsWith(ym));
      // еүҚжңҲд»ҘеүҚгҒ®д»•е…Ҙ(зҙҜиЁҲеңЁеә«иЁҲз®—з”Ё)
      const prevPurchases = this.purchases.filter(p => {
        const d = p.date || '';
        return d && d < `${ym}-01`;
      });

      // жңҲеҲқз№°и¶ҠгӮ’иЁҲз®—(з”»йқўгҒ® cashbookCarry гҒЁгҒҜеҲҘгғӯгӮёгғғгӮҜ - еҜҫиұЎжңҲгҒ®еҖӨгӮ’дҪҝз”Ё)
      // гҒ“гҒ“гҒ§гҒҜзҸҫзҠ¶гҒ® cashbookMonth гҒҢ ym гҒЁз•°гҒӘгӮӢеҸҜиғҪжҖ§гҒҢгҒӮгӮӢгҒ®гҒ§гҖҒеҶҚиЁҲз®—гҒҷгӮӢеҝ…иҰҒгҒӮгӮҠ
      // з°Ўжҳ“е®ҹиЈ…: жңҲеҲқз№°и¶ҠгҒҜеҜҫиұЎжңҲгҒ®FirestoreгҒӢгӮүеҸ–еҫ—жёҲгҒҝгҒ®еҖӨгӮ’дҪҝгҒҶ
      // вҶ’ з•°гҒӘгӮӢжңҲгӮ’еҮәеҠӣгҒҷгӮӢе ҙеҗҲгҒ«жӯЈгҒ—гҒ„з№°и¶ҠгҒҢеҝ…иҰҒгҒӘгҒ®гҒ§гҖҒиЁҲз®—гғӯгӮёгғғгӮҜе®ҹиЈ…

      let openingBalance = 0;
      // еҗҢгҒҳжңҲгҒӘгӮүзҸҫеңЁгҒ®еҖӨгҖҒз•°гҒӘгӮӢжңҲгҒӘгӮүиҮӘеүҚгҒ§иЁҲз®—
      if (ym === this.cashbookMonth) {
        openingBalance = Number(this.cashbookCarry) || 0;
      } else {
        // йҒҺеҺ»е…ЁжңҲгҒ®еҸҺж”ҜгӮ’зҙҜз©ҚиЁҲз®—(з°Ўжҳ“)
        const allMonths = this.collectAllMonthsBefore(ym);
        let bal = 0;
        for (const prevYm of allMonths) {
          const sum = this.calcMonthCashSummary(prevYm);
          bal += sum.income - sum.expense;
        }
        openingBalance = bal;
      }

      // еүҚжңҲд»ҘеүҚгҒ®зү©иІ©еұҘжӯҙ(еңЁеә«з№°и¶Ҡз”Ё)
      const prevSales = this.sales.filter(s => {
        const d = s.date || '';
        return d && d < `${ym}-01`;
      });

      const [y, m] = ym.split('-').map(Number);
      const lastDay = new Date(y, m, 0).getDate();

      return {
        visits, sales, expenses, ads, cashDeposits,
        purchases, prevPurchases,
        products: this.products,
        prevSales,
        openingBalance,
        yearMonth: ym,
        lastDay
      };
    },

    collectAllMonthsBefore(ym) {
      // е…ЁгғҮгғјгӮҝгҒӢгӮүеҜҫиұЎжңҲгӮҲгӮҠеүҚгҒ®гғҰгғӢгғјгӮҜжңҲгӮ’жҠҪеҮә
      const set = new Set();
      const addIfBefore = (date) => {
        if (!date) return;
        const m = date.substring(0, 7);
        if (m < ym) set.add(m);
      };
      this.visits.forEach(v => addIfBefore(v.date));
      this.sales.forEach(s => addIfBefore(s.date));
      this.expenses.forEach(e => addIfBefore(e.date));
      this.ads.forEach(a => addIfBefore(a.date));
      this.cashDeposits.forEach(d => addIfBefore(d.date));
      return Array.from(set).sort();
    },

    buildCashbookWorkbook(ym, data) {
      const [y, m] = ym.split('-').map(Number);
      const rows = [];
      rows.push([`${y}е№ҙ${m}жңҲ зҸҫйҮ‘еҮәзҙҚеёі`, '', '', '', '', '', '', '']);
      rows.push(['дјқзҘЁNo', 'е№ҙ', 'жңҲ', 'ж—Ҙ', 'ж‘ҳиҰҒ', 'еҖҹж–№йҮ‘йЎҚ', 'иІёж–№йҮ‘йЎҚ', 'е·®еј•ж®Ӣй«ҳ']);

      let balance = data.openingBalance;
      rows.push(['', y, m, 1, 'з№°и¶Ҡ', '', '', balance]);

      const txns = [];

      // жқҘйҷў(зҸҫйҮ‘) - ж—Ҙж¬ЎйӣҶиЁҲгҖҒTAK/ж—Ҙеҗ‘еҲҘ
      const visitsByDate = {};
      data.visits.filter(v => v.paymentMethod === 'зҸҫйҮ‘').forEach(v => {
        const key = v.staff === 'ж—Ҙеҗ‘' ? `${v.date}|HINATA` : `${v.date}|TAK`;
        if (!visitsByDate[key]) visitsByDate[key] = 0;
        visitsByDate[key] += (v.amount || 0);
      });
      Object.entries(visitsByDate).forEach(([key, amount]) => {
        if (amount > 0) {
          const [date, staff] = key.split('|');
          const desc = staff === 'HINATA' ? 'гӮӨгғігғҮгӮЈгғҗж–ҪиЎ“(ж—Ҙеҗ‘)' : 'ж•ҙдҪ“йҷўзҸҫйҮ‘еЈІдёҠ(TAK)';
          txns.push({ date, type: 'income', desc, amount });
        }
      });

      // зү©иІ©(зҸҫйҮ‘гҖҒгӮөгғігғ—гғ«йҷӨеӨ–) - ж—Ҙж¬ЎйӣҶиЁҲ
      const salesByDate = {};
      data.sales.filter(s => s.paymentMethod === 'зҸҫйҮ‘' && !s.isSample).forEach(s => {
        if (!salesByDate[s.date]) salesByDate[s.date] = 0;
        salesByDate[s.date] += (s.amount || 0);
      });
      Object.entries(salesByDate).forEach(([date, amount]) => {
        if (amount > 0) {
          txns.push({ date, type: 'income', desc: 'зү©иІ© зҸҫйҮ‘еЈІдёҠ 8%', amount });
        }
      });

      // зөҢиІ»гғ»еәғе‘ҠиІ»(зҸҫйҮ‘ or гғӘгӮҜгғ«гғјгғҲгҖҒиҮӘеӢ•и»ўиЁҳгӮөгғігғ—гғ«йҷӨеӨ–) - дјқзҘЁNoд»ҳгҒҚ
      // v0.9.4-fix: гғӘгӮҜгғ«гғјгғҲж”Ҝжү•гӮӮдјқзҘЁеҜҫиұЎгҒ«жӢЎејө + еәғе‘ҠиІ»гҒ«гӮӮдјқзҘЁNoд»ҳдёҺ
      let receiptCounter = 0;
      const circledNumbers = ['в‘ ','в‘Ў','в‘ў','в‘Ј','в‘Ө','в‘Ҙ','в‘Ұ','в‘§','в‘Ё','в‘©',
                              'в‘Ә','в‘«','в‘¬','в‘ӯ','в‘®','в‘Ҝ','в‘°','в‘ұ','в‘І','в‘і'];

      // зөҢиІ»гҒЁеәғе‘ҠиІ»гӮ’дёҖж—ҰгҒҫгҒЁгӮҒгҒҰж—Ҙд»ҳй ҶгҒ«гӮҪгғјгғҲ(дјқзҘЁNo гҒҢж—Ҙд»ҳй ҶгҒ«дёҰгҒ¶гӮҲгҒҶгҒ«)
      const cashLikeTxns = [];

      data.expenses
        .filter(e => this.isCashLikePayment(e.paymentMethod) && !e.isAutoSample)
        .forEach(e => {
          const pmTag = e.paymentMethod === 'гғӘгӮҜгғ«гғјгғҲ' ? '[гғӘгӮҜгғ«гғјгғҲ]' : '';
          const baseDesc = e.note ? `${e.category}(${e.note})` : e.category;
          const desc = pmTag ? `${baseDesc}${pmTag}` : baseDesc;
          cashLikeTxns.push({ date: e.date, type: 'expense', desc, amount: e.amount, _sortKey: 'A' });
        });

      data.ads
        .filter(a => this.isCashLikePayment(a.paymentMethod))
        .forEach(a => {
          const pmTag = a.paymentMethod === 'гғӘгӮҜгғ«гғјгғҲ' ? '[гғӘгӮҜгғ«гғјгғҲ]' : '';
          const baseDesc = a.note ? `еәғе‘ҠиІ»(${a.category}/${a.note})` : `еәғе‘ҠиІ»(${a.category})`;
          const desc = pmTag ? `${baseDesc}${pmTag}` : baseDesc;
          cashLikeTxns.push({ date: a.date, type: 'expense', desc, amount: a.amount, _sortKey: 'B' });
        });

      // ж—Ҙд»ҳжҳҮй Ҷ вҶ’ еҗҢж—ҘеҶ…гҒҜзөҢиІ»(A)вҶ’еәғе‘ҠиІ»(B)гҒ®й ҶгҒ§дјқзҘЁNo д»ҳдёҺ
      cashLikeTxns.sort((x, y) => {
        const d = (x.date || '').localeCompare(y.date || '');
        if (d !== 0) return d;
        return (x._sortKey || '').localeCompare(y._sortKey || '');
      });

      cashLikeTxns.forEach(t => {
        const receiptNo = circledNumbers[receiptCounter] || `(${receiptCounter + 1})`;
        receiptCounter++;
        txns.push({ date: t.date, type: t.type, desc: t.desc, amount: t.amount, receiptNo });
      });

      // рҹҶ• йҠҖиЎҢй җгҒ‘е…ҘгӮҢ
      (data.cashDeposits || []).forEach(d => {
        const desc = d.bankName ? `зҸҫйҮ‘е…ҘйҮ‘(${d.bankName})` : 'зҸҫйҮ‘е…ҘйҮ‘';
        txns.push({ date: d.date, type: 'expense', desc, amount: d.amount });
      });

      txns.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

      txns.forEach(t => {
        const day = parseInt((t.date || '').split('-')[2], 10);
        if (t.type === 'income') {
          balance += t.amount;
          rows.push([t.receiptNo || '', '', '', day, t.desc, t.amount, '', balance]);
        } else {
          balance -= t.amount;
          rows.push([t.receiptNo || '', '', '', day, t.desc, '', t.amount, balance]);
        }
      });

      rows.push(['', '', '', data.lastDay, 'жңҲжң«ж®Ӣй«ҳ', '', '', balance]);

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        { wch: 8 }, { wch: 6 }, { wch: 5 }, { wch: 5 },
        { wch: 35 }, { wch: 12 }, { wch: 12 }, { wch: 12 }
      ];
      ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 7 } }];

      // ж•°еҖӨжӣёејҸ
      for (let r = 2; r < rows.length; r++) {
        ['F', 'G', 'H'].forEach(col => {
          const cellRef = `${col}${r + 1}`;
          if (ws[cellRef] && typeof ws[cellRef].v === 'number') {
            ws[cellRef].z = '#,##0';
          }
        });
      }

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `${y}е№ҙ${m}жңҲ`);
      return wb;
    },

    buildSalesWorkbook(ym, data) {
      const [y, m] = ym.split('-').map(Number);
      const wb = XLSX.utils.book_new();
      const rows = [];
      rows.push([`${y}е№ҙ${m}жңҲ зү©иІ©з®ЎзҗҶиЎЁ`]);
      rows.push([]);

      const calcOpeningStock = (productId) => {
        const product = data.products.find(p => p.id === productId);
        if (!product) return 0;
        const initial = Number(product.initialStock) || 0;
        const consumed = data.prevSales
          .filter(s => s.productId === productId)
          .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
        // рҹҶ• v0.7: еүҚжңҲгҒҫгҒ§гҒ®д»•е…ҘгӮӮеҠ з®—
        const prevPurchased = (data.prevPurchases || [])
          .filter(p => p.productId === productId)
          .reduce((sum, p) => sum + (Number(p.quantity) || 0), 0);
        return initial - consumed + prevPurchased;
      };

      const activeProducts = data.products.filter(p => p.active !== false);

      activeProducts.forEach((product) => {
        rows.push([`в–  ${product.name}`, '', '', `еҚҳдҫЎ: ВҘ${(product.sellingPrice || 0).toLocaleString()}`]);
        rows.push(['ж—Ҙд»ҳ', 'жңҲеҲқеңЁеә«', 'д»•е…Ҙ', 'иІ©еЈІ(зҸҫйҮ‘)', 'иІ©еЈІ(гҒқгҒ®д»–)', 'гӮөгғігғ—гғ«', 'жңҲжң«еңЁеә«', 'жӢ…еҪ“иҖ…', 'иіје…ҘиҖ…']);

        const productSales = data.sales.filter(s => s.productId === product.id || s.productName === product.name);

        let currentStock = calcOpeningStock(product.id);
        let totalCash = 0, totalOther = 0, totalSample = 0, totalPurchase = 0;

        // гҒ“гҒ®е•Ҷе“ҒгҒ®еҪ“жңҲд»•е…ҘгӮ’ж—Ҙд»ҳеҲҘгҒ«гғһгғғгғ—еҢ–
        const monthPurchases = (data.purchases || []).filter(p =>
          p.productId === product.id || p.productName === product.name
        );

        rows.push([`${m}/1`, currentStock, '', '', '', '', currentStock, '', '']);

        for (let day = 1; day <= data.lastDay; day++) {
          const dateStr = `${ym}-${String(day).padStart(2, '0')}`;
          const dailySales = productSales.filter(s => s.date === dateStr);
          const dailyPurchases = monthPurchases.filter(p => p.date === dateStr);

          // гҒ“гҒ®ж—ҘгҒ«еЈІдёҠгӮӮд»•е…ҘгӮӮз„ЎгҒ„гҒӘгӮүгӮ№гӮӯгғғгғ—
          if (dailySales.length === 0 && dailyPurchases.length === 0) continue;

          const cashQty = dailySales.filter(s => s.paymentMethod === 'зҸҫйҮ‘' && !s.isSample)
                                     .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
          const otherQty = dailySales.filter(s => s.paymentMethod !== 'зҸҫйҮ‘' && !s.isSample)
                                      .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
          const sampleQty = dailySales.filter(s => s.isSample)
                                       .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
          const purchaseQty = dailyPurchases.reduce((sum, p) => sum + (Number(p.quantity) || 0), 0);
          const customers = [...new Set(dailySales.map(s => s.customerName).filter(Boolean))].join('/');
          const purchaseStaff = [...new Set(dailyPurchases.map(p => p.supplier).filter(Boolean))].join('/');
          const saleStaff = [...new Set(dailySales.map(s => s.staff).filter(Boolean))].join('/');
          const staff = saleStaff || (purchaseQty > 0 ? '(д»•е…Ҙ)' : '');

          const openingDay = currentStock;
          currentStock = currentStock + purchaseQty - cashQty - otherQty - sampleQty;

          rows.push([
            `${m}/${day}`, openingDay,
            purchaseQty || '',
            cashQty || '', otherQty || '', sampleQty || '',
            currentStock, staff,
            customers || (purchaseQty > 0 ? purchaseStaff : '')
          ]);
          totalCash += cashQty;
          totalOther += otherQty;
          totalSample += sampleQty;
          totalPurchase += purchaseQty;
        }

        rows.push(['еҗҲиЁҲ', '', totalPurchase || '', totalCash, totalOther, totalSample, currentStock, '', '']);
        rows.push([]);
      });

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        { wch: 8 }, { wch: 10 }, { wch: 8 }, { wch: 10 },
        { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 20 }
      ];
      XLSX.utils.book_append_sheet(wb, ws, `${y}е№ҙ${m}жңҲ`);
      return wb;
    },

    buildAdsWorkbook(ym, data) {
      const [y, m] = ym.split('-').map(Number);
      const rows = [];
      rows.push([`${y}е№ҙ${m}жңҲ еәғе‘ҠиІ»еҶ…иЁі(TAK)`]);
      rows.push([]);
      rows.push(['ж—Ҙд»ҳ', 'еӘ’дҪ“', 'еҶ…е®№', 'йҮ‘йЎҚ', 'ж”Ҝжү•ж–№жі•', 'еӮҷиҖғ']);

      const sortedAds = [...data.ads].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      sortedAds.forEach(ad => {
        const day = parseInt((ad.date || '').split('-')[2], 10);
        rows.push([
          `${m}/${day}`,
          ad.category || '',
          ad.note || '',
          Number(ad.amount) || 0,
          ad.paymentMethod || '',
          ''
        ]);
      });
      rows.push([]);
      rows.push(['гҖҗеӘ’дҪ“еҲҘйӣҶиЁҲгҖ‘']);
      rows.push(['еӘ’дҪ“', 'йҮ‘йЎҚ', 'ж§ӢжҲҗжҜ”']);
      const total = sortedAds.reduce((sum, a) => sum + (Number(a.amount) || 0), 0);
      const byCategory = {};
      sortedAds.forEach(a => {
        const k = a.category || '(жңӘеҲҶйЎһ)';
        if (!byCategory[k]) byCategory[k] = 0;
        byCategory[k] += Number(a.amount) || 0;
      });
      Object.entries(byCategory)
        .sort((a, b) => b[1] - a[1])
        .forEach(([cat, amt]) => {
          const pct = total > 0 ? (amt / total * 100).toFixed(1) + '%' : '0%';
          rows.push([cat, amt, pct]);
        });
      rows.push(['еҗҲиЁҲ', total, '100%']);

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        { wch: 8 }, { wch: 18 }, { wch: 25 }, { wch: 12 }, { wch: 10 }, { wch: 15 }
      ];
      ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];

      for (let r = 0; r < rows.length; r++) {
        ['B', 'D'].forEach(col => {
          const cellRef = `${col}${r + 1}`;
          if (ws[cellRef] && typeof ws[cellRef].v === 'number') {
            ws[cellRef].z = '#,##0';
          }
        });
      }

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `${y}е№ҙ${m}жңҲ`);
      return wb;
    },

    buildMonthlyStatsWorkbook(ym, stats) {
      const [y, m] = ym.split('-').map(Number);
      const s = stats || {};
      const rev = s.revenue || {};
      const sub = s.subsc || {};
      const stk = s.ticketStock || {};
      const rows = [];
      rows.push([`${y}е№ҙ${m}жңҲ жңҲй–“зөұиЁҲ(TAK)`]);
      rows.push([]);
      rows.push(['гҖҗеЈІдёҠеҶ…иЁігҖ‘']);
      rows.push(['ж–°иҰҸйғҪеәҰ', rev.shinki || 0]);
      rows.push(['ж—ўеӯҳйғҪеәҰ', rev.kizonToto || 0]);
      rows.push(['еӣһж•°еҲёиіје…Ҙ', rev.kaisuukenKonyu || 0]);
      rows.push(['зү©иІ©', rev.busshan || 0]);
      rows.push(['гӮөгғ–гӮ№гӮҜжңҲж¬Ў', rev.subscMonthly || 0]);
      rows.push(['еҗҲиЁҲ', rev.total || 0]);
      rows.push(['еҪ“жңҲж–°иҰҸе®ў(дәә)', s.newCount || 0]);
      rows.push([]);
      rows.push(['гҖҗеӘ’дҪ“еҲҘ ж–°иҰҸе®ўLTVгҖ‘ вҖ»еәғе‘ҠиІ»гғ»ROASгҒҜеҸӮиҖғеҖӨ(еӘ’дҪ“еҗҚеҜҫеҝңиЎЁгҒҢжңӘж•ҙеӮҷ)']);
      rows.push(['еӘ’дҪ“', 'ж–°иҰҸ', 'зҙҜиЁҲLTV', 'е№іеқҮLTV', 'еәғе‘ҠиІ»', 'ROAS']);
      (s.media || []).forEach(md => {
        rows.push([md.source, md.count, md.totalLtv || 0, md.avgLtv || 0, md.adCost || 0, md.roas === null ? 'вҖ”' : (md.roas + '%')]);
      });
      rows.push([]);
      rows.push(['гҖҗеӣһж•°еҲё иіје…Ҙ(еҪ“жңҲ)гҖ‘']);
      rows.push(['еҲёзЁ®', 'жһҡж•°', 'йҮ‘йЎҚ']);
      ((s.tickets && s.tickets.byType) || []).forEach(t => {
        rows.push([t.ticketType, t.count, t.amount || 0]);
      });
      rows.push(['иЁҲ', (s.tickets && s.tickets.totalCount) || 0, (s.tickets && s.tickets.totalAmount) || 0]);
      rows.push([]);
      rows.push(['гҖҗгӮөгғ–гӮ№гӮҜзҠ¶жіҒгҖ‘']);
      rows.push(['еҘ‘зҙ„дёӯ(д»¶)', sub.activeCount || 0]);
      rows.push(['е…ҘйҮ‘жёҲ(д»¶)', sub.paidCount || 0]);
      rows.push(['жңӘе…ҘйҮ‘(д»¶)', sub.pendingCount || 0]);
      rows.push(['е…ҘйҮ‘йЎҚ', sub.paidAmount || 0]);
      rows.push([]);
      rows.push(['гҖҗеӣһж•°еҲё еңЁеә«(зҸҫжҷӮзӮ№)гҖ‘']);
      rows.push(['жңүеҠ№(жһҡ)', stk.active || 0]);
      rows.push(['жңҹйҷҗй–“иҝ‘(жһҡ)', stk.expiring || 0]);
      rows.push(['жңҹйҷҗеҲҮгӮҢж®Ӣ(жһҡ)', stk.expiredRemain || 0]);
      rows.push([]);
      rows.push(['гҖҗжүӢе…ҘеҠӣж¬„(гҒ“гҒ®ExcelгҒ«зӣҙжҺҘиЁҳе…Ҙ)гҖ‘']);
      rows.push(['иІ»з”ЁеҗҲиЁҲ', '']);
      rows.push(['гғҒгғ©гӮ·еҸҚеҝңзҺҮ', '']);
      rows.push(['зЁјеғҚж—Ҙж•°', '']);
      rows.push(['еӣһж•°еҲё6/10/18еҢәеҲҶ', '']);
      rows.push(['2еӣһзӣ®гғӘгғ”гғјгғҲзҺҮ', '']);
      rows.push([]);
      rows.push(['вҖ»ж–°иҰҸгҒҜinquiryзҷ»йҢІжёҲгҒҝгҒ®е®ўгҒ®гҒҝгҖӮжңӘзҷ»йҢІгҒ®ж–°иҰҸжқҘйҷўгҒҜгҖҢж—ўеӯҳйғҪеәҰгҖҚгҒ«еҗ«гҒҫгӮҢгҒҫгҒҷгҖӮ']);
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{ wch: 20 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 12 }, { wch: 10 }];
      ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];
      for (let r = 0; r < rows.length; r++) {
        for (let c = 0; c < 6; c++) {
          const ref = XLSX.utils.encode_cell({ r, c });
          if (ws[ref] && typeof ws[ref].v === 'number') ws[ref].z = '#,##0';
        }
      }
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `${y}е№ҙ${m}жңҲ`);
      return wb;
    },

    async recordExportHistory(ym) {
      const { db, doc, setDoc, serverTimestamp } = window._fb;
      await setDoc(doc(db, 'monthlyExports', ym), {
        yearMonth: ym,
        exportedAt: serverTimestamp(),
        fileNames: [
          `${ym}_зҸҫйҮ‘еҮәзҙҚеёі.xlsx`,
          `${ym}_зү©иІ©з®ЎзҗҶиЎЁ.xlsx`,
          `${ym}_еәғе‘ҠиІ»еҶ…иЁі.xlsx`,
          `${ym}_жңҲй–“зөұиЁҲ.xlsx`
        ]
      }, { merge: true });
    }

  };
}
