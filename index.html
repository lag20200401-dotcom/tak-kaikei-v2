<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整体院TAK 経営管理 v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
  .tab-active { background:#0f766e; color:white; }
  .tab-inactive { background:#f1f5f9; color:#334155; }
  .tab-inactive:hover { background:#e2e8f0; }
  /* オートコンプリート候補リスト */
  .suggest-list {
    max-height: 200px;
    overflow-y: auto;
  }
</style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="app()" x-init="init()" x-cloak>

<!-- ===== ロック画面 ===== -->
<template x-if="!unlocked">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="text-2xl font-bold text-slate-800">整体院TAK</div>
        <div class="text-sm text-slate-500 mt-1">経営管理 v2</div>
      </div>
      <input type="password" x-model="passcodeInput" @keyup.enter="tryUnlock()"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-center text-2xl tracking-widest"
        placeholder="パスコード" maxlength="4">
      <button @click="tryUnlock()"
        class="w-full mt-4 bg-teal-700 hover:bg-teal-800 text-white font-medium py-3 rounded-lg">
        入る
      </button>
      <div x-show="lockError" class="text-red-500 text-sm text-center mt-3" x-text="lockError"></div>
    </div>
  </div>
</template>

<!-- ===== メイン画面 ===== -->
<template x-if="unlocked">
<div>

<!-- ヘッダー -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <span class="font-bold text-slate-800">整体院TAK</span>
      <span class="text-slate-400 mx-2">/</span>
      <span class="text-sm text-slate-600">経営管理 v2</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs px-2 py-1 rounded"
            :class="cloudStatus==='接続中' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
            x-text="'☁ ' + cloudStatus"></span>
      <button @click="lock()" class="text-sm text-slate-500 hover:text-slate-800">ロック</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="max-w-6xl mx-auto px-4 pb-2">
    <div class="flex gap-1 overflow-x-auto">
      <template x-for="t in tabs" :key="t.id">
        <button @click="currentTab = t.id"
          :class="currentTab === t.id ? 'tab-active' : 'tab-inactive'"
          class="px-4 py-2 rounded-t-lg text-sm font-medium whitespace-nowrap"
          x-text="t.label"></button>
      </template>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto p-4">

  <!-- ====== ダッシュボード ====== -->
  <section x-show="currentTab==='dashboard'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-2">ダッシュボード</h2>
      <p class="text-sm text-slate-500">準備中</p>
      <p class="text-sm text-slate-500 mt-1">来院・物販・経費の合計サマリと、未完了アラートを表示予定</p>
    </div>
  </section>

  <!-- ====== 来院記録 ====== -->
  <section x-show="currentTab==='visits'" class="space-y-4">

    <!-- 入力フォーム -->
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-slate-800">来院記録</h2>
        <div class="text-xs text-slate-400" x-text="'本日: ' + todayStr()"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
        <!-- 日付 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">日付 *</label>
          <input type="date" x-model="visitForm.date"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 顧客名(オートコンプリート) -->
        <div class="md:col-span-3 relative">
          <label class="block text-xs text-slate-600 mb-1">顧客名 *</label>
          <input type="text" x-model="visitForm.customerName"
            @input="onCustomerInput()"
            @focus="showSuggest = true"
            @blur="setTimeout(() => showSuggest = false, 200)"
            placeholder="顧客名を入力"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" autocomplete="off">
          <!-- サジェスト -->
          <div x-show="showSuggest && filteredCustomers.length > 0"
               class="suggest-list absolute z-20 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-lg">
            <template x-for="c in filteredCustomers" :key="c.id">
              <button @mousedown.prevent="selectCustomer(c)"
                class="block w-full text-left px-3 py-2 hover:bg-teal-50 text-sm">
                <span x-text="c.name"></span>
                <span x-show="c.visitCount" class="text-xs text-slate-400 ml-2"
                      x-text="'(' + c.visitCount + '回)'"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- メニュー(自由入力) -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">メニュー *</label>
          <input type="text" x-model="visitForm.menu"
            placeholder="例: 整体60分 / 回数券消化"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 金額 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">金額(円)</label>
          <input type="number" x-model.number="visitForm.amount" placeholder="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 担当者 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">担当者 *</label>
          <select x-model="visitForm.staff"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="s in staffList" :key="s">
              <option :value="s" x-text="s"></option>
            </template>
          </select>
        </div>

        <!-- 支払方法 -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">支払方法 *</label>
          <select x-model="visitForm.paymentMethod"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="p in paymentMethods" :key="p">
              <option :value="p" x-text="p"></option>
            </template>
          </select>
        </div>

        <!-- 自動判定: cashbookCategory -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">区分(自動判定)</label>
          <div class="px-3 py-2 bg-slate-100 rounded-lg text-sm text-slate-700"
               x-text="autoCategory()"></div>
        </div>

        <!-- 備考 -->
        <div class="md:col-span-6">
          <label class="block text-xs text-slate-600 mb-1">備考</label>
          <input type="text" x-model="visitForm.note" placeholder="任意"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
      </div>

      <!-- 保存ボタン -->
      <div class="flex justify-end gap-2 mt-4">
        <button @click="resetVisitForm()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">クリア</button>
        <button @click="saveVisit()" :disabled="!canSaveVisit() || saving"
          class="px-5 py-2 bg-teal-700 hover:bg-teal-800 disabled:bg-slate-300 text-white text-sm font-medium rounded-lg">
          <span x-show="!saving" x-text="visitForm.id ? '更新' : '保存'"></span>
          <span x-show="saving">保存中...</span>
        </button>
      </div>

      <div x-show="visitMessage" class="mt-3 text-sm"
           :class="visitMessageType==='ok' ? 'text-emerald-600' : 'text-red-500'"
           x-text="visitMessage"></div>
    </div>

    <!-- 月別フィルタ -->
    <div class="bg-white rounded-xl shadow p-4 flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-600">表示月:</label>
        <input type="month" x-model="visitFilterMonth"
               class="px-3 py-1 border border-slate-300 rounded-lg text-sm">
        <button @click="visitFilterMonth = currentMonthStr()" class="text-xs text-teal-700 hover:underline">今月</button>
      </div>
      <div class="text-sm text-slate-600">
        <span x-text="filteredVisits.length"></span>件 / 合計
        <span class="font-bold text-slate-800" x-text="'¥' + visitTotalAmount().toLocaleString()"></span>
      </div>
    </div>

    <!-- 一覧 -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div x-show="filteredVisits.length === 0" class="p-8 text-center text-slate-400 text-sm">
        この月の来院記録はまだありません
      </div>
      <div x-show="filteredVisits.length > 0" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">日付</th>
              <th class="px-3 py-2 text-left">顧客名</th>
              <th class="px-3 py-2 text-left">メニュー</th>
              <th class="px-3 py-2 text-right">金額</th>
              <th class="px-3 py-2 text-left">担当</th>
              <th class="px-3 py-2 text-left">支払</th>
              <th class="px-3 py-2 text-left">区分</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="v in filteredVisits" :key="v.id">
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-3 py-2 whitespace-nowrap" x-text="v.date"></td>
                <td class="px-3 py-2" x-text="v.customerName"></td>
                <td class="px-3 py-2" x-text="v.menu"></td>
                <td class="px-3 py-2 text-right" x-text="'¥' + (v.amount||0).toLocaleString()"></td>
                <td class="px-3 py-2" x-text="v.staff"></td>
                <td class="px-3 py-2" x-text="v.paymentMethod"></td>
                <td class="px-3 py-2">
                  <span class="text-xs px-2 py-0.5 rounded"
                        :class="categoryColor(v.cashbookCategory)"
                        x-text="v.cashbookCategory"></span>
                </td>
                <td class="px-3 py-2 text-right whitespace-nowrap">
                  <button @click="editVisit(v)" class="text-xs text-teal-700 hover:underline">編集</button>
                  <button @click="deleteVisit(v)" class="text-xs text-red-500 hover:underline ml-2">削除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ====== 商品マスター ====== -->
  <section x-show="currentTab==='products'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-lg font-bold text-slate-800">商品マスター</h2>
          <p class="text-xs text-slate-500 mt-1">物販で扱う商品の登録・編集</p>
        </div>
        <button @click="openProductModal()"
          class="px-4 py-2 bg-teal-700 hover:bg-teal-800 text-white text-sm rounded-lg">
          ＋新規追加
        </button>
      </div>

      <div x-show="products.length === 0" class="p-8 text-center text-slate-400 text-sm">
        まだ商品が登録されていません<br>
        <span class="text-xs">右上「新規追加」から登録してください</span>
      </div>

      <div x-show="products.length > 0" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">商品名</th>
              <th class="px-3 py-2 text-right">代理店価格</th>
              <th class="px-3 py-2 text-right">販売価格</th>
              <th class="px-3 py-2 text-center">税</th>
              <th class="px-3 py-2 text-right">月初在庫</th>
              <th class="px-3 py-2 text-center">状態</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in products" :key="p.id">
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-3 py-2" x-text="p.name"></td>
                <td class="px-3 py-2 text-right" x-text="p.dealerPrice ? '¥' + p.dealerPrice.toLocaleString() : '-'"></td>
                <td class="px-3 py-2 text-right" x-text="'¥' + (p.sellingPrice||0).toLocaleString()"></td>
                <td class="px-3 py-2 text-center" x-text="p.taxCategory || '-'"></td>
                <td class="px-3 py-2 text-right" x-text="p.initialStock||0"></td>
                <td class="px-3 py-2 text-center">
                  <span class="text-xs px-2 py-0.5 rounded"
                        :class="p.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'"
                        x-text="p.active ? '稼働中' : '停止'"></span>
                </td>
                <td class="px-3 py-2 text-right whitespace-nowrap">
                  <button @click="editProduct(p)" class="text-xs text-teal-700 hover:underline">編集</button>
                  <button @click="deleteProduct(p)" class="text-xs text-red-500 hover:underline ml-2">削除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <details class="bg-white rounded-xl shadow p-4 text-sm text-slate-500">
      <summary class="cursor-pointer">💡 開発用: テスト用に13品目を一括登録</summary>
      <button @click="seedProducts()" class="mt-3 px-4 py-2 bg-slate-700 text-white rounded-lg text-xs">
        一括登録実行
      </button>
    </details>
  </section>

  <!-- ====== 物販 ====== -->
  <section x-show="currentTab==='sales'" class="space-y-4">

    <!-- 入力フォーム -->
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-slate-800">物販記録</h2>
        <div class="text-xs text-slate-400" x-text="'本日: ' + todayStr()"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
        <!-- 日付 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">日付 *</label>
          <input type="date" x-model="salesForm.date"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 商品選択 -->
        <div class="md:col-span-4">
          <label class="block text-xs text-slate-600 mb-1">商品 *</label>
          <select x-model="salesForm.productId" @change="onProductSelect()"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <option value="">-- 商品を選択 --</option>
            <template x-for="p in activeProducts" :key="p.id">
              <option :value="p.id" x-text="`${p.name} (¥${(p.sellingPrice||0).toLocaleString()})`"></option>
            </template>
          </select>
        </div>

        <!-- 数量 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">数量 *</label>
          <input type="number" x-model.number="salesForm.quantity" min="1"
            @input="recalcSalesAmount()"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 単価 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">単価(円)</label>
          <input type="number" x-model.number="salesForm.unitPrice"
            @input="recalcSalesAmount()"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 合計金額 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">
            合計
            <span x-show="salesForm.isSample" class="text-orange-600">(¥0固定)</span>
          </label>
          <input type="number" x-model.number="salesForm.amount"
            :disabled="salesForm.isSample"
            :class="salesForm.isSample ? 'bg-slate-100 text-slate-400' : ''"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm font-bold">
        </div>

        <!-- 顧客名(オートコンプリート) -->
        <div class="md:col-span-4 relative">
          <label class="block text-xs text-slate-600 mb-1">
            顧客名 <span class="text-slate-400">(任意)</span>
          </label>
          <input type="text" x-model="salesForm.customerName"
            @input="onSalesCustomerInput()"
            @focus="showSalesSuggest = true"
            @blur="setTimeout(() => showSalesSuggest = false, 200)"
            placeholder="空欄でも保存可"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" autocomplete="off">
          <div x-show="showSalesSuggest && filteredSalesCustomers.length > 0"
               class="suggest-list absolute z-20 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-lg">
            <template x-for="c in filteredSalesCustomers" :key="c.id">
              <button @mousedown.prevent="selectSalesCustomer(c)"
                class="block w-full text-left px-3 py-2 hover:bg-teal-50 text-sm">
                <span x-text="c.name"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- 担当者 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">担当者 *</label>
          <select x-model="salesForm.staff"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="s in staffList" :key="s">
              <option :value="s" x-text="s"></option>
            </template>
          </select>
        </div>

        <!-- 支払方法 -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">支払方法 *</label>
          <select x-model="salesForm.paymentMethod"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <option value="現金">現金</option>
            <option value="カード">カード</option>
            <option value="PayPay">PayPay</option>
            <option value="銀行振込">銀行振込</option>
          </select>
        </div>

        <!-- サンプルフラグ -->
        <div class="md:col-span-3 flex items-end">
          <label class="flex items-center gap-2 text-sm text-slate-700 px-3 py-2">
            <input type="checkbox" x-model="salesForm.isSample" @change="recalcSalesAmount()">
            <span>サンプル提供(¥0)</span>
          </label>
        </div>

        <!-- 備考 -->
        <div class="md:col-span-12">
          <label class="block text-xs text-slate-600 mb-1">備考</label>
          <input type="text" x-model="salesForm.note" placeholder="任意"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
      </div>

      <!-- 保存ボタン -->
      <div class="flex justify-end gap-2 mt-4">
        <button @click="openSalesBulkImport()"
          class="px-4 py-2 text-sm text-purple-700 hover:bg-purple-50 rounded-lg border border-purple-200">
          📋 一括投入
        </button>
        <button @click="resetSalesForm()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">クリア</button>
        <button @click="saveSale()" :disabled="!canSaveSale() || saving"
          class="px-5 py-2 bg-teal-700 hover:bg-teal-800 disabled:bg-slate-300 text-white text-sm font-medium rounded-lg">
          <span x-show="!saving" x-text="salesForm.id ? '更新' : '保存'"></span>
          <span x-show="saving">保存中...</span>
        </button>
      </div>

      <div x-show="salesMessage" class="mt-3 text-sm"
           :class="salesMessageType==='ok' ? 'text-emerald-600' : 'text-red-500'"
           x-text="salesMessage"></div>
    </div>

    <!-- 月別フィルタ -->
    <div class="bg-white rounded-xl shadow p-4 flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-600">表示月:</label>
        <input type="month" x-model="salesFilterMonth"
               class="px-3 py-1 border border-slate-300 rounded-lg text-sm">
        <button @click="salesFilterMonth = currentMonthStr()" class="text-xs text-teal-700 hover:underline">今月</button>
      </div>
      <div class="text-sm text-slate-600">
        <span x-text="filteredSales.length"></span>件 / 売上合計
        <span class="font-bold text-slate-800" x-text="'¥' + salesTotalAmount().toLocaleString()"></span>
      </div>
    </div>

    <!-- 商品別集計 -->
    <div x-show="salesByProduct.length > 0" class="bg-white rounded-xl shadow p-5">
      <h3 class="text-sm font-bold text-slate-700 mb-3">📊 商品別売上集計</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">商品名</th>
              <th class="px-3 py-2 text-right">販売数</th>
              <th class="px-3 py-2 text-right">サンプル数</th>
              <th class="px-3 py-2 text-right">売上金額</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="row in salesByProduct" :key="row.productName">
              <tr class="border-t border-slate-100">
                <td class="px-3 py-2" x-text="row.productName"></td>

<script>
function app() {
  return {
    // ===== UI 状態 =====
    unlocked: false,
    passcodeInput: '',
    lockError: '',
    currentTab: 'visits',
    cloudStatus: '初期化中',
    saving: false,
    fbReady: false,

    // タブ定義
    tabs: [
      { id: 'dashboard', label: 'ダッシュボード', placeholder: false },
      { id: 'visits',    label: '来院記録',       placeholder: false },
      { id: 'products',  label: '商品マスター',   placeholder: false },
      { id: 'sales',     label: '物販',           placeholder: false },
      { id: 'expenses',  label: '経費',           placeholder: true,  note: 'v0.4 で実装予定' },
      { id: 'ads',       label: '広告費',         placeholder: true,  note: 'v0.4 で実装予定' },
      { id: 'cashbook',  label: '現金出納帳',     placeholder: true,  note: 'v0.4 で実装予定' },
      { id: 'export',    label: '月末出力',       placeholder: true,  note: 'v0.5 で実装予定' },
    ],

    // マスター
    staffList: ['TAK', '日向'],
    paymentMethods: ['現金', 'カード', 'PayPay', '銀行振込', '回数券消化', 'サブスク'],

    // ===== データ =====
    products: [],
    customersTemp: [],   // 簡易顧客マスター(自動生成)
    visits: [],
    sales: [],

    // ===== 来院フォーム =====
    visitForm: { id: null, date: '', customerName: '', customerId: null, menu: '', amount: 0, staff: 'TAK', paymentMethod: '現金', note: '' },
    visitMessage: '',
    visitMessageType: 'ok',
    visitFilterMonth: '',
    showSuggest: false,

    // ===== 商品フォーム =====
    productModalOpen: false,
    productForm: { id: null, name: '', dealerPrice: 0, sellingPrice: 0, taxCategory: '10%', initialStock: 0, active: true },

    // ===== 物販フォーム =====
    salesForm: {
      id: null, date: '', productId: '', productName: '', unitPrice: 0, quantity: 1,
      amount: 0, paymentMethod: '現金', customerId: null, customerName: '',
      staff: 'TAK', isSample: false, note: ''
    },
    salesMessage: '',
    salesMessageType: 'ok',
    salesFilterMonth: '',
    showSalesSuggest: false,

    // ===== 物販 一括投入 =====
    salesBulkModalOpen: false,
    salesBulkText: '',
    salesBulkPreview: [],
    salesBulkError: '',

    // ===== 初期化 =====
    init() {
      this.visitForm = this.emptyVisit();
      this.productForm = this.emptyProduct();
      this.salesForm = this.emptySale();
      this.visitFilterMonth = this.currentMonthStr();
      this.salesFilterMonth = this.currentMonthStr();
      window.addEventListener('firebase-ready', () => {
        this.fbReady = true;
        if (this.unlocked) this.subscribeAll();
      });
    },

    // ===== ロック =====
    tryUnlock() {
      if (this.passcodeInput === '1111') {
        this.unlocked = true;
        this.passcodeInput = '';
        this.lockError = '';
        if (this.fbReady) this.subscribeAll();
      } else {
        this.lockError = 'パスコードが違います';
      }
    },
    lock() { this.unlocked = false; },

    // ===== Firestore 購読 =====
    subscribeAll() {
      const { db, collection, query, orderBy, onSnapshot } = window._fb;
      this.cloudStatus = '接続中';

      // 商品
      onSnapshot(query(collection(db, 'products'), orderBy('name')), snap => {
        this.products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = '接続エラー'; });

      // 来院
      onSnapshot(query(collection(db, 'visits'), orderBy('date', 'desc')), snap => {
        this.visits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = '接続エラー'; });

      // 簡易顧客マスター
      onSnapshot(collection(db, 'customers_temp'), snap => {
        this.customersTemp = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      });

      // 物販
      onSnapshot(query(collection(db, 'sales'), orderBy('date', 'desc')), snap => {
        this.sales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = '接続エラー'; });
    },

    // ===== 共通ユーティリティ =====
    todayStr() {
      const d = new Date();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${d.getFullYear()}-${m}-${dd}`;
    },
    currentMonthStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    },

    // ===== 来院フォーム =====
    emptyVisit() {
      return {
        id: null,
        date: this.todayStr(),
        customerName: '',
        customerId: null,
        menu: '',
        amount: 0,
        staff: 'TAK',
        paymentMethod: '現金',
        note: ''
      };
    },
    resetVisitForm() {
      this.visitForm = this.emptyVisit();
      this.visitMessage = '';
    },
    canSaveVisit() {
      const v = this.visitForm;
      return v.date && v.customerName && v.menu && v.staff && v.paymentMethod;
    },

    // 顧客名オートコンプリート
    onCustomerInput() {
      this.showSuggest = true;
      this.visitForm.customerId = null;  // 入力中はリセット
    },
    get filteredCustomers() {
      const q = (this.visitForm.customerName || '').trim();
      if (!q) return this.customersTemp.slice(0, 10);
      return this.customersTemp
        .filter(c => c.name && c.name.includes(q))
        .slice(0, 10);
    },
    selectCustomer(c) {
      this.visitForm.customerName = c.name;
      this.visitForm.customerId = c.id;
      this.showSuggest = false;
    },

    // 自動カテゴリ判定(GAS統計v4のロジックを踏襲)
    autoCategory() {
      const m = this.visitForm.menu || '';
      const p = this.visitForm.paymentMethod || '';
      if (m.includes('会員支払い') || p === 'サブスク') return 'サブスク';
      if (m.includes('回数券') && (m.includes('購入') || m.includes('券販売'))) return '回数券購入';
      if (p === '回数券消化' || m.includes('回数券消化')) return '回数券消化';
      if (m.match(/(浜松|袋井)?(\d+)回券?/) && (m.includes('購入') || m.includes('販売'))) return '回数券購入';
      return '都度払い';
    },

    categoryColor(cat) {
      switch(cat) {
        case 'サブスク':     return 'bg-purple-100 text-purple-700';
        case '回数券購入':   return 'bg-blue-100 text-blue-700';
        case '回数券消化':   return 'bg-sky-100 text-sky-700';
        case '都度払い':     return 'bg-emerald-100 text-emerald-700';
        default:             return 'bg-slate-100 text-slate-600';
      }
    },

    // 月別フィルタ
    get filteredVisits() {
      if (!this.visitFilterMonth) return this.visits;
      return this.visits.filter(v => (v.date || '').startsWith(this.visitFilterMonth));
    },
    visitTotalAmount() {
      return this.filteredVisits.reduce((s, v) => s + (v.amount || 0), 0);
    },

    // 保存
    async saveVisit() {
      if (!this.canSaveVisit()) return;
      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      this.visitMessage = '';

      try {
        const v = this.visitForm;
        const cat = this.autoCategory();

        // 1. 顧客マスター(自動登録 or リンク)
        let customerId = v.customerId;
        if (!customerId) {
          const existing = this.customersTemp.find(c => c.name === v.customerName.trim());
          if (existing) {
            customerId = existing.id;
          } else {
            const newRef = doc(collection(db, 'customers_temp'));
            customerId = newRef.id;
            await setDoc(newRef, {
              name: v.customerName.trim(),
              createdAt: serverTimestamp(),
              source: 'visit-auto',
              visitCount: 1
            });
          }
        }

        // 2. 来院記録保存
        const ref = v.id
          ? doc(db, 'visits', v.id)
          : doc(collection(db, 'visits'));

        const data = {
          date: v.date,
          customerName: v.customerName.trim(),
          customerId: customerId,
          menu: v.menu.trim(),
          amount: v.amount || 0,
          staff: v.staff,
          paymentMethod: v.paymentMethod,
          cashbookCategory: cat,
          note: v.note || '',
          updatedAt: serverTimestamp()
        };
        if (!v.id) data.createdAt = serverTimestamp();

        await setDoc(ref, data, { merge: true });

        this.visitMessage = v.id ? '更新しました' : '保存しました';
        this.visitMessageType = 'ok';
        this.resetVisitForm();
        setTimeout(() => this.visitMessage = '', 2500);
      } catch (e) {
        console.error(e);
        this.visitMessage = 'エラー: ' + e.message;
        this.visitMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },

    editVisit(v) {
      this.visitForm = { ...v };
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    async deleteVisit(v) {
      if (!confirm(`${v.date} ${v.customerName} の記録を削除しますか?`)) return;
      const { db, doc, deleteDoc } = window._fb;
      try {
        await deleteDoc(doc(db, 'visits', v.id));
      } catch (e) {
        alert('削除エラー: ' + e.message);
      }
    },

    // ===== 商品マスター =====
    emptyProduct() {
      return { id: null, name: '', dealerPrice: 0, sellingPrice: 0, taxCategory: '10%', initialStock: 0, active: true };
    },
    openProductModal() {
      this.productForm = this.emptyProduct();
      this.productModalOpen = true;
    },
    editProduct(p) {
      this.productForm = { ...p };
      this.productModalOpen = true;
    },
    async saveProduct() {
      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      try {
        const p = this.productForm;
        const ref = p.id ? doc(db, 'products', p.id) : doc(collection(db, 'products'));
        const data = {
          name: p.name.trim(),
          dealerPrice: p.dealerPrice || 0,
          sellingPrice: p.sellingPrice || 0,
          taxCategory: p.taxCategory || '10%',
          initialStock: p.initialStock || 0,
          active: p.active !== false,
          updatedAt: serverTimestamp()
        };
        if (!p.id) data.createdAt = serverTimestamp();
        await setDoc(ref, data, { merge: true });
        this.productModalOpen = false;
      } catch (e) {
        alert('エラー: ' + e.message);
      } finally {
        this.saving = false;
      }
    },
    async deleteProduct(p) {
      if (!confirm(`「${p.name}」を削除しますか?`)) return;
      const { db, doc, deleteDoc } = window._fb;
      try {
        await deleteDoc(doc(db, 'products', p.id));
      } catch (e) {
        alert('削除エラー: ' + e.message);
      }
    },

    async seedProducts() {
      if (!confirm('テスト用商品を一括登録します。よろしいですか?')) return;
      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      const seeds = [
        { name: 'NMN サプリ', dealerPrice: 8000, sellingPrice: 12000, taxCategory: '8%', initialStock: 0, active: true },
        { name: 'TeraVita', dealerPrice: 15000, sellingPrice: 25000, taxCategory: '8%', initialStock: 0, active: true },
        { name: 'プロテイン', dealerPrice: 3000, sellingPrice: 5500, taxCategory: '8%', initialStock: 0, active: true },
      ];
      for (const s of seeds) {
        const ref = doc(collection(db, 'products'));
        await setDoc(ref, { ...s, createdAt: serverTimestamp() });
      }
      alert('登録しました');
    },

    // ============================================
    // ===== v0.3 物販機能 =====
    // ============================================

    get activeProducts() {
      return this.products.filter(p => p.active !== false);
    },

    get filteredSales() {
      if (!this.salesFilterMonth) return this.sales;
      return this.sales.filter(s => (s.date || '').startsWith(this.salesFilterMonth));
    },

    get salesByProduct() {
      const map = {};
      for (const s of this.filteredSales) {
        const key = s.productName || '(商品名なし)';
        if (!map[key]) {
          map[key] = { productName: key, salesQty: 0, sampleQty: 0, totalAmount: 0 };
        }
        if (s.isSample) {
          map[key].sampleQty += Number(s.quantity) || 0;
        } else {
          map[key].salesQty += Number(s.quantity) || 0;
        }
        map[key].totalAmount += Number(s.amount) || 0;
      }
      return Object.values(map).sort((a, b) => b.totalAmount - a.totalAmount);
    },

    get filteredSalesCustomers() {
      const q = (this.salesForm.customerName || '').trim();
      if (!q) return this.customersTemp.slice(0, 10);
      return this.customersTemp
        .filter(c => c.name && c.name.includes(q))
        .slice(0, 10);
    },

    emptySale() {
      return {
        id: null,
        date: this.todayStr(),
        productId: '',
        productName: '',
        unitPrice: 0,
        quantity: 1,
        amount: 0,
        paymentMethod: '現金',
        customerId: null,
        customerName: '',
        staff: 'TAK',
        isSample: false,
        note: ''
      };
    },

    resetSalesForm() {
      this.salesForm = this.emptySale();
      this.salesMessage = '';
    },

    canSaveSale() {
      const s = this.salesForm;
      return s.date && s.productId && s.productName && s.quantity > 0 && s.staff && s.paymentMethod;
    },

    salesTotalAmount() {
      return this.filteredSales.reduce((sum, s) => sum + (Number(s.amount) || 0), 0);
    },

    onProductSelect() {
      const p = this.products.find(x => x.id === this.salesForm.productId);
      if (p) {
        this.salesForm.productName = p.name;
        this.salesForm.unitPrice = Number(p.sellingPrice) || 0;
        this.recalcSalesAmount();
      } else {
        this.salesForm.productName = '';
        this.salesForm.unitPrice = 0;
        this.salesForm.amount = 0;
      }
    },

    recalcSalesAmount() {
      if (this.salesForm.isSample) {
        this.salesForm.amount = 0;
      } else {
        const unit = Number(this.salesForm.unitPrice) || 0;
        const qty = Number(this.salesForm.quantity) || 0;
        this.salesForm.amount = unit * qty;
      }
    },

    onSalesCustomerInput() {
      this.showSalesSuggest = true;
      this.salesForm.customerId = null;
    },

    selectSalesCustomer(c) {
      this.salesForm.customerName = c.name;
      this.salesForm.customerId = c.id;
      this.showSalesSuggest = false;
    },

    async saveSale() {
      if (!this.canSaveSale()) return;
      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      this.salesMessage = '';

      try {
        const s = this.salesForm;

        // 1. 顧客マスター(任意・名前があるとき)
        let customerId = s.customerId;
        if (s.customerName && s.customerName.trim() && !customerId) {
          const trimmedName = s.customerName.trim();
          const existing = this.customersTemp.find(c => c.name === trimmedName);
          if (existing) {
            customerId = existing.id;
          } else {
            const newRef = doc(collection(db, 'customers_temp'));
            customerId = newRef.id;
            await setDoc(newRef, {
              name: trimmedName,
              createdAt: serverTimestamp(),
              source: 'sales-auto',
              visitCount: 0
            });
          }
        }

        // 2. 物販記録保存
        const ref = s.id
          ? doc(db, 'sales', s.id)
          : doc(collection(db, 'sales'));

        const data = {
          date: s.date,
          productId: s.productId || null,
          productName: s.productName,
          unitPrice: Number(s.unitPrice) || 0,
          quantity: Number(s.quantity) || 1,
          amount: s.isSample ? 0 : (Number(s.amount) || 0),
          paymentMethod: s.paymentMethod || '現金',
          customerId: customerId || null,
          customerName: (s.customerName || '').trim(),
          staff: s.staff || 'TAK',
          isSample: !!s.isSample,
          note: s.note || '',
          updatedAt: serverTimestamp()
        };
        if (!s.id) data.createdAt = serverTimestamp();

        await setDoc(ref, data, { merge: true });

        this.salesMessage = s.id ? '更新しました' : '保存しました';
        this.salesMessageType = 'ok';
        this.resetSalesForm();
        setTimeout(() => this.salesMessage = '', 2500);
      } catch (e) {
        console.error(e);
        this.salesMessage = 'エラー: ' + e.message;
        this.salesMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },

    editSale(s) {
      this.salesForm = { ...s };
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    async deleteSale(s) {
      if (!confirm(`${s.date} ${s.productName} × ${s.quantity} の記録を削除しますか?`)) return;
      const { db, doc, deleteDoc } = window._fb;
      try {
        await deleteDoc(doc(db, 'sales', s.id));
      } catch (e) {
        alert('削除エラー: ' + e.message);
      }
    },

    openSalesBulkImport() {
      this.salesBulkModalOpen = true;
      this.salesBulkText = '';
      this.salesBulkPreview = [];
      this.salesBulkError = '';
    },

    parseSalesBulk() {
      this.salesBulkError = '';
      this.salesBulkPreview = [];

      let parsed;
      try {
        parsed = JSON.parse(this.salesBulkText);
      } catch (e) {
        this.salesBulkError = 'JSON parseエラー: ' + e.message;
        return;
      }

      if (!Array.isArray(parsed)) {
        this.salesBulkError = 'JSONは配列である必要があります';
        return;
      }

      this.salesBulkPreview = parsed.map((item) => {
        const out = {
          date: item.date || '',
          productName: item.productName || '',
          quantity: Number(item.quantity) || 0,
          unitPrice: Number(item.unitPrice) || 0,
          amount: 0,
          paymentMethod: item.paymentMethod || '現金',
          customerName: item.customerName || '',
          staff: item.staff || 'TAK',
          isSample: !!item.isSample,
          note: item.note || '',
          productId: null,
          error: ''
        };

        if (!out.date) out.error = '日付なし';
        else if (!out.productName) out.error = '商品名なし';
        else if (out.quantity <= 0) out.error = '数量不正';

        if (!out.error) {
          const product = this.products.find(p => p.name === out.productName);
          if (!product) {
            out.error = `商品マスターに存在しない: ${out.productName}`;
          } else {
            out.productId = product.id;
            if (out.unitPrice === 0) out.unitPrice = Number(product.sellingPrice) || 0;
          }
        }

        if (out.isSample) {
          out.amount = 0;
        } else if (item.amount !== undefined && item.amount !== null) {
          out.amount = Number(item.amount) || 0;
        } else {
          out.amount = out.unitPrice * out.quantity;
        }

        return out;
      });
    },

    async executeSalesBulk() {
      if (this.salesBulkPreview.length === 0) return;
      if (this.salesBulkPreview.some(x => x.error)) {
        alert('エラーのある行があります。修正してから再実行してください');
        return;
      }
      if (!confirm(`${this.salesBulkPreview.length}件を投入します。よろしいですか?`)) return;

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      let success = 0;

      try {
        for (const item of this.salesBulkPreview) {
          const ref = doc(collection(db, 'sales'));
          await setDoc(ref, {
            date: item.date,
            productId: item.productId || null,
            productName: item.productName,
            unitPrice: item.unitPrice,
            quantity: item.quantity,
            amount: item.amount,
            paymentMethod: item.paymentMethod,
            customerId: null,
            customerName: item.customerName || '',
            staff: item.staff,
            isSample: item.isSample,
            note: item.note || '',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          success++;
        }
        alert(`${success}件 投入完了!`);
        this.salesBulkModalOpen = false;
        this.salesBulkText = '';
        this.salesBulkPreview = [];
      } catch (e) {
        console.error(e);
        alert('一括投入エラー(' + success + '件成功後): ' + e.message);
      } finally {
        this.saving = false;
      }
    }

    // ===== /v0.3 物販機能 =====
  };
}
</script>
