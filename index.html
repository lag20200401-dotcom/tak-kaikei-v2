<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整体院TAK 経営管理 v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
<!-- v0.5: SheetJS + JSZip -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
  .tab-active { background:#0f766e; color:white; }
  .tab-inactive { background:#f1f5f9; color:#334155; }
  .tab-inactive:hover { background:#e2e8f0; }
  /* オートコンプリート候補リスト */
  .suggest-list {
    max-height: 200px;
    overflow-y: auto;
  }
</style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="app()" x-init="init()" x-cloak>

<!-- ===== ロック画面 ===== -->
<template x-if="!unlocked">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="text-2xl font-bold text-slate-800">整体院TAK</div>
        <div class="text-sm text-slate-500 mt-1">経営管理 v2</div>
      </div>
      <input type="password" x-model="passcodeInput" @keyup.enter="tryUnlock()"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-center text-2xl tracking-widest"
        placeholder="パスコード" maxlength="4">
      <button @click="tryUnlock()"
        class="w-full mt-4 bg-teal-700 hover:bg-teal-800 text-white font-medium py-3 rounded-lg">
        入る
      </button>
      <div x-show="lockError" class="text-red-500 text-sm text-center mt-3" x-text="lockError"></div>
    </div>
  </div>
</template>

<!-- ===== メイン画面 ===== -->
<template x-if="unlocked">
<div>

<!-- ヘッダー -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <span class="font-bold text-slate-800">整体院TAK</span>
      <span class="text-slate-400 mx-2">/</span>
      <span class="text-sm text-slate-600">経営管理 v2</span>
      <span class="text-xs text-teal-600 ml-2 font-medium">v0.9.5</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs px-2 py-1 rounded"
            :class="cloudStatus==='接続中' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
            x-text="'☁ ' + cloudStatus"></span>
      <button @click="lock()" class="text-sm text-slate-500 hover:text-slate-800">ロック</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="max-w-6xl mx-auto px-4 pb-2">
    <div class="flex gap-1 overflow-x-auto">
      <template x-for="t in tabs" :key="t.id">
        <button @click="currentTab = t.id"
          :class="currentTab === t.id ? 'tab-active' : 'tab-inactive'"
          class="px-4 py-2 rounded-t-lg text-sm font-medium whitespace-nowrap relative">
          <span x-text="t.label"></span>
          <!-- 🆕 v0.5: 月末出力タブの未出力バッジ -->
          <span x-show="t.id === 'export' && pendingExports.length > 0"
                class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"
                x-text="pendingExports.length"></span>
        </button>
      </template>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto p-4">

  <!-- ====== ダッシュボード ====== -->
  <section x-show="currentTab==='dashboard'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-2">ダッシュボード</h2>
      <p class="text-sm text-slate-500">準備中</p>
      <p class="text-sm text-slate-500 mt-1">来院・物販・経費の合計サマリと、未完了アラートを表示予定</p>
    </div>
  </section>

  <!-- ====== 来院記録 ====== -->
  <section x-show="currentTab==='visits'" class="space-y-4">

    <!-- 入力フォーム -->
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-slate-800">来院記録</h2>
        <div class="text-xs text-slate-400" x-text="'本日: ' + todayStr()"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
        <!-- 日付 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">日付 *</label>
          <input type="date" x-model="visitForm.date"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 顧客名(オートコンプリート) -->
        <div class="md:col-span-3 relative">
          <label class="block text-xs text-slate-600 mb-1">顧客名 *</label>
          <input type="text" x-model="visitForm.customerName"
            @input="onCustomerInput()"
            @focus="showSuggest = true"
            @blur="setTimeout(() => showSuggest = false, 200)"
            placeholder="顧客名を入力"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" autocomplete="off">
          <!-- サジェスト -->
          <div x-show="showSuggest && filteredCustomers.length > 0"
               class="suggest-list absolute z-20 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-lg">
            <template x-for="c in filteredCustomers" :key="c.id">
              <button @mousedown.prevent="selectCustomer(c)"
                class="block w-full text-left px-3 py-2 hover:bg-teal-50 text-sm">
                <span x-text="c.name"></span>
                <span x-show="c.visitCount" class="text-xs text-slate-400 ml-2"
                      x-text="'(' + c.visitCount + '回)'"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- 🆕 v0.9.3: 保有券・サブスクバナー + 来院履歴(顧客名選択時に表示) -->
        <div x-show="visitForm.customerName && visitForm.customerName.trim()"
             class="md:col-span-12 -mt-2 space-y-1.5">

          <!-- バナー行(保有券・サブスク) -->
          <div class="flex flex-wrap gap-1.5 text-xs">
            <template x-for="t in getActiveTicketsForCustomer(visitForm.customerName)" :key="'banner-tk-' + t.id">
              <span class="inline-flex items-center gap-1 px-2 py-1 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded">
                🎟️ <span x-text="t.ticketType"></span>
                残<span class="font-bold" x-text="t.remainingCount"></span>回
              </span>
            </template>
            <template x-for="s in subscriptions.filter(s => s.status === 'active' && s.customerName === (visitForm.customerName || '').trim())" :key="'banner-sb-' + s.id">
              <span class="inline-flex items-center gap-1 px-2 py-1 bg-purple-50 border border-purple-200 text-purple-800 rounded">
                💳 <span x-text="s.paymentMethod"></span>
                <span class="font-bold" x-text="s.units + '口'"></span>
              </span>
            </template>
          </div>
          <!-- 履歴ヘッダー行(前回来院日 + 展開ボタン) -->
          <div x-show="getCustomerVisitHistory(visitForm.customerName).length > 0"
               class="flex items-center gap-2 text-xs text-slate-600">
            <span class="inline-flex items-center gap-1">
              📅 前回
              <span class="font-medium" x-text="formatDateWithWeekday(getCustomerVisitHistory(visitForm.customerName)[0]?.date || '')"></span>
              <span class="text-slate-500" x-text="formatDaysAgo(getCustomerVisitHistory(visitForm.customerName)[0]?.date || '')"></span>
            </span>
            <button type="button"
                    @click="visitHistoryOpen = !visitHistoryOpen"
                    class="text-teal-700 hover:underline">
              <span x-show="!visitHistoryOpen">▼ 履歴</span>
              <span x-show="visitHistoryOpen">▲ 閉じる</span>
            </button>
          </div>

          <!-- 履歴テーブル(展開時のみ表示) -->
          <div x-show="visitHistoryOpen && getCustomerVisitHistory(visitForm.customerName).length > 0"
               class="border border-slate-200 rounded overflow-hidden">
            <table class="w-full text-xs">
              <thead class="bg-slate-100 text-slate-600">
                <tr>
                  <th class="px-2 py-1 text-left">日付</th>
                  <th class="px-2 py-1 text-left">メニュー</th>
                  <th class="px-2 py-1 text-right">金額</th>
                  <th class="px-2 py-1 text-left">担当</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="h in getCustomerVisitHistory(visitForm.customerName)" :key="'hist-' + h.id">
                  <tr class="border-t border-slate-100">
                    <td class="px-2 py-1 whitespace-nowrap" x-text="formatDateWithWeekday(h.date)"></td>
                    <td class="px-2 py-1" x-text="h.menu"></td>
                    <td class="px-2 py-1 text-right text-slate-600" x-text="(h.amount > 0) ? ('¥' + h.amount.toLocaleString()) : '-'"></td>
                    <td class="px-2 py-1 text-slate-600" x-text="h.staff"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

        </div>
        
       <!-- メニュー(プルダウン+自由入力ハイブリッド) v0.6.5 -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">メニュー *</label>
          <select @change="applyMenuPreset($event.target.value); $event.target.value=''"
            class="w-full px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-teal-50 mb-1 cursor-pointer">
            <option value="">📋 プリセットから選択...</option>
            <template x-for="preset in MENU_PRESETS" :key="preset.name">
              <option :value="preset.name" x-text="preset.amount !== null ? (preset.name + ' (¥' + preset.amount.toLocaleString() + ')') : (preset.name + ' (金額入力)')"></option>
            </template>
          </select>
          <input type="text" x-model="visitForm.menu"
            placeholder="例: 整体60分 / 回数券消化"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
        <!-- 金額 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">金額(円)</label>
          <input type="number" x-model.number="visitForm.amount" placeholder="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 担当者 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">担当者 *</label>
          <select x-model="visitForm.staff"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="s in staffList" :key="s">
              <option :value="s" x-text="s"></option>
            </template>
          </select>
        </div>

        <!-- 支払方法 -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">支払方法 *</label>
          <select x-model="visitForm.paymentMethod"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="p in paymentMethods" :key="p">
              <option :value="p" x-text="p"></option>
            </template>
          </select>
        </div>

        <!-- 自動判定: cashbookCategory -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">区分(自動判定)</label>
          <div class="px-3 py-2 bg-slate-100 rounded-lg text-sm text-slate-700"
               x-text="autoCategory()"></div>
        </div>

        <!-- 備考 -->
        <div class="md:col-span-6">
          <label class="block text-xs text-slate-600 mb-1">備考</label>
          <input type="text" x-model="visitForm.note" placeholder="任意"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 🆕 v0.9.4 (フェーズ1-2): 物販(任意) -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">
            物販金額 <span class="text-slate-400">(任意)</span>
          </label>
          <input type="number" x-model.number="visitForm.retailAmount" placeholder="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
        <div class="md:col-span-9">
          <label class="block text-xs text-slate-600 mb-1">
            物販メモ <span class="text-slate-400">(任意)</span>
          </label>
          <input type="text" x-model="visitForm.retailMemo" placeholder="例: NMN×1, TeraVita×2"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
      </div>

      <!-- 保存ボタン -->
      <div class="flex justify-end gap-2 mt-4">
        <button @click="resetVisitForm()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">クリア</button>
        <button @click="saveVisit()" :disabled="!canSaveVisit() || saving"
          class="px-5 py-2 bg-teal-700 hover:bg-teal-800 disabled:bg-slate-300 text-white text-sm font-medium rounded-lg">
          <span x-show="!saving" x-text="visitForm.id ? '更新' : '保存'"></span>
          <span x-show="saving">保存中...</span>
        </button>
      </div>

      <div x-show="visitMessage" class="mt-3 text-sm"
           :class="visitMessageType==='ok' ? 'text-emerald-600' : 'text-red-500'"
           x-text="visitMessage"></div>
    </div>

    <!-- 月別フィルタ -->
    <div class="bg-white rounded-xl shadow p-4 flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-600">表示月:</label>
        <input type="month" x-model="visitFilterMonth"
               class="px-3 py-1 border border-slate-300 rounded-lg text-sm">
        <button @click="visitFilterMonth = currentMonthStr()" class="text-xs text-teal-700 hover:underline">今月</button>
      </div>
      <div class="text-sm text-slate-600">
        <span x-text="filteredVisits.length"></span>件 / 合計
        <span class="font-bold text-slate-800" x-text="'¥' + visitTotalAmount().toLocaleString()"></span>
      </div>
    </div>

    <!-- 一覧 -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div x-show="filteredVisits.length === 0" class="p-8 text-center text-slate-400 text-sm">
        この月の来院記録はまだありません
      </div>
      <div x-show="filteredVisits.length > 0" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">日付</th>
              <th class="px-3 py-2 text-left">顧客名</th>
              <th class="px-3 py-2 text-left">メニュー</th>
              <th class="px-3 py-2 text-right">金額</th>
              <th class="px-3 py-2 text-left">担当</th>
              <th class="px-3 py-2 text-left">支払</th>
              <th class="px-3 py-2 text-left">区分</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
           <!-- 🆕 v0.8.5: 日付グループごとに区切る -->
            <template x-for="group in groupedVisits" :key="group.date">
              <template x-for="(v, idx) in group.visits" :key="v.id">
                <tr class="border-t border-slate-100 hover:bg-slate-50">
                  <!-- 同じ日の1件目だけ日付ヘッダーセル(rowspan)を表示 -->
                  <template x-if="idx === 0">
                    <td class="px-3 py-2 whitespace-nowrap bg-slate-50 font-medium border-r border-slate-200 align-top"
                        :rowspan="group.visits.length">
                      <div class="text-slate-800" x-text="formatDateWithWeekday(group.date)"></div>
                      <div class="text-xs text-slate-500 mt-1">
                        <span x-text="group.count + '件'"></span>
                      </div>
                      <div class="text-xs text-teal-700 font-bold mt-0.5"
                           x-text="'¥' + group.dayTotal.toLocaleString()"></div>
                    </td>
                  </template>
                  <td class="px-3 py-2" x-text="v.customerName"></td>
                  <td class="px-3 py-2" x-text="v.menu"></td>
                  <td class="px-3 py-2 text-right" x-text="'¥' + (v.amount||0).toLocaleString()"></td>
                  <td class="px-3 py-2" x-text="v.staff"></td>
                  <td class="px-3 py-2" x-text="v.paymentMethod"></td>
                  <td class="px-3 py-2">
                    <span class="text-xs px-2 py-0.5 rounded"
                          :class="categoryColor(v.cashbookCategory)"
                          x-text="v.cashbookCategory"></span>
                  </td>
                  <td class="px-3 py-2 text-right whitespace-nowrap">
                    <button @click="editVisit(v)" class="text-xs text-teal-700 hover:underline">編集</button>
                    <button @click="deleteVisit(v)" class="text-xs text-red-500 hover:underline ml-2">削除</button>
                  </td>
                </tr>
              </template>
            </template>
          </tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ====== 商品マスター ====== -->
  <section x-show="currentTab==='products'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-lg font-bold text-slate-800">商品マスター</h2>
          <p class="text-xs text-slate-500 mt-1">物販で扱う商品の登録・編集</p>
        </div>
        <button @click="openProductModal()"
          class="px-4 py-2 bg-teal-700 hover:bg-teal-800 text-white text-sm rounded-lg">
          ＋新規追加
        </button>
      </div>

      <div x-show="products.length === 0" class="p-8 text-center text-slate-400 text-sm">
        まだ商品が登録されていません<br>
        <span class="text-xs">右上「新規追加」から登録してください</span>
      </div>

      <div x-show="products.length > 0" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">商品名</th>
              <th class="px-3 py-2 text-right">代理店価格</th>
              <th class="px-3 py-2 text-right">販売価格</th>
              <th class="px-3 py-2 text-center">税</th>
              <th class="px-3 py-2 text-right">月初在庫</th>
              <th class="px-3 py-2 text-center">状態</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in products" :key="p.id">
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-3 py-2" x-text="p.name"></td>
                <td class="px-3 py-2 text-right" x-text="p.dealerPrice ? '¥' + p.dealerPrice.toLocaleString() : '-'"></td>
                <td class="px-3 py-2 text-right" x-text="'¥' + (p.sellingPrice||0).toLocaleString()"></td>
                <td class="px-3 py-2 text-center" x-text="p.taxCategory || '-'"></td>
                <td class="px-3 py-2 text-right" x-text="p.initialStock||0"></td>
                <td class="px-3 py-2 text-center">
                  <span class="text-xs px-2 py-0.5 rounded"
                        :class="p.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'"
                        x-text="p.active ? '稼働中' : '停止'"></span>
                </td>
                <td class="px-3 py-2 text-right whitespace-nowrap">
                  <button @click="editProduct(p)" class="text-xs text-teal-700 hover:underline">編集</button>
                  <button @click="deleteProduct(p)" class="text-xs text-red-500 hover:underline ml-2">削除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <details class="bg-white rounded-xl shadow p-4 text-sm text-slate-500">
      <summary class="cursor-pointer">💡 開発用: テスト用に13品目を一括登録</summary>
      <button @click="seedProducts()" class="mt-3 px-4 py-2 bg-slate-700 text-white rounded-lg text-xs">
        一括登録実行
      </button>
    </details>

    <!-- 🆕 v0.6: 顧客CSV取込(一時ツール) -->
    <details class="bg-white rounded-xl shadow p-4 text-sm">
      <summary class="cursor-pointer text-slate-700 font-medium">📥 顧客CSV取込(囲い込み職人) — 一時ツール</summary>
      <div class="mt-4 space-y-3">

        <!-- 説明 -->
        <div class="bg-blue-50 border border-blue-200 rounded p-3 text-xs text-slate-700">
          <p class="font-bold mb-1">使い方:</p>
          <ol class="list-decimal pl-5 space-y-0.5">
            <li>囲い込み職人からエクスポートしたCSV(Shift-JIS)を選択</li>
            <li>「読み込み」→ プレビュー表示</li>
            <li>各行の処理(新規/補完/スキップ)を確認</li>
            <li>「投入実行」で一括登録</li>
          </ol>
          <p class="mt-2">想定列: 顧客No / 顧客名 / ふりがな / 性別 / 郵便番号 / 住所１ / 住所２ / 電話-1 / 電話-2 / メールアドレス / 生年月日 / 年齢 / 年代 / 職業 / 動機 / 最終来店日 / 来店回数</p>
        </div>

        <!-- ファイル選択 -->
        <div class="flex items-center gap-3 flex-wrap">
          <input type="file" accept=".csv,text/csv"
                 @change="onCustomerCsvSelected($event)"
                 class="text-sm">
          <select x-model="customerCsvEncoding"
                  class="px-2 py-1 border border-slate-300 rounded text-xs">
            <option value="auto">エンコーディング自動判定</option>

                    <td class="px-2 py-1 text-slate-600" x-text="row.furigana || '-'"></td>

          <details class="bg-red-50 rounded-lg">
            <summary class="cursor-pointer p-3 text-red-800 font-medium text-sm">

            </summary>
            <div class="p-4 space-y-3">
              <div class="bg-white rounded p-3 text-xs text-slate-700 space-y-2">
                <div class="font-bold text-red-700">⚠️ 削除条件(3つ全て満たすデータのみ削除):</div>
                <ol class="list-decimal list-inside space-y-1 ml-2">
                  <li><code class="bg-slate-100 px-1">importedFrom === 'kakoikomi'</code></li>
                  <li>顧客No が <code class="bg-slate-100 px-1">1001〜1010</code>(4桁)のいずれか</li>
                  <li>顧客名が架空テスト名(青山太郎/飯田花子/上野次郎/榎本美咲/小田俊夫/加藤健太/木村花子/佐々木太一/鈴木愛子)のいずれか</li>
                </ol>
                <div class="text-red-600 font-medium">

                </div>
              </div>

                      </li>
                    </template>
                  </ul>
                </div>
                <div x-show="testDataFound?.length > 0" class="mt-3 space-y-2">
                  <label class="block text-xs">
                    最終確認: <span class="font-bold text-red-600">DELETE</span> と入力してください:
                    <input type="text" x-model="testDeleteConfirm"
                           class="block w-32 mt-1 border border-slate-300 rounded px-2 py-1 text-xs"
                           placeholder="DELETE">

                  <button @click="deleteTestData()"

                          class="px-3 py-2 bg-red-600 hover:bg-red-700 disabled:bg-slate-300 text-white text-xs rounded">
                    <span x-show="!testDataDeleting">② <span x-text="testDataFound?.length"></span>件を削除実行</span>
                    <span x-show="testDataDeleting">削除中...</span>
                  </button>
                </div>
                <div x-show="testDataFound?.length === 0" class="mt-2 text-xs text-green-700">

                </div>
              </div>
            </div>
          </details>
        </div>

    // ===== Firestore 購読(v0.6.4: customers_temp は getDocs に変更、他は unsubscribe 対応) =====
    async subscribeAll() {
      const { db, collection, query, orderBy, onSnapshot, getDocs } = window._fb;

      // 既存リスナーを全停止(冪等性確保: ロック解除を繰り返してもリスナーが増殖しない)
      this.unsubscribeAll();

      this.cloudStatus = '接続中';

      // ① customers_temp は getDocs で1回だけ取得(localStorageキャッシュ優先)
      try {
        await this.loadCustomersTempOnce();
      } catch (err) {
        console.error('customers_temp 取得エラー:', err);
        this.cloudStatus = '接続エラー';
      }

      // ② サイズの小さいコレクションは onSnapshot 維持(リアルタイム性を保つ)
      //    unsubscribe 関数を保管しておき、lock時に停止できるようにする
      const u1 = onSnapshot(query(collection(db, 'products'), orderBy('name')), snap => {
        this.products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = '接続エラー'; });
      this.unsubscribers.push(u1);

      const u2 = onSnapshot(query(collection(db, 'visits'), orderBy('date', 'desc')), snap => {
        this.visits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); this.cloudStatus = '接続エラー'; });
      this.unsubscribers.push(u2);

      }, err => { console.error(err); this.cloudStatus = '接続エラー'; });

      }, err => { console.error(err); this.cloudStatus = '接続エラー'; });
      this.unsubscribers.push(u5);

      const u6 = onSnapshot(query(collection(db, 'cash_deposits'), orderBy('date', 'desc')), snap => {
        this.cashDeposits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error(err); });
      this.unsubscribers.push(u6);

      const u7 = onSnapshot(query(collection(db, 'monthlyExports'), orderBy('yearMonth', 'desc')), snap => {
        this.monthlyExports = snap.docs.map(d => {
          const data = d.data();
          let dt = null;
          if (data.exportedAt && typeof data.exportedAt.toDate === 'function') {
            dt = data.exportedAt.toDate();
          } else if (data.exportedAt) {
            dt = new Date(data.exportedAt);
          }
          return {
            id: d.id,
            yearMonth: data.yearMonth,
            exportedAt: dt,
            exportedAtStr: dt ? dt.toLocaleString('ja-JP', { dateStyle: 'short', timeStyle: 'short' }) : ''
          };
        });
      }, err => { console.error(err); });
      this.unsubscribers.push(u7);
      // 🆕 v0.7: 仕入記録の購読
      const u8 = onSnapshot(query(collection(db, 'purchases'), orderBy('date', 'desc')), snap => {

      }, err => { console.error('purchases購読エラー:', err); this.cloudStatus = '接続エラー'; });
      this.unsubscribers.push(u8);

      // 🆕 v0.8: 回数券の購読(購入日昇順 = 古い券から先に消化するため)
      const u9 = onSnapshot(query(collection(db, 'tickets'), orderBy('purchaseDate', 'asc')), snap => {
        this.tickets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }, err => { console.error('tickets購読エラー:', err); this.cloudStatus = '接続エラー'; });
      this.unsubscribers.push(u9);

    // 🆕 v0.6.4: customers_temp を1回だけ取得(localStorageキャッシュで2回目以降を高速化)
    async loadCustomersTempOnce() {
      const { db, collection, getDocs } = window._fb;
      const CACHE_KEY = 'tak_customersTemp_cache_v1';
      const CACHE_TTL_MS = 24 * 60 * 60 * 1000;  // 24時間

      // ① localStorageキャッシュチェック
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          const obj = JSON.parse(cached);
          const age = Date.now() - (obj.savedAt || 0);
          if (obj.data && Array.isArray(obj.data) && age < CACHE_TTL_MS) {
            this.customersTemp = obj.data;
            this.customersTempLastFetch = obj.savedAt;
            console.log('✓ customers_temp: localStorageから ' + obj.data.length + '件 復元 (' + Math.round(age/1000/60) + '分前のキャッシュ)');
            return;  // Firestoreは叩かない
          }
        }
      } catch (e) {
        console.warn('localStorage読込失敗:', e);
      }

      // ② キャッシュ無効 → getDocsで取得
      console.log('▶ customers_temp: Firestoreから取得中...');
      const snap = await getDocs(collection(db, 'customers_temp'));
      this.customersTemp = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      this.customersTempLastFetch = Date.now();
      console.log('✓ customers_temp: Firestoreから ' + this.customersTemp.length + '件 取得');

      // ③ localStorageに保存
      this.persistCustomersTempCache();
    },

    // 🆕 v0.6.4: customers_temp を強制再取得(キャッシュ破棄)
    async refreshCustomersTemp() {
      try { localStorage.removeItem('tak_customersTemp_cache_v1'); } catch (e) {}
      this.customersTempLastFetch = 0;
      await this.loadCustomersTempOnce();
    },

    // 🆕 v0.6.4: メモリ上の customersTemp に1件 追加/更新 + localStorageキャッシュも更新
    upsertCustomerLocal(customer) {
      if (!customer || !customer.id) return;
      const idx = this.customersTemp.findIndex(c => c.id === customer.id);
      if (idx >= 0) {
        this.customersTemp[idx] = { ...this.customersTemp[idx], ...customer };
      } else {
        this.customersTemp.push(customer);
      }
      this.persistCustomersTempCache();
    },

    // 🆕 v0.6.4: メモリ上の customersTemp から1件削除 + localStorageキャッシュも更新
    removeCustomerLocal(customerId) {
      this.customersTemp = this.customersTemp.filter(c => c.id !== customerId);
      this.persistCustomersTempCache();
    },

    // 🆕 v0.6.4: customers_temp を localStorage に保存
    persistCustomersTempCache() {
      try {
        const sanitized = this.customersTemp.map(c => {
          const out = {};
          for (const k of Object.keys(c)) {
            const v = c[k];
            if (v && typeof v === 'object' && typeof v.toDate === 'function') continue;
            out[k] = v;
          }
          return out;
        });
        localStorage.setItem('tak_customersTemp_cache_v1', JSON.stringify({
          savedAt: Date.now(),
          data: sanitized
        }));
      } catch (e) {
        console.warn('localStorageキャッシュ更新失敗:', e);
      }
    },

    // 🆕 v0.8.5: 日付でグルーピング → [{ date, count, dayTotal, visits[] }, ...]
    get groupedVisits() {
      const map = {};
      for (const v of this.filteredVisits) {
        const key = v.date || '';
        if (!map[key]) {
          map[key] = { date: key, count: 0, dayTotal: 0, visits: [] };
        }
        map[key].count++;
        map[key].dayTotal += Number(v.amount) || 0;
        map[key].visits.push(v);
      }
      // 日付の新しい順
      return Object.values(map).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    formatDateWithWeekday(dateStr) {

      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      return `${dateStr}(${weekdays[d.getDay()]})`;

    async saveVisit() {
      if (!this.canSaveVisit()) return;
      const { db, collection, doc, getDoc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      this.visitMessage = '';

      try {
        const v = this.visitForm;
        const cat = this.autoCategory();

        // 🆕 v0.8.1: 編集時は旧visitsデータを取得(後でロールバックに使う)
        let oldVisit = null;
        if (v.id) {
          try {
            const oldSnap = await getDoc(doc(db, 'visits', v.id));
            if (oldSnap.exists()) oldVisit = { id: oldSnap.id, ...oldSnap.data() };
          } catch (e) {
            console.warn('旧visits取得失敗:', e);
          }
        }

        let customerId = v.customerId;
        if (!customerId) {
          const existing = this.customersTemp.find(c => c.name === v.customerName.trim());
          if (existing) {
            customerId = existing.id;
          } else {
            const newRef = doc(collection(db, 'customers_temp'));
            customerId = newRef.id;
            const newCustomerData = {
              name: v.customerName.trim(),
              source: 'visit-auto',
              visitCount: 1
            };
            await setDoc(newRef, {
              ...newCustomerData,
              createdAt: serverTimestamp()
            });
            // 🆕 v0.6.4: メモリ + localStorageキャッシュも更新
            this.upsertCustomerLocal({ id: customerId, ...newCustomerData });
          }
        }

        const ref = v.id
          ? doc(db, 'visits', v.id)
          : doc(collection(db, 'visits'));

        const data = {
          date: v.date,
          customerName: v.customerName.trim(),
          customerId: customerId,
          menu: v.menu.trim(),
          amount: v.amount || 0,
          staff: v.staff,
          paymentMethod: v.paymentMethod,
          cashbookCategory: cat,
          note: v.note || '',
          retailAmount: Number(v.retailAmount) || 0,
          retailMemo: (v.retailMemo || '').trim(),
          updatedAt: serverTimestamp()
        };
        if (!v.id) data.createdAt = serverTimestamp();

        await setDoc(ref, data, { merge: true });

        // 🆕 v0.8.1: 回数券自動連携
        let warning = '';
        try {
          // ① 編集時: 旧連携をロールバック
          if (oldVisit) {
            await this.rollbackTicketLink(oldVisit);
          }
          // ② 新連携を適用(保存後のデータで)
          const savedVisit = { id: ref.id, ...data };
          const result = await this.applyTicketLink(savedVisit, ref.id);
          if (result.warning) warning = result.warning;
        } catch (e) {
          console.error('回数券連携エラー:', e);
          warning = '回数券連携でエラー: ' + e.message;
        }

        this.visitMessage = (v.id ? '更新しました' : '保存しました') + (warning ? ' / ' + warning : '');
        this.visitMessageType = warning ? 'err' : 'ok';
        this.resetVisitForm();
        setTimeout(() => this.visitMessage = '', warning ? 6000 : 2500);
      } catch (e) {
        console.error(e);
        this.visitMessage = 'エラー: ' + e.message;
        this.visitMessageType = 'err';
      } finally {
        this.saving = false;
      }
    },

    // ============================================
    // ===== 🆕 v0.6: 顧客CSV取込 =====
    // ============================================

    onCustomerCsvSelected(event) {
      const f = event.target.files && event.target.files[0];
      this.customerCsvFile = f || null;
      this.customerCsvRows = [];
      this.customerCsvError = '';
      this.customerCsvProgress = '';
    },

    resetCustomerCsv() {
      this.customerCsvFile = null;
      this.customerCsvRows = [];
      this.customerCsvError = '';
      this.customerCsvProgress = '';
      // ファイル選択UIもクリア
      const inputs = document.querySelectorAll('input[type="file"][accept*="csv"]');
      inputs.forEach(i => { i.value = ''; });
    },

    async parseCustomerCsv() {
      if (!this.customerCsvFile) return;
      this.customerCsvError = '';
      this.customerCsvRows = [];
      this.customerCsvProgress = '読み込み中...';

      try {
        const buf = await this.customerCsvFile.arrayBuffer();
        let text = '';

        if (this.customerCsvEncoding === 'utf-8') {
          text = new TextDecoder('utf-8').decode(buf);
        } else if (this.customerCsvEncoding === 'shift-jis') {
          text = new TextDecoder('shift-jis').decode(buf);
        } else {
          // auto: まずShift-JISで試して、文字化けが多そうならUTF-8
          const sjis = new TextDecoder('shift-jis', { fatal: false }).decode(buf);
          const utf8 = new TextDecoder('utf-8', { fatal: false }).decode(buf);
          // \uFFFD(置換文字)が少ない方を採用
          const sjisBad = (sjis.match(/\uFFFD/g) || []).length;
          const utf8Bad = (utf8.match(/\uFFFD/g) || []).length;
          text = sjisBad <= utf8Bad ? sjis : utf8;
        }

        // BOM除去
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

        const rows = this.parseCsvText(text);
        if (rows.length < 2) {
          this.customerCsvError = 'データ行が見つかりません(ヘッダー+1行以上が必要)';
          this.customerCsvProgress = '';
          return;
        }

        const header = rows[0].map(h => (h || '').trim());
        const colIndex = (names) => {
          for (const n of names) {
            const idx = header.findIndex(h => h === n || h.includes(n));
            if (idx >= 0) return idx;
          }
          return -1;
        };

        // 列マッピング(囲い込み職人想定)
        const map = {
          customerNo: colIndex(['顧客No', '顧客番号', 'No']),
          name:       colIndex(['顧客名', '氏名', '名前']),
          furigana:   colIndex(['ふりがな', 'フリガナ', 'カナ']),
          gender:     colIndex(['性別']),
          postalCode: colIndex(['郵便番号', '〒']),
          address1:   colIndex(['住所１', '住所1', '住所']),
          address2:   colIndex(['住所２', '住所2']),
          phone1:     colIndex(['電話-1', '電話1', '電話']),
          phone2:     colIndex(['電話-2', '電話2', '携帯']),
          email:      colIndex(['メールアドレス', 'メール', 'Email', 'E-mail']),
          birthDate:  colIndex(['生年月日', '誕生日']),
          age:        colIndex(['年齢']),
          ageGroup:   colIndex(['年代']),
          occupation: colIndex(['職業']),
          motive:     colIndex(['動機', 'きっかけ']),
          lastVisitDate: colIndex(['最終来店日', '最終来院日']),
          totalVisitCount: colIndex(['来店回数', '来院回数', '総来店数'])
        };

        if (map.name < 0) {
          this.customerCsvError = '「顧客名」列が見つかりません。CSVのヘッダー行を確認してください';
          this.customerCsvProgress = '';
          return;
        }

        // 既存customers_temp 名前→候補配列マップ(同姓同名対応)
        const existingByName = {};
        for (const c of this.customersTemp) {
          if (c.name) {
            const key = c.name.trim();
            if (!existingByName[key]) existingByName[key] = [];
            existingByName[key].push(c);
          }
        }

        // 電話番号正規化(ハイフン・全角・空白除去)
        const normPhone = (p) => (p || '').replace(/[\s\-－—ー]/g, '').replace(/[０-９]/g, ch =>
          String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
        );

        const out = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || r.length === 0 || r.every(c => !c)) continue;
          const get = (key) => map[key] >= 0 ? (r[map[key]] || '').trim() : '';

          const name = get('name');
          if (!name) continue;  // 名前なし行はスキップ

          const phone1 = get('phone1');
          const phone2 = get('phone2');
          const birthDate = this.normalizeDate(get('birthDate'));

          // 同名候補を取得
          const candidates = existingByName[name] || [];
          const phoneN = normPhone(phone1);
          const phone2N = normPhone(phone2);

          // 候補ごとに識別情報の一致度を判定
          const scoredCandidates = candidates.map(c => {
            const cPhone1 = normPhone(c.phone1);
            const cPhone2 = normPhone(c.phone2);
            const cBirth = c.birthDate || '';
            // 一致判定
            const phoneMatch = phoneN && (phoneN === cPhone1 || phoneN === cPhone2)
                            || phone2N && (phone2N === cPhone1 || phone2N === cPhone2);
            const birthMatch = birthDate && cBirth && birthDate === cBirth;
            return { candidate: c, phoneMatch, birthMatch };
          });

          // 自動マージ可否判定(極力ミスを避ける厳しめ条件)
          // ・候補ゼロ → 新規
          // ・候補1人 かつ 電話or生年月日が一致 → 自動merge(安全)
          // ・候補1人 かつ 識別情報なし(既存temp自動生成) → 要手動確認
          // ・候補1人 かつ 識別情報あるが不一致 → 別人の可能性大、要手動確認
          // ・候補2人以上 → 必ず要手動確認
          let action = 'new';
          let matchedId = null;
          let matchedName = '';
          let matchWarning = '';
          let safeAutoMerge = false;

          if (candidates.length === 0) {
            action = 'new';
          } else if (candidates.length === 1) {
            const sc = scoredCandidates[0];
            const c = sc.candidate;
            const cHasIdInfo = normPhone(c.phone1) || normPhone(c.phone2) || c.birthDate;

            if (sc.phoneMatch || sc.birthMatch) {
              // 識別情報一致 → 安全に自動merge
              action = 'merge:' + c.id;
              matchedId = c.id;
              matchedName = c.name;
              safeAutoMerge = true;
            } else if (!cHasIdInfo) {
              // 既存に識別情報なし(自動生成temp) → 同名1人なので比較的安全だが念のため警告
              action = 'new';  // ⚠️ デフォルト新規(安全側)
              matchedId = c.id;
              matchedName = c.name;
              matchWarning = '同名1人(既存に識別情報なし) — 要確認';
            } else {
              // 識別情報あるが不一致 → 別人の可能性
              action = 'new';
              matchedId = c.id;
              matchedName = c.name;
              matchWarning = '同名だが電話/生年月日が不一致 — 別人の可能性';
            }
          } else {
            // 同姓同名2人以上 → 絶対に自動マージしない
            action = 'new';
            matchWarning = `⚠️ 同名${candidates.length}人 — 必ず手動確認`;
          }

          out.push({
            _idx: out.length,  // 元配列順インデックス(フィルタ表示でも保持)
            customerNo: get('customerNo'),
            name: name,
            furigana: this.toHiragana(get('furigana')),
            gender: get('gender'),
            postalCode: get('postalCode'),
            address1: get('address1'),
            address2: get('address2'),
            phone1: phone1,
            phone2: phone2,
            email: get('email'),
            birthDate: birthDate,
            age: this.toNumber(get('age')),
            ageGroup: get('ageGroup'),
            occupation: get('occupation'),
            motive: get('motive'),
            lastVisitDate: this.normalizeDate(get('lastVisitDate')),
            totalVisitCount: this.toNumber(get('totalVisitCount')),
            // プレビュー用
            matchedExisting: candidates.length > 0,
            matchedId: matchedId,
            matchedName: matchedName,
            matchWarning: matchWarning,
            safeAutoMerge: safeAutoMerge,
            // 同名候補リスト(手動選択用)
            candidateList: candidates.map(c => ({
              id: c.id,
              name: c.name,
              phone1: c.phone1 || '',
              phone2: c.phone2 || '',
              birthDate: c.birthDate || '',
              address1: c.address1 || ''
            })),
            action: action
          });
        }

        this.customerCsvRows = out;
        this.customerCsvProgress = `${out.length}件読み込み完了`;
      } catch (err) {
        console.error(err);
        this.customerCsvError = '読み込みエラー: ' + err.message;
        this.customerCsvProgress = '';
      }
    },

    // 簡易CSVパーサ(ダブルクォート対応)
    parseCsvText(text) {
      const rows = [];
      let cur = [];
      let cell = '';
      let inQuote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuote) {
          if (ch === '"') {
            if (text[i + 1] === '"') { cell += '"'; i++; }
            else inQuote = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') inQuote = true;
          else if (ch === ',') { cur.push(cell); cell = ''; }
          else if (ch === '\r') { /* skip */ }
          else if (ch === '\n') { cur.push(cell); rows.push(cur); cur = []; cell = ''; }
          else cell += ch;
        }
      }
      if (cell.length > 0 || cur.length > 0) { cur.push(cell); rows.push(cur); }
      return rows;
    },

    // カタカナ→ひらがな(囲い込み職人がカタカナで出力する場合に対応)
    toHiragana(s) {
      if (!s) return '';
      return s.replace(/[\u30A1-\u30F6]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    },

    toNumber(s) {
      if (!s) return null;
      const n = parseInt(String(s).replace(/[^\d]/g, ''), 10);
      return isNaN(n) ? null : n;
    },

    // 日付正規化: "2024/3/5", "2024-3-5", "S50.4.1" 等 → "YYYY-MM-DD" or null
    normalizeDate(s) {
      if (!s) return null;
      s = s.trim();
      // YYYY-MM-DD or YYYY/MM/DD or YYYY.MM.DD
      let m = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
      if (m) {
        return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      }
      // 和暦は今回スキップ(必要なら拡張)
      return null;
    },

    setAllCustomerAction(action) {
      // 安全のため「全て新規」「全て補完」は廃止。「全てスキップ」のみ提供。
      // 各行の判断は手動で行う。
      if (action !== 'skip') return;
      for (const r of this.customerCsvRows) {
        r.action = 'skip';
      }
    },

    get filteredCustomerCsvRows() {
      if (this.customerCsvShowWarningsOnly) {
        return this.customerCsvRows.filter(r => r.matchWarning);
      }
      return this.customerCsvRows;
    },

    get customerCsvCounts() {
      const c = { new: 0, merge: 0, skip: 0, warnings: 0 };
      for (const r of this.customerCsvRows) {
        if (r.action === 'new') c.new++;
        else if (r.action && r.action.startsWith('merge')) c.merge++;
        else c.skip++;
        // 要確認警告(処理に関わらずカウント)
        if (r.matchWarning) c.warnings++;
      }
      return c;
    },

    async executeCustomerCsv() {
      if (this.customerCsvRows.length === 0) return;
      const counts = this.customerCsvCounts;
      const total = counts.new + counts.merge;
      if (total === 0) return;

      // 警告行が残っているかチェック
      const remainingWarnings = this.customerCsvRows.filter(r =>
        r.matchWarning && r.action !== 'skip'
      ).length;

      let warnMsg = '';
      if (remainingWarnings > 0) {
        warnMsg = `\n\n⚠️ 注意: ${remainingWarnings}件の要確認行がスキップ以外になっています。\nこれらは別人の可能性があります。本当に投入しますか?`;
      }

      if (!confirm(`新規追加 ${counts.new}件 / 既存補完 ${counts.merge}件 を投入します。${warnMsg}`)) return;

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.customerCsvImporting = true;
      let success = 0;
      let errors = 0;

      try {
        const target = this.customerCsvRows.filter(r => r.action !== 'skip');
        for (let i = 0; i < target.length; i++) {
          const r = target[i];
          this.customerCsvProgress = `投入中... ${i + 1} / ${target.length}`;

          try {
            const payload = this.buildCustomerPayload(r);
            let ref;
            // action は 'new' or 'merge:<id>' の形式
            if (r.action && r.action.startsWith('merge:')) {
              const targetId = r.action.substring(6);  // 'merge:'を除去
              if (!targetId) {
                throw new Error('merge先IDが不正');
              }
              ref = doc(db, 'customers_temp', targetId);
              payload.updatedAt = serverTimestamp();
            } else {
              ref = doc(collection(db, 'customers_temp'));
              payload.createdAt = serverTimestamp();
              payload.updatedAt = serverTimestamp();
              payload.source = 'csv-kakoikomi';
            }
            // mergeの場合は補完(空文字を上書きしないよう、空はpayloadから除外済み)
            await setDoc(ref, payload, { merge: true });
            success++;
          } catch (err) {
            console.error('行' + (i + 1) + 'エラー', err);
            errors++;
          }
        }

        this.customerCsvProgress = `完了: 成功 ${success}件 / エラー ${errors}件 / customers_temp再取得中...`;
        // 🆕 v0.6.4: 大量投入後はメモリの整合性を保つため強制再取得
        try {
          await this.refreshCustomersTemp();
          this.customerCsvProgress = `完了: 成功 ${success}件 / エラー ${errors}件 / customers_temp ${this.customersTemp.length}件`;
        } catch (e) {
          console.warn('customers_temp再取得エラー:', e);
          this.customerCsvProgress = `完了: 成功 ${success}件 / エラー ${errors}件 (キャッシュ未更新)`;
        }
        alert(`投入完了\n成功: ${success}件\nエラー: ${errors}件`);
        if (errors === 0) {
          // 成功時は2秒後にプレビューをクリア
          setTimeout(() => this.resetCustomerCsv(), 2000);
        }
      } catch (err) {
        console.error(err);
        alert('投入処理エラー: ' + err.message);
      } finally {
        this.customerCsvImporting = false;
      }
    },

    // CSV行 → Firestore保存形式
    // mergeでもnewでも同じビルダー(空フィールドは除外して上書き防止)
    buildCustomerPayload(r) {
      const p = { name: r.name };
      const setIf = (key, val) => {
        if (val !== null && val !== undefined && val !== '') p[key] = val;
      };
      setIf('customerNo', r.customerNo);
      setIf('furigana', r.furigana);
      setIf('gender', r.gender);
      setIf('postalCode', r.postalCode);
      setIf('address1', r.address1);
      setIf('address2', r.address2);
      setIf('phone1', r.phone1);
      setIf('phone2', r.phone2);
      setIf('email', r.email);
      setIf('birthDate', r.birthDate);
      setIf('age', r.age);
      setIf('ageGroup', r.ageGroup);
      setIf('occupation', r.occupation);
      setIf('motive', r.motive);
      setIf('lastVisitDate', r.lastVisitDate);
      setIf('totalVisitCount', r.totalVisitCount);
      p.importedFrom = 'kakoikomi';
      p.importedAt = window._fb.serverTimestamp();
      return p;
    },

    // ===== /v0.6 顧客CSV取込 =====

    // ===== 🆕 v0.6.2: テストデータ削除ツール =====
    // 三重安全装置: importedFrom + customerNo + name の AND条件で本番を絶対に消さない
    async findTestData() {

      const TEST_NOS = ['1001','1002','1003','1004','1005','1006','1007','1008','1009','1010'];
      const TEST_NAMES = ['青山太郎','飯田花子','上野次郎','榎本美咲','小田俊夫','加藤健太','木村花子','佐々木太一','鈴木愛子'];
      
      // customers_temp 全件から条件マッチを抽出
      const matched = this.customersTemp.filter(c => {
        // 条件①: importedFrom が 'kakoikomi' であること
        if (c.importedFrom !== 'kakoikomi') return false;
        // 条件②: customerNo が 1001〜1010(4桁文字列)であること
        if (!TEST_NOS.includes(c.customerNo)) return false;
        // 条件③: name がテスト架空名のいずれかであること
        if (!TEST_NAMES.includes(c.name)) return false;

      this.testDataFound = matched;

    async deleteTestData() {
      // 入力検証
      if (this.testDeleteConfirm !== 'DELETE') {
        alert('「DELETE」と正確に入力してください');

      }
      if (!this.testDataFound || this.testDataFound?.length === 0) {
        alert('削除対象がありません');

      }
      
      // 最終確認(三段階目)
      const targets = this.testDataFound?.map(d => `${d.customerNo} ${d.name}`).join('\n');
      if (!confirm(`以下の ${this.testDataFound?.length} 件を本当に削除しますか?\n\n${targets}\n\nこの操作は取り消せません。`)) {
        return;
      }
      
      this.testDataDeleting = true;
      const { db, doc, deleteDoc } = window._fb;
      let success = 0, errors = 0;
      
      try {
        for (const c of this.testDataFound) {
          try {
            // 削除前の二重チェック(再度3条件確認)
            if (c.importedFrom !== 'kakoikomi') {
              console.warn('⚠️ スキップ(importedFrom不一致):', c.id);
              errors++;

            }
            if (!['1001','1002','1003','1004','1005','1006','1007','1008','1009','1010'].includes(c.customerNo)) {
              console.warn('⚠️ スキップ(customerNo不一致):', c.id);
              errors++;
              continue;
            }
            if (!['青山太郎','飯田花子','上野次郎','榎本美咲','小田俊夫','加藤健太','木村花子','佐々木太一','鈴木愛子'].includes(c.name)) {
              console.warn('⚠️ スキップ(name不一致):', c.id);
              errors++;
              continue;
            }
            // 削除実行
            await deleteDoc(doc(db, 'customers_temp', c.id));

          } catch (e) {

        // 🆕 v0.6.4: 削除されたIDをメモリ + localStorageキャッシュからも除去
        for (const c of this.testDataFound) {

        alert(`削除完了\n成功: ${success} 件\nエラー: ${errors} 件`);
        // 状態リセット
        this.testDataFound = null;
        this.testDeleteConfirm = '';
      } finally {
        this.testDataDeleting = false;
      }
    },
    // ===== /v0.6.2 テストデータ削除 =====

    // ===== v0.3 物販機能 =====
    get activeProducts() {
      return this.products.filter(p => p.active !== false);
    },

    get filteredSales() {
      if (!this.salesFilterMonth) return this.sales;
      return this.sales.filter(s => (s.date || '').startsWith(this.salesFilterMonth));
    },

    get salesByProduct() {
      const map = {};
      for (const s of this.filteredSales) {
        const key = s.productName || '(商品名なし)';
        if (!map[key]) {
          map[key] = { productName: key, salesQty: 0, sampleQty: 0, totalAmount: 0 };
        }
        if (s.isSample) {
          map[key].sampleQty += Number(s.quantity) || 0;
        } else {
          map[key].salesQty += Number(s.quantity) || 0;
        }
        map[key].totalAmount += Number(s.amount) || 0;
      }
      return Object.values(map).sort((a, b) => b.totalAmount - a.totalAmount);
    },
    // 🆕 在庫: 月次台帳の集計（商品ごと・指定月）
      stockLedger(month) {
        const ym = month || this.stockMonth || this.currentMonthStr();
        const inMonth = (d) => (d || '').slice(0, 7) === ym;
        const beforeMonth = (d) => (d || '').slice(0, 7) < ym;
        // 直近の実棚アンカー（指定月以前で最新）を商品ごとに引く
        const anchorOf = (pid) => {
          const cs = this.stockCounts
            .filter(c => c.productId === pid && (c.yearMonth || '') <= ym)
            .sort((a, b) => (a.yearMonth || '').localeCompare(b.yearMonth || ''));
          return cs.length ? cs[cs.length - 1] : null;
        };
        return this.products.map(p => {
          const anchor = anchorOf(p.id);
          const anchorYm = anchor ? anchor.yearMonth : null;
          // 起点在庫: 実棚アンカーがあればその値、無ければ従来のinitialStock
          let base = anchor ? (anchor.qty || 0) : (p.initialStock || 0);
          // アンカー月(またはデータ最初)〜前月末までの増減を積む=当月の月初在庫
          const afterAnchor = (d) => {
            if (!d) return false;
            const dym = d.slice(0, 7);
            if (anchorYm) return dym > anchorYm && dym < ym;   // アンカー翌月〜前月
            return dym < ym;                                   // アンカー無しは前月末まで全部
          };
          const sum = (arr, key, filt) => arr.filter(filt).reduce((s, x) => s + (x[key] || 0), 0);
          const pBuyBefore = sum(this.purchases, 'quantity', x => x.productName === p.name && afterAnchor(x.date));
          const pAdjBefore = sum(this.stockAdjustments, 'qty', x => x.productId === p.id && afterAnchor(x.date));
          const pSellBefore = sum(this.sales, 'quantity', x => x.productName === p.name && afterAnchor(x.date));
          const opening = base + pBuyBefore + pAdjBefore - pSellBefore;
          // 当月分
          const buy = sum(this.purchases, 'quantity', x => x.productName === p.name && inMonth(x.date));
          const adj = sum(this.stockAdjustments, 'qty', x => x.productId === p.id && inMonth(x.date));
          const sell = sum(this.sales, 'quantity', x => x.productName === p.name && !x.isSample && inMonth(x.date));
          const sample = sum(this.sales, 'quantity', x => x.productName === p.name && x.isSample && inMonth(x.date));
          const closing = opening + buy + adj - sell - sample;
          return { id: p.id, name: p.name, opening, buy, sell, sample, adj, closing };
        }).filter(r => r.opening || r.buy || r.sell || r.sample || r.adj || r.closing);
      },
    // 🆕 在庫: 実棚アンカーの取得（指定月・商品）
      stockCountOf(pid) {
        const c = this.stockCounts.find(x => x.productId === pid && x.yearMonth === this.stockMonth);
        return c ? c.qty : '';
      },
      // 🆕 在庫: 実棚−理論月初の差異
      stockDiffOf(r) {
        const c = this.stockCounts.find(x => x.productId === r.id && x.yearMonth === this.stockMonth);
        if (!c) return null;
        return (c.qty || 0) - r.opening;
      },
      // 🆕 在庫: 実棚アンカーを保存（案C＝この月の月初を実棚で確定）
      async saveStockCount(pid, value) {
        const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
        if (value === '') return;
        const qty = Number(value) || 0;
        const existing = this.stockCounts.find(x => x.productId === pid && x.yearMonth === this.stockMonth);
        try {
          const ref = existing && existing.id
            ? doc(db, 'stock_counts', existing.id)
            : doc(collection(db, 'stock_counts'));
          await setDoc(ref, {
            productId: pid,
            yearMonth: this.stockMonth,
            qty: qty,
            note: '実棚',
            updatedAt: serverTimestamp()
          }, { merge: true });
        } catch (e) {
          console.error('stock_count保存エラー:', e);
          alert('実棚の保存に失敗しました: ' + e.message);
        }
      },

    get filteredSalesCustomers() {
      const q = (this.salesForm.customerName || '').trim();
      if (!q) return this.customersTemp.slice(0, 10);
      return this.customersTemp

              ...newCustomerData,

            this.upsertCustomerLocal({ id: customerId, ...newCustomerData });
          }
        }

        const ref = s.id
          ? doc(db, 'sales', s.id)
          : doc(collection(db, 'sales'));

        const data = {
          date: s.date,
          productId: s.productId || null,
          productName: s.productName,
          unitPrice: Number(s.unitPrice) || 0,
          quantity: Number(s.quantity) || 1,
          amount: s.isSample ? 0 : (Number(s.amount) || 0),
          paymentMethod: s.paymentMethod || '現金',
          customerId: customerId || null,
          customerName: (s.customerName || '').trim(),
          staff: s.staff || 'TAK',
          isSample: !!s.isSample,
          note: s.note || '',
          updatedAt: serverTimestamp()
        };
        if (!s.id) data.createdAt = serverTimestamp();

        await setDoc(ref, data, { merge: true });

        this.salesMessage = s.id ? '更新しました' : '保存しました';
        this.salesMessageType = 'ok';
        this.resetSalesForm();
        setTimeout(() => this.salesMessage = '', 2500);

    openSalesBulkImport() {

    },

    parseSalesBulk() {
      this.salesBulkError = '';
      this.salesBulkPreview = [];

      let parsed;
      try {
        parsed = JSON.parse(this.salesBulkText);
      } catch (e) {
        this.salesBulkError = 'JSON parseエラー: ' + e.message;
        return;
      }

      if (!Array.isArray(parsed)) {
        this.salesBulkError = 'JSONは配列である必要があります';
        return;
      }

      this.salesBulkPreview = parsed.map((item) => {
        const out = {
          date: item.date || '',
          productName: item.productName || '',
          quantity: Number(item.quantity) || 0,
          unitPrice: Number(item.unitPrice) || 0,
          amount: 0,
          paymentMethod: item.paymentMethod || '現金',
          customerName: item.customerName || '',
          staff: item.staff || 'TAK',
          isSample: !!item.isSample,
          note: item.note || '',
          productId: null,
          error: ''
        };

        if (!out.date) out.error = '日付なし';
        else if (!out.productName) out.error = '商品名なし';
        else if (out.quantity <= 0) out.error = '数量不正';

        if (!out.error) {
          const product = this.products.find(p => p.name === out.productName);
          if (!product) {
            out.error = `商品マスターに存在しない: ${out.productName}`;
          } else {
            out.productId = product.id;
            if (out.unitPrice === 0) out.unitPrice = Number(product.sellingPrice) || 0;
          }
        }

        if (out.isSample) {
          out.amount = 0;
        } else if (item.amount !== undefined && item.amount !== null) {
          out.amount = Number(item.amount) || 0;
        } else {
          out.amount = out.unitPrice * out.quantity;
        }

        return out;
      });
    },

    async executeSalesBulk() {
      if (this.salesBulkPreview.length === 0) return;
      if (this.salesBulkPreview.some(x => x.error)) {
        alert('エラーのある行があります。修正してから再実行してください');
        return;
      }
      if (!confirm(`${this.salesBulkPreview.length}件を投入します。よろしいですか?`)) return;

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      let success = 0;

      try {
        for (const item of this.salesBulkPreview) {
          const ref = doc(collection(db, 'sales'));
          await setDoc(ref, {
            date: item.date,
            productId: item.productId || null,
            productName: item.productName,
            unitPrice: item.unitPrice,
            quantity: item.quantity,
            amount: item.amount,
            paymentMethod: item.paymentMethod,
            customerId: null,
            customerName: item.customerName || '',
            staff: item.staff,
            isSample: item.isSample,
            note: item.note || '',
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          success++;
        }
        alert(`${success}件 投入完了!`);
        this.salesBulkModalOpen = false;
        this.salesBulkText = '';
        this.salesBulkPreview = [];
      } catch (e) {
        console.error(e);
        alert('一括投入エラー(' + success + '件成功後): ' + e.message);
      } finally {
        this.saving = false;
      }
    },

    async autoTransferSampleCost() {
      const month = this.expenseFilterMonth || this.currentMonthStr();
      if (!month) {
        alert('表示月を選択してください');
        return;
      }

      const monthSales = this.sales.filter(s =>
        s.isSample && (s.date || '').startsWith(month)
      );

      if (monthSales.length === 0) {
        alert(`${month} にサンプル提供記録がありません`);
        return;
      }

      const breakdown = {};
      let totalCost = 0;
      for (const s of monthSales) {
        const prod = this.products.find(p => p.id === s.productId || p.name === s.productName);
        const dealerPrice = prod ? (Number(prod.dealerPrice) || 0) : 0;
        const qty = Number(s.quantity) || 0;
        const cost = dealerPrice * qty;
        const key = s.productName || '(不明)';
        if (!breakdown[key]) breakdown[key] = { qty: 0, cost: 0 };
        breakdown[key].qty += qty;
        breakdown[key].cost += cost;
        totalCost += cost;
      }

      if (totalCost === 0) {
        alert('原価情報が登録されていない商品ばかりです。商品マスターで「代理店価格」を設定してください');
        return;
      }

      const noteParts = Object.entries(breakdown)
        .map(([name, v]) => `${name}×${v.qty}(¥${v.cost.toLocaleString()})`)
        .join(' / ');
      const noteText = `[自動]サンプル原価 ${noteParts}`;

      const existing = this.expenses.find(e => e.isAutoSample && e.sampleMonth === month);

      const msg = existing
        ? `${month} の自動転記レコードが既にあります(¥${(existing.amount||0).toLocaleString()})。\n¥${totalCost.toLocaleString()} で上書きしますか?`
        : `${month} のサンプル原価 ¥${totalCost.toLocaleString()} を販促費として転記しますか?\n\n${noteText}`;

      if (!confirm(msg)) return;

      const { db, collection, doc, setDoc, deleteDoc, serverTimestamp } = window._fb;
      this.saving = true;

      try {
        if (existing) {
          await deleteDoc(doc(db, 'expenses', existing.id));
        }

        const lastDay = this.lastDayOfMonth(month);

        const ref = doc(collection(db, 'expenses'));
        await setDoc(ref, {
          date: lastDay,
          category: '販促費',
          amount: totalCost,
          paymentMethod: 'その他',
          note: noteText,
          isAutoSample: true,
          sampleMonth: month,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        this.expenseMessage = `サンプル原価 ¥${totalCost.toLocaleString()} を転記しました`;
        this.expenseMessageType = 'ok';
        setTimeout(() => this.expenseMessage = '', 4000);
      } catch (err) {
        console.error(err);
        alert('転記エラー: ' + err.message);
      } finally {
        this.saving = false;
      }
    },

    lastDayOfMonth(yyyymm) {
      const [y, m] = yyyymm.split('-').map(Number);
      const last = new Date(y, m, 0).getDate();
      return `${y}-${String(m).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
    },

    async onCashbookMonthChange() {
      await this.loadCashbookCarry(this.cashbookMonth);

    async loadCashbookCarry(month) {
      if (!month) return;
      const { db, doc, getDoc, setDoc, serverTimestamp } = window._fb;
      try {
        const ref = doc(db, 'cashbook_carry', month);
        const snap = await getDoc(ref);

        if (snap.exists() && snap.data().isManual === true) {
          this.cashbookCarry = Number(snap.data().carryAmount) || 0;
          this.cashbookCarryIsManual = true;
          return;
        }

        const prev = this.prevMonth(month);
        const prevSnap = await getDoc(doc(db, 'cashbook_carry', prev));
        if (prevSnap.exists()) {
          const prevSummary = this.calcMonthCashSummary(prev);
          const carry = (Number(prevSnap.data().carryAmount) || 0)
                      + prevSummary.income - prevSummary.expense;

          const oldCarry = snap.exists() ? (Number(snap.data().carryAmount) || 0) : null;
          if (oldCarry !== carry) {
            await setDoc(ref, {
              yearMonth: month,
              carryAmount: carry,
              isManual: false,
              updatedAt: serverTimestamp(),
              ...(snap.exists() ? {} : { createdAt: serverTimestamp() })
            }, { merge: true });
          }
          this.cashbookCarry = carry;
          this.cashbookCarryIsManual = false;
        } else {
          this.cashbookCarry = 0;
          this.cashbookCarryIsManual = false;
        }
      } catch (err) {
        console.error(err);
        this.cashbookMessage = '繰越読込エラー: ' + err.message;
        this.cashbookMessageType = 'err';
      }
    },

      if (!this.cashbookMonth) return;
      const { db, doc, setDoc, serverTimestamp } = window._fb;
      try {
        const value = Number(this.cashbookCarryEditValue) || 0;
        await setDoc(doc(db, 'cashbook_carry', this.cashbookMonth), {
          yearMonth: this.cashbookMonth,
          carryAmount: value,
          isManual: true,
          updatedAt: serverTimestamp()
        }, { merge: true });
        this.cashbookCarry = value;
        this.cashbookCarryIsManual = true;
        this.cashbookCarryEditing = false;
        this.cashbookMessage = '繰越を更新しました';
        this.cashbookMessageType = 'ok';
        setTimeout(() => this.cashbookMessage = '', 2500);
      } catch (err) {

  prevMonth(yyyymm) {
      const [y, m] = yyyymm.split('-').map(Number);
      const d = new Date(y, m - 2, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    },

    // 🆕 v0.9.4-fix: 「現金扱い」の支払方法を判定(リクルート対応)
    // 現金 / リクルート → 現金出納帳に記録、伝票No付与対象
    isCashLikePayment(pm) {
      return pm === '現金' || pm === 'リクルート';
    },

    // 🆕 v0.9.0-a1: 翌月を 'YYYY-MM' 形式で返す(月次払い込み生成のデフォルト値)
    getDefaultPaymentTargetMonth() {
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      const y = next.getFullYear();
      const m = String(next.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    },

    calcMonthCashSummary(month) {
      let income = 0, expense = 0;
      for (const v of this.visits) {
        // 売上(来院)は「現金」のみ。「リクルート」は支払方法として現実的にあり得ないので除外
        if ((v.date || '').startsWith(month) && v.paymentMethod === '現金') {
          income += Number(v.amount) || 0;
        }
      }
      for (const s of this.sales) {
        // 物販売上も同じく「現金」のみ
        if ((s.date || '').startsWith(month) && s.paymentMethod === '現金' && !s.isSample) {
          income += Number(s.amount) || 0;
        }
      }
      for (const e of this.expenses) {
        // 経費は「現金」「リクルート」の両方を現金扱いに含める(v0.9.4-fix)
        if ((e.date || '').startsWith(month) && this.isCashLikePayment(e.paymentMethod)) {
          expense += Number(e.amount) || 0;
        }
      }
      for (const a of this.ads) {
        // 広告費も同様に「現金」「リクルート」を現金扱いに含める(v0.9.4-fix)
        if ((a.date || '').startsWith(month) && this.isCashLikePayment(a.paymentMethod)) {
          expense += Number(a.amount) || 0;
        }
      }
      // 🆕 v0.5: 銀行預け入れも貸方として加算
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(month)) {
          expense += Number(d.amount) || 0;
        }
      }
      return { income, expense };
    },

    get cashbookEntries() {
      const m = this.cashbookMonth;
      if (!m) return [];
      const list = [];

      for (const v of this.visits) {
        if ((v.date || '').startsWith(m) && v.paymentMethod === '現金') {
          list.push({
            date: v.date,
            type: '来院',
            desc: `${v.customerName}(${v.menu || '-'})`,
            income: Number(v.amount) || 0,
            expense: 0
          });
        }
      }
      for (const s of this.sales) {
        if ((s.date || '').startsWith(m) && s.paymentMethod === '現金' && !s.isSample) {
          list.push({
            date: s.date,
            type: '物販',
            desc: `${s.productName} × ${s.quantity}`,
            income: Number(s.amount) || 0,
            expense: 0
          });
        }
      }
      for (const e of this.expenses) {
        // 「現金」「リクルート」の両方を現金扱いとして出納帳に表示(v0.9.4-fix)
        if ((e.date || '').startsWith(m) && this.isCashLikePayment(e.paymentMethod)) {
          const pmTag = e.paymentMethod === 'リクルート' ? ' [リクルート]' : '';
          list.push({
            date: e.date,
            type: '経費',
            desc: `${e.category}${pmTag}${e.note ? ' / ' + e.note : ''}`,
            income: 0,
            expense: Number(e.amount) || 0
          });
        }
      }
      for (const a of this.ads) {
        // 「現金」「リクルート」の両方を現金扱いとして出納帳に表示(v0.9.4-fix)
        if ((a.date || '').startsWith(m) && this.isCashLikePayment(a.paymentMethod)) {
          const pmTag = a.paymentMethod === 'リクルート' ? ' [リクルート]' : '';
          list.push({
            date: a.date,
            type: '広告費',
            desc: `${a.category}${pmTag}${a.note ? ' / ' + a.note : ''}`,
            income: 0,
            expense: Number(a.amount) || 0
          });
        }
      }
      // 🆕 v0.5: 銀行預け入れ
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(m)) {
          list.push({
            date: d.date,
            type: '預入',
            desc: `現金入金${d.bankName ? '(' + d.bankName + ')' : ''}${d.note ? ' / ' + d.note : ''}`,
            income: 0,
            expense: Number(d.amount) || 0
          });
        }
      }

      list.sort((x, y) => (x.date < y.date ? -1 : x.date > y.date ? 1 : 0));
      let bal = Number(this.cashbookCarry) || 0;
      for (const item of list) {
        bal = bal + item.income - item.expense;
        item.balance = bal;
      }
      return list;
    },

    get cashbookSummary() {
      const m = this.cashbookMonth;
      const sum = this.calcMonthCashSummary(m);
      return {
        income: sum.income,
        expense: sum.expense,
        endBalance: (Number(this.cashbookCarry) || 0) + sum.income - sum.expense
      };
    },

    get cashbookByCategory() {
      const m = this.cashbookMonth;
      const incomeMap = { '来院売上(現金)': 0, '物販売上(現金)': 0 };
      const expenseMap = {};

      for (const v of this.visits) {
        if ((v.date || '').startsWith(m) && v.paymentMethod === '現金') {
          incomeMap['来院売上(現金)'] += Number(v.amount) || 0;
        }
      }
      for (const s of this.sales) {
        if ((s.date || '').startsWith(m) && s.paymentMethod === '現金' && !s.isSample) {
          incomeMap['物販売上(現金)'] += Number(s.amount) || 0;
        }
      }
     for (const e of this.expenses) {
        // 「現金」「リクルート」の両方を現金扱いとしてカテゴリ集計に含める(v0.9.4-fix)
        if ((e.date || '').startsWith(m) && this.isCashLikePayment(e.paymentMethod)) {
          const k = e.category || '(未分類)';
          expenseMap[k] = (expenseMap[k] || 0) + (Number(e.amount) || 0);
        }
      }
      for (const a of this.ads) {
        // 「現金」「リクルート」の両方を現金扱いとしてカテゴリ集計に含める(v0.9.4-fix)
        if ((a.date || '').startsWith(m) && this.isCashLikePayment(a.paymentMethod)) {
          const k = `広告費 / ${a.category}`;
          expenseMap[k] = (expenseMap[k] || 0) + (Number(a.amount) || 0);
        }
      }
      // 🆕 v0.5: 銀行預け入れ
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(m)) {
          const k = `現金入金${d.bankName ? '(' + d.bankName + ')' : ''}`;
          expenseMap[k] = (expenseMap[k] || 0) + (Number(d.amount) || 0);
        }
      }

      const incomeRows = Object.entries(incomeMap)
        .filter(([_, v]) => v > 0)
        .map(([name, amount]) => ({ name, amount }));
      const expenseRows = Object.entries(expenseMap)
        .map(([name, amount]) => ({ name, amount }))
        .sort((a, b) => b.amount - a.amount);

      return { incomeRows, expenseRows };
    },

    // ============================================
    // ===== 🆕 v0.7: 仕入記録機能(基本) =====
    // ============================================

    // ============================================
    // ===== 🆕 v0.8: 回数券ヘルパー関数 =====
    // ============================================

    emptyTicket() {
      return {
        id: null,
        customerName: '',
        ticketType: '',
        applicableMenu: 'seitai',
        purchaseDate: this.todayStr(),
        totalCount: 0,
        usedCount: 0,
        remainingCount: 0,
        unitPrice: 0,
        remainingValue: 0,
        purchasePrice: 0,
        expiryDate: '',
        lastUsedDate: null,
        status: 'active',
        isLegacy: false,
        linkedVisitId: null,
        note: ''
      };
    },

    resetTicketForm() {
      this.ticketForm = this.emptyTicket();
      this.ticketMessage = '';
    },

    // 購入日からNヶ月後の期限を計算 → 'YYYY-MM-DD'
    calcExpiryDate(purchaseDate, months) {
      if (!purchaseDate) return '';
      const d = new Date(purchaseDate);
      if (isNaN(d.getTime())) return '';
      d.setMonth(d.getMonth() + (Number(months) || 12));
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    },

    // ハイブリッド延長: max(現在期限, 利用日+Nヶ月)
    extendExpiryDate(currentExpiry, usedDate, months) {
      const proposed = this.calcExpiryDate(usedDate, months);
      if (!currentExpiry) return proposed;
      if (!proposed) return currentExpiry;
      return proposed > currentExpiry ? proposed : currentExpiry;
    },

    // 期限までの残日数(過ぎていればマイナス)
    getDaysUntilExpiry(expiryDate) {
      if (!expiryDate) return null;
      const expiry = new Date(expiryDate);
      const today = new Date(this.todayStr());
      if (isNaN(expiry.getTime())) return null;
      const diffMs = expiry.getTime() - today.getTime();
      return Math.floor(diffMs / (1000 * 60 * 60 * 24));
    },

    // チケットのステータスを判定
    // active = 残あり&期限内 / used_up = 残0 / expired = 期限切れ
    getTicketStatus(ticket) {
      if (!ticket) return 'active';
      const remaining = Number(ticket.remainingCount) || 0;
      if (remaining <= 0) return 'used_up';
      const days = this.getDaysUntilExpiry(ticket.expiryDate);
      if (days !== null && days < 0) return 'expired';
      return 'active';
    },

    // メニュー名 → 適用区分('seitai' / 'maintenance' / null)
    getMenuCategory(menuName) {
      if (!menuName) return null;
      if (menuName.includes('整体') || menuName.includes('インディバ')) return 'seitai';
      if (menuName.includes('メンテナンス')) return 'maintenance';
      return null;
    },

    // 券種名 → TICKET_TYPES のキー
    detectTicketTypeFromMenu(menuName) {
      if (!menuName) return null;
      if (menuName.includes('回数券購入メンテナンス5回')) return 'メンテナンス5回券';
      if (menuName.includes('回数券購入整体10回')) return '整体10回券';
      if (menuName.includes('回数券購入整体20回')) return '整体20回券';
      if (menuName.includes('回数券購入整体30回')) return '整体30回券';
      return null;
    },

    // チケットの当該メニューでの使用可否判定
    isTicketUsableForMenu(ticket, menuCategory) {
      if (!ticket) return false;
      if (ticket.status && ticket.status !== 'active') return false;
      const am = ticket.applicableMenu;
      if (am === 'all') return true;
      if (am === menuCategory) return true;
      return false;
    },

   // 顧客のアクティブチケットを取得(古い購入日順)
    getActiveTicketsForCustomer(customerName) {
      if (!customerName) return [];
      return this.tickets
        .filter(t => t.customerName === customerName)
        .filter(t => this.getTicketStatus(t) === 'active')
        .sort((a, b) => (a.purchaseDate || '').localeCompare(b.purchaseDate || ''));
    },

    // 🆕 v0.9.3: 顧客の来院履歴(直近10件、新しい順)
    getCustomerVisitHistory(customerName) {
      if (!customerName) return [];
      const name = customerName.trim();
      if (!name) return [];
      return this.visits
        .filter(v => v.customerName === name)
        .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
        .slice(0, 10);
    },

    // 🆕 v0.9.3: 経過日数を「N日前」「1週間前」「3ヶ月前」形式で返す
    formatDaysAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const today = new Date(this.todayStr());
      if (isNaN(d.getTime())) return '';
      const diffDays = Math.floor((today.getTime() - d.getTime()) / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return '未来';
      if (diffDays === 0) return '本日';
      if (diffDays === 1) return '昨日';
      if (diffDays < 7) return diffDays + '日前';
      if (diffDays < 30) return Math.floor(diffDays / 7) + '週間前';
      if (diffDays < 365) return Math.floor(diffDays / 30) + 'ヶ月前';
      return Math.floor(diffDays / 365) + '年前';
    },
    
    // 🆕 v0.9.1: 編集中の券の利用履歴(visits由来)
    // 同じ顧客 × 同じ適用区分 の visits を購入日〜期限日の範囲で取得
    getEditingTicketHistory() {
      const t = this.ticketForm;
      if (!t || !t.id || !t.customerName) return [];
      const am = t.applicableMenu || 'seitai';
      const purchase = t.purchaseDate || '';
      const expiry = t.expiryDate || '';
      return this.visits
        .filter(v => {
          if (v.customerName !== t.customerName) return false;
          if (v.paymentMethod !== '回数券消化') return false;
          const vd = v.date || '';
          if (purchase && vd < purchase) return false;
          if (expiry && vd > expiry) return false;
          const vc = this.getMenuCategory(v.menu || '');
          if (am === 'all') return true;
          return vc === am;
        })
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    },
    // === チケット保存(手動) ===
    canSaveTicket() {

          && Number(t.totalCount) > 0 && t.expiryDate;
