<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整体院TAK 経営管理 v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
<!-- v0.5: SheetJS + JSZip -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
  .tab-active { background:#0f766e; color:white; }
  .tab-inactive { background:#f1f5f9; color:#334155; }
  .tab-inactive:hover { background:#e2e8f0; }
  /* オートコンプリート候補リスト */
  .suggest-list {
    max-height: 200px;
    overflow-y: auto;
  }
</style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="app()" x-init="init()" x-cloak>

<!-- ===== ロック画面 ===== -->
<template x-if="!unlocked">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="text-2xl font-bold text-slate-800">整体院TAK</div>
        <div class="text-sm text-slate-500 mt-1">経営管理 v2</div>
      </div>
      <input type="password" x-model="passcodeInput" @keyup.enter="tryUnlock()"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg text-center text-2xl tracking-widest"
        placeholder="パスコード" maxlength="4">
      <button @click="tryUnlock()"
        class="w-full mt-4 bg-teal-700 hover:bg-teal-800 text-white font-medium py-3 rounded-lg">
        入る
      </button>
      <div x-show="lockError" class="text-red-500 text-sm text-center mt-3" x-text="lockError"></div>
    </div>
  </div>
</template>

<!-- ===== メイン画面 ===== -->
<template x-if="unlocked">
<div>

<!-- ヘッダー -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <span class="font-bold text-slate-800">整体院TAK</span>
      <span class="text-slate-400 mx-2">/</span>
      <span class="text-sm text-slate-600">経営管理 v2</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs px-2 py-1 rounded"
            :class="cloudStatus==='接続中' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
            x-text="'☁ ' + cloudStatus"></span>
      <button @click="lock()" class="text-sm text-slate-500 hover:text-slate-800">ロック</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="max-w-6xl mx-auto px-4 pb-2">
    <div class="flex gap-1 overflow-x-auto">
      <template x-for="t in tabs" :key="t.id">
        <button @click="currentTab = t.id"
          :class="currentTab === t.id ? 'tab-active' : 'tab-inactive'"
          class="px-4 py-2 rounded-t-lg text-sm font-medium whitespace-nowrap relative">
          <span x-text="t.label"></span>
          <!-- 🆕 v0.5: 月末出力タブの未出力バッジ -->
          <span x-show="t.id === 'export' && pendingExports.length > 0"
                class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"
                x-text="pendingExports.length"></span>
        </button>
      </template>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto p-4">

  <!-- ====== ダッシュボード ====== -->
  <section x-show="currentTab==='dashboard'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-2">ダッシュボード</h2>
      <p class="text-sm text-slate-500">準備中</p>
      <p class="text-sm text-slate-500 mt-1">来院・物販・経費の合計サマリと、未完了アラートを表示予定</p>
    </div>
  </section>

  <!-- ====== 来院記録 ====== -->
  <section x-show="currentTab==='visits'" class="space-y-4">

    <!-- 入力フォーム -->
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-slate-800">来院記録</h2>
        <div class="text-xs text-slate-400" x-text="'本日: ' + todayStr()"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
        <!-- 日付 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">日付 *</label>
          <input type="date" x-model="visitForm.date"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 顧客名(オートコンプリート) -->
        <div class="md:col-span-3 relative">
          <label class="block text-xs text-slate-600 mb-1">顧客名 *</label>
          <input type="text" x-model="visitForm.customerName"
            @input="onCustomerInput()"
            @focus="showSuggest = true"
            @blur="setTimeout(() => showSuggest = false, 200)"
            placeholder="顧客名を入力"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" autocomplete="off">
          <!-- サジェスト -->
          <div x-show="showSuggest && filteredCustomers.length > 0"
               class="suggest-list absolute z-20 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-lg">
            <template x-for="c in filteredCustomers" :key="c.id">
              <button @mousedown.prevent="selectCustomer(c)"
                class="block w-full text-left px-3 py-2 hover:bg-teal-50 text-sm">
                <span x-text="c.name"></span>
                <span x-show="c.visitCount" class="text-xs text-slate-400 ml-2"
                      x-text="'(' + c.visitCount + '回)'"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- メニュー(自由入力) -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">メニュー *</label>
          <input type="text" x-model="visitForm.menu"
            placeholder="例: 整体60分 / 回数券消化"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 金額 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">金額(円)</label>
          <input type="number" x-model.number="visitForm.amount" placeholder="0"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>

        <!-- 担当者 -->
        <div class="md:col-span-2">
          <label class="block text-xs text-slate-600 mb-1">担当者 *</label>
          <select x-model="visitForm.staff"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="s in staffList" :key="s">
              <option :value="s" x-text="s"></option>
            </template>
          </select>
        </div>

        <!-- 支払方法 -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">支払方法 *</label>
          <select x-model="visitForm.paymentMethod"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
            <template x-for="p in paymentMethods" :key="p">
              <option :value="p" x-text="p"></option>
            </template>
          </select>
        </div>

        <!-- 自動判定: cashbookCategory -->
        <div class="md:col-span-3">
          <label class="block text-xs text-slate-600 mb-1">区分(自動判定)</label>
          <div class="px-3 py-2 bg-slate-100 rounded-lg text-sm text-slate-700"
               x-text="autoCategory()"></div>
        </div>

        <!-- 備考 -->
        <div class="md:col-span-6">
          <label class="block text-xs text-slate-600 mb-1">備考</label>
          <input type="text" x-model="visitForm.note" placeholder="任意"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
        </div>
      </div>

      <!-- 保存ボタン -->
      <div class="flex justify-end gap-2 mt-4">
        <button @click="resetVisitForm()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">クリア</button>
        <button @click="saveVisit()" :disabled="!canSaveVisit() || saving"
          class="px-5 py-2 bg-teal-700 hover:bg-teal-800 disabled:bg-slate-300 text-white text-sm font-medium rounded-lg">
          <span x-show="!saving" x-text="visitForm.id ? '更新' : '保存'"></span>
          <span x-show="saving">保存中...</span>
        </button>
      </div>

      <div x-show="visitMessage" class="mt-3 text-sm"
           :class="visitMessageType==='ok' ? 'text-emerald-600' : 'text-red-500'"
           x-text="visitMessage"></div>
    </div>

    <!-- 月別フィルタ -->
    <div class="bg-white rounded-xl shadow p-4 flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-600">表示月:</label>
        <input type="month" x-model="visitFilterMonth"
               class="px-3 py-1 border border-slate-300 rounded-lg text-sm">
        <button @click="visitFilterMonth = currentMonthStr()" class="text-xs text-teal-700 hover:underline">今月</button>
      </div>
      <div class="text-sm text-slate-600">
        <span x-text="filteredVisits.length"></span>件 / 合計
        <span class="font-bold text-slate-800" x-text="'¥' + visitTotalAmount().toLocaleString()"></span>
      </div>
    </div>

    <!-- 一覧 -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div x-show="filteredVisits.length === 0" class="p-8 text-center text-slate-400 text-sm">
        この月の来院記録はまだありません
      </div>
      <div x-show="filteredVisits.length > 0" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">日付</th>
              <th class="px-3 py-2 text-left">顧客名</th>
              <th class="px-3 py-2 text-left">メニュー</th>
              <th class="px-3 py-2 text-right">金額</th>
              <th class="px-3 py-2 text-left">担当</th>
              <th class="px-3 py-2 text-left">支払</th>
              <th class="px-3 py-2 text-left">区分</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="v in filteredVisits" :key="v.id">
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-3 py-2 whitespace-nowrap" x-text="v.date"></td>
                <td class="px-3 py-2" x-text="v.customerName"></td>
                <td class="px-3 py-2" x-text="v.menu"></td>
                <td class="px-3 py-2 text-right" x-text="'¥' + (v.amount||0).toLocaleString()"></td>
                <td class="px-3 py-2" x-text="v.staff"></td>
                <td class="px-3 py-2" x-text="v.paymentMethod"></td>
                <td class="px-3 py-2">
                  <span class="text-xs px-2 py-0.5 rounded"
                        :class="categoryColor(v.cashbookCategory)"
                        x-text="v.cashbookCategory"></span>
                </td>
                <td class="px-3 py-2 text-right whitespace-nowrap">
                  <button @click="editVisit(v)" class="text-xs text-teal-700 hover:underline">編集</button>
                  <button @click="deleteVisit(v)" class="text-xs text-red-500 hover:underline ml-2">削除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

  </section>

  <!-- ====== 商品マスター ====== -->
  <section x-show="currentTab==='products'" class="space-y-4">
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-lg font-bold text-slate-800">商品マスター</h2>
          <p class="text-xs text-slate-500 mt-1">物販で扱う商品の登録・編集</p>
        </div>
        <button @click="openProductModal()"
          class="px-4 py-2 bg-teal-700 hover:bg-teal-800 text-white text-sm rounded-lg">
          ＋新規追加
        </button>
      </div>

      <div x-show="products.length === 0" class="p-8 text-center text-slate-400 text-sm">
        まだ商品が登録されていません<br>
        <span class="text-xs">右上「新規追加」から登録してください</span>
      </div>

      <div x-show="products.length > 0" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-3 py-2 text-left">商品名</th>
              <th class="px-3 py-2 text-right">代理店価格</th>
              <th class="px-3 py-2 text-right">販売価格</th>
              <th class="px-3 py-2 text-center">税</th>
              <th class="px-3 py-2 text-right">月初在庫</th>
              <th class="px-3 py-2 text-center">状態</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in products" :key="p.id">
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-3 py-2" x-text="p.name"></td>
                <td class="px-3 py-2 text-right" x-text="p.dealerPrice ? '¥' + p.dealerPrice.toLocaleString() : '-'"></td>
                <td class="px-3 py-2 text-right" x-text="'¥' + (p.sellingPrice||0).toLocaleString()"></td>
                <td class="px-3 py-2 text-center" x-text="p.taxCategory || '-'"></td>
                <td class="px-3 py-2 text-right" x-text="p.initialStock||0"></td>
                <td class="px-3 py-2 text-center">
                  <span class="text-xs px-2 py-0.5 rounded"
                        :class="p.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'"
                        x-text="p.active ? '稼働中' : '停止'"></span>
                </td>
                <td class="px-3 py-2 text-right whitespace-nowrap">
                  <button @click="editProduct(p)" class="text-xs text-teal-700 hover:underline">編集</button>
                  <button @click="deleteProduct(p)" class="text-xs text-red-500 hover:underline ml-2">削除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <details class="bg-white rounded-xl shadow p-4 text-sm text-slate-500">
      <summary class="cursor-pointer">💡 開発用: テスト用に13品目を一括登録</summary>
      <button @click="seedProducts()" class="mt-3 px-4 py-2 bg-slate-700 text-white rounded-lg text-xs">
        一括登録実行
      </button>
    </details>

    <!-- 🆕 v0.6: 顧客CSV取込(一時ツール) -->
    <details class="bg-white rounded-xl shadow p-4 text-sm">
      <summary class="cursor-pointer text-slate-700 font-medium">📥 顧客CSV取込(囲い込み職人) — 一時ツール</summary>
      <div class="mt-4 space-y-3">

        <!-- 説明 -->
        <div class="bg-blue-50 border border-blue-200 rounded p-3 text-xs text-slate-700">
          <p class="font-bold mb-1">使い方:</p>
          <ol class="list-decimal pl-5 space-y-0.5">
            <li>囲い込み職人からエクスポートしたCSV(Shift-JIS)を選択</li>
            <li>「読み込み」→ プレビュー表示</li>
            <li>各行の処理(新規/補完/スキップ)を確認</li>
            <li>「投入実行」で一括登録</li>
          </ol>
          <p class="mt-2">想定列: 顧客No / 顧客名 / ふりがな / 性別 / 郵便番号 / 住所１ / 住所２ / 電話-1 / 電話-2 / メールアドレス / 生年月日 / 年齢 / 年代 / 職業 / 動機 / 最終来店日 / 来店回数</p>
        </div>

        <!-- ファイル選択 -->
        <div class="flex items-center gap-3 flex-wrap">
          <input type="file" accept=".csv,text/csv"
                 @change="onCustomerCsvSelected($event)"
                 class="text-sm">
          <select x-model="customerCsvEncoding"
                  class="px-2 py-1 border border-slate-300 rounded text-xs">
            <option value="auto">エンコーディング自動判定</option>
            <option value="shift-jis">Shift-JIS</option>
            <option value="utf-8">UTF-8</option>
          </select>
          <button @click="parseCustomerCsv()" :disabled="!customerCsvFile"
                  class="px-3 py-1 bg-slate-700 hover:bg-slate-800 disabled:bg-slate-300 text-white text-xs rounded">
            読み込み
          </button>
          <span class="text-xs text-slate-500" x-show="customerCsvFile" x-text="customerCsvFile && customerCsvFile.name"></span>
        </div>

        <!-- エラー表示 -->
        <div x-show="customerCsvError"
             class="bg-red-50 border border-red-200 text-red-700 rounded p-2 text-xs"
             x-text="customerCsvError"></div>

        <!-- プレビュー -->
        <div x-show="customerCsvRows.length > 0" class="space-y-2">

          <!-- ⚠️ 要確認サマリ -->
          <div x-show="customerCsvCounts.warnings > 0"
               class="bg-amber-50 border-l-4 border-amber-500 p-3 rounded text-sm">
            <p class="font-bold text-amber-900">⚠️ 手動確認が必要な行が <span x-text="customerCsvCounts.warnings"></span>件あります</p>
            <p class="text-xs text-amber-800 mt-1">
              同姓同名や識別情報不一致のため、安全のため自動でmergeしていません。<br>
              下のフィルタで「要確認のみ」を表示して、1件ずつ判断してください。
            </p>
          </div>

          <div class="flex items-center justify-between flex-wrap gap-2">
            <div class="text-sm">
              <span class="font-bold" x-text="customerCsvRows.length"></span>件 /
              新規 <span class="text-emerald-600 font-bold" x-text="customerCsvCounts.new"></span> /
              補完 <span class="text-blue-600 font-bold" x-text="customerCsvCounts.merge"></span> /
              スキップ <span class="text-slate-500 font-bold" x-text="customerCsvCounts.skip"></span>
              <span x-show="customerCsvCounts.warnings > 0" class="ml-2">
                / ⚠️ <span class="text-amber-600 font-bold" x-text="customerCsvCounts.warnings"></span>
              </span>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
              <label class="flex items-center gap-1 text-xs text-slate-600">
                <input type="checkbox" x-model="customerCsvShowWarningsOnly">
                要確認のみ表示
              </label>
              <button @click="setAllCustomerAction('skip')"
                      class="text-xs px-2 py-1 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded">全てスキップ</button>
            </div>
          </div>

          <div class="overflow-x-auto max-h-96 overflow-y-auto border border-slate-200 rounded">
            <table class="w-full text-xs">
              <thead class="bg-slate-100 text-slate-600 sticky top-0">
                <tr>
                  <th class="px-2 py-1 text-left">#</th>
                  <th class="px-2 py-1 text-left">顧客No</th>
                  <th class="px-2 py-1 text-left">氏名</th>
                  <th class="px-2 py-1 text-left">ふりがな</th>
                  <th class="px-2 py-1 text-left">電話</th>
                  <th class="px-2 py-1 text-left">生年月日</th>
                  <th class="px-2 py-1 text-left">マッチ状況</th>
                  <th class="px-2 py-1 text-left">処理</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(row, idx) in filteredCustomerCsvRows" :key="row._idx">
                  <tr class="border-t border-slate-100"
                      :class="{
                        'bg-emerald-50': row.action === 'new' && !row.matchWarning,
                        'bg-blue-50': row.action.startsWith('merge'),
                        'bg-amber-50': row.matchWarning && row.action !== 'skip',
                        'bg-slate-100 opacity-60': row.action === 'skip'
                      }">
                    <td class="px-2 py-1 text-slate-400" x-text="row._idx + 1"></td>
                    <td class="px-2 py-1" x-text="row.customerNo || '-'"></td>
                    <td class="px-2 py-1 font-medium" x-text="row.name"></td>
                    <td class="px-2 py-1 text-slate-600" x-text="row.furigana || '-'"></td>
                    <td class="px-2 py-1 text-slate-600" x-text="row.phone1 || '-'"></td>
                    <td class="px-2 py-1 text-slate-600" x-text="row.birthDate || '-'"></td>
                    <td class="px-2 py-1">
                      <div x-show="row.safeAutoMerge" class="text-blue-600">
                        ✓ 識別情報一致
                      </div>
                      <div x-show="row.matchWarning"
                           class="text-amber-700 font-medium"
                           x-text="row.matchWarning"></div>
                      <div x-show="!row.matchedExisting && !row.matchWarning" class="text-slate-400">マッチなし</div>
                      <!-- 同名候補リスト(複数いる時 or 警告ある時に表示) -->
                      <div x-show="row.candidateList && row.candidateList.length > 0"
                           class="mt-1 text-xs text-slate-500">
                        候補:
                        <template x-for="(c, ci) in row.candidateList" :key="c.id">
                          <div class="ml-2">
                            ・<span x-text="c.name"></span>
                            <span x-show="c.phone1" class="text-slate-400"> / 📞<span x-text="c.phone1"></span></span>
                            <span x-show="c.birthDate" class="text-slate-400"> / 🎂<span x-text="c.birthDate"></span></span>
                            <span x-show="!c.phone1 && !c.birthDate" class="text-slate-400">(識別情報なし)</span>
                          </div>
                        </template>
                      </div>
                    </td>
                    <td class="px-2 py-1">
                      <select x-model="row.action"

      const { db, collection, query, orderBy, onSnapshot } = window._fb;

    // ============================================
    // ===== 🆕 v0.6: 顧客CSV取込 =====
    // ============================================

    onCustomerCsvSelected(event) {
      const f = event.target.files && event.target.files[0];
      this.customerCsvFile = f || null;
      this.customerCsvRows = [];
      this.customerCsvError = '';
      this.customerCsvProgress = '';
    },

    resetCustomerCsv() {
      this.customerCsvFile = null;
      this.customerCsvRows = [];
      this.customerCsvError = '';
      this.customerCsvProgress = '';
      // ファイル選択UIもクリア
      const inputs = document.querySelectorAll('input[type="file"][accept*="csv"]');
      inputs.forEach(i => { i.value = ''; });
    },

    async parseCustomerCsv() {
      if (!this.customerCsvFile) return;
      this.customerCsvError = '';
      this.customerCsvRows = [];
      this.customerCsvProgress = '読み込み中...';

      try {
        const buf = await this.customerCsvFile.arrayBuffer();
        let text = '';

        if (this.customerCsvEncoding === 'utf-8') {
          text = new TextDecoder('utf-8').decode(buf);
        } else if (this.customerCsvEncoding === 'shift-jis') {
          text = new TextDecoder('shift-jis').decode(buf);
        } else {
          // auto: まずShift-JISで試して、文字化けが多そうならUTF-8
          const sjis = new TextDecoder('shift-jis', { fatal: false }).decode(buf);
          const utf8 = new TextDecoder('utf-8', { fatal: false }).decode(buf);
          // \uFFFD(置換文字)が少ない方を採用
          const sjisBad = (sjis.match(/\uFFFD/g) || []).length;
          const utf8Bad = (utf8.match(/\uFFFD/g) || []).length;
          text = sjisBad <= utf8Bad ? sjis : utf8;
        }

        // BOM除去
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

        const rows = this.parseCsvText(text);
        if (rows.length < 2) {
          this.customerCsvError = 'データ行が見つかりません(ヘッダー+1行以上が必要)';
          this.customerCsvProgress = '';
          return;
        }

        const header = rows[0].map(h => (h || '').trim());
        const colIndex = (names) => {
          for (const n of names) {
            const idx = header.findIndex(h => h === n || h.includes(n));
            if (idx >= 0) return idx;
          }
          return -1;
        };

        // 列マッピング(囲い込み職人想定)
        const map = {
          customerNo: colIndex(['顧客No', '顧客番号', 'No']),
          name:       colIndex(['顧客名', '氏名', '名前']),
          furigana:   colIndex(['ふりがな', 'フリガナ', 'カナ']),
          gender:     colIndex(['性別']),
          postalCode: colIndex(['郵便番号', '〒']),
          address1:   colIndex(['住所１', '住所1', '住所']),
          address2:   colIndex(['住所２', '住所2']),
          phone1:     colIndex(['電話-1', '電話1', '電話']),
          phone2:     colIndex(['電話-2', '電話2', '携帯']),
          email:      colIndex(['メールアドレス', 'メール', 'Email', 'E-mail']),
          birthDate:  colIndex(['生年月日', '誕生日']),
          age:        colIndex(['年齢']),
          ageGroup:   colIndex(['年代']),
          occupation: colIndex(['職業']),
          motive:     colIndex(['動機', 'きっかけ']),
          lastVisitDate: colIndex(['最終来店日', '最終来院日']),
          totalVisitCount: colIndex(['来店回数', '来院回数', '総来店数'])
        };

        if (map.name < 0) {
          this.customerCsvError = '「顧客名」列が見つかりません。CSVのヘッダー行を確認してください';
          this.customerCsvProgress = '';
          return;
        }

        // 既存customers_temp 名前→候補配列マップ(同姓同名対応)
        const existingByName = {};
        for (const c of this.customersTemp) {
          if (c.name) {
            const key = c.name.trim();
            if (!existingByName[key]) existingByName[key] = [];
            existingByName[key].push(c);
          }
        }

        // 電話番号正規化(ハイフン・全角・空白除去)
        const normPhone = (p) => (p || '').replace(/[\s\-－—ー]/g, '').replace(/[０-９]/g, ch =>
          String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
        );

        const out = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || r.length === 0 || r.every(c => !c)) continue;
          const get = (key) => map[key] >= 0 ? (r[map[key]] || '').trim() : '';

          const name = get('name');
          if (!name) continue;  // 名前なし行はスキップ

          const phone1 = get('phone1');
          const phone2 = get('phone2');
          const birthDate = this.normalizeDate(get('birthDate'));

          // 同名候補を取得
          const candidates = existingByName[name] || [];
          const phoneN = normPhone(phone1);
          const phone2N = normPhone(phone2);

          // 候補ごとに識別情報の一致度を判定
          const scoredCandidates = candidates.map(c => {
            const cPhone1 = normPhone(c.phone1);
            const cPhone2 = normPhone(c.phone2);
            const cBirth = c.birthDate || '';
            // 一致判定
            const phoneMatch = phoneN && (phoneN === cPhone1 || phoneN === cPhone2)
                            || phone2N && (phone2N === cPhone1 || phone2N === cPhone2);
            const birthMatch = birthDate && cBirth && birthDate === cBirth;
            return { candidate: c, phoneMatch, birthMatch };
          });

          // 自動マージ可否判定(極力ミスを避ける厳しめ条件)
          // ・候補ゼロ → 新規
          // ・候補1人 かつ 電話or生年月日が一致 → 自動merge(安全)
          // ・候補1人 かつ 識別情報なし(既存temp自動生成) → 要手動確認
          // ・候補1人 かつ 識別情報あるが不一致 → 別人の可能性大、要手動確認
          // ・候補2人以上 → 必ず要手動確認
          let action = 'new';
          let matchedId = null;
          let matchedName = '';
          let matchWarning = '';
          let safeAutoMerge = false;

          if (candidates.length === 0) {
            action = 'new';
          } else if (candidates.length === 1) {
            const sc = scoredCandidates[0];
            const c = sc.candidate;
            const cHasIdInfo = normPhone(c.phone1) || normPhone(c.phone2) || c.birthDate;

            if (sc.phoneMatch || sc.birthMatch) {
              // 識別情報一致 → 安全に自動merge
              action = 'merge:' + c.id;
              matchedId = c.id;
              matchedName = c.name;
              safeAutoMerge = true;
            } else if (!cHasIdInfo) {
              // 既存に識別情報なし(自動生成temp) → 同名1人なので比較的安全だが念のため警告
              action = 'new';  // ⚠️ デフォルト新規(安全側)
              matchedId = c.id;
              matchedName = c.name;
              matchWarning = '同名1人(既存に識別情報なし) — 要確認';
            } else {
              // 識別情報あるが不一致 → 別人の可能性
              action = 'new';
              matchedId = c.id;
              matchedName = c.name;
              matchWarning = '同名だが電話/生年月日が不一致 — 別人の可能性';
            }
          } else {
            // 同姓同名2人以上 → 絶対に自動マージしない
            action = 'new';
            matchWarning = `⚠️ 同名${candidates.length}人 — 必ず手動確認`;
          }

          out.push({
            _idx: out.length,  // 元配列順インデックス(フィルタ表示でも保持)
            customerNo: get('customerNo'),
            name: name,
            furigana: this.toHiragana(get('furigana')),
            gender: get('gender'),
            postalCode: get('postalCode'),
            address1: get('address1'),
            address2: get('address2'),
            phone1: phone1,
            phone2: phone2,
            email: get('email'),
            birthDate: birthDate,
            age: this.toNumber(get('age')),
            ageGroup: get('ageGroup'),
            occupation: get('occupation'),
            motive: get('motive'),
            lastVisitDate: this.normalizeDate(get('lastVisitDate')),
            totalVisitCount: this.toNumber(get('totalVisitCount')),
            // プレビュー用
            matchedExisting: candidates.length > 0,
            matchedId: matchedId,
            matchedName: matchedName,
            matchWarning: matchWarning,
            safeAutoMerge: safeAutoMerge,
            // 同名候補リスト(手動選択用)
            candidateList: candidates.map(c => ({
              id: c.id,
              name: c.name,
              phone1: c.phone1 || '',
              phone2: c.phone2 || '',
              birthDate: c.birthDate || '',
              address1: c.address1 || ''
            })),
            action: action
          });
        }

        this.customerCsvRows = out;
        this.customerCsvProgress = `${out.length}件読み込み完了`;
      } catch (err) {
        console.error(err);
        this.customerCsvError = '読み込みエラー: ' + err.message;
        this.customerCsvProgress = '';
      }
    },

    // 簡易CSVパーサ(ダブルクォート対応)
    parseCsvText(text) {
      const rows = [];
      let cur = [];
      let cell = '';
      let inQuote = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuote) {
          if (ch === '"') {
            if (text[i + 1] === '"') { cell += '"'; i++; }
            else inQuote = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') inQuote = true;
          else if (ch === ',') { cur.push(cell); cell = ''; }
          else if (ch === '\r') { /* skip */ }
          else if (ch === '\n') { cur.push(cell); rows.push(cur); cur = []; cell = ''; }
          else cell += ch;
        }
      }
      if (cell.length > 0 || cur.length > 0) { cur.push(cell); rows.push(cur); }
      return rows;
    },

    // カタカナ→ひらがな(囲い込み職人がカタカナで出力する場合に対応)
    toHiragana(s) {
      if (!s) return '';
      return s.replace(/[\u30A1-\u30F6]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    },

    toNumber(s) {
      if (!s) return null;
      const n = parseInt(String(s).replace(/[^\d]/g, ''), 10);
      return isNaN(n) ? null : n;
    },

    // 日付正規化: "2024/3/5", "2024-3-5", "S50.4.1" 等 → "YYYY-MM-DD" or null
    normalizeDate(s) {
      if (!s) return null;
      s = s.trim();
      // YYYY-MM-DD or YYYY/MM/DD or YYYY.MM.DD
      let m = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
      if (m) {
        return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      }
      // 和暦は今回スキップ(必要なら拡張)
      return null;
    },

    setAllCustomerAction(action) {
      // 安全のため「全て新規」「全て補完」は廃止。「全てスキップ」のみ提供。
      // 各行の判断は手動で行う。
      if (action !== 'skip') return;
      for (const r of this.customerCsvRows) {
        r.action = 'skip';
      }
    },

    get filteredCustomerCsvRows() {
      if (this.customerCsvShowWarningsOnly) {
        return this.customerCsvRows.filter(r => r.matchWarning);
      }
      return this.customerCsvRows;
    },

    get customerCsvCounts() {
      const c = { new: 0, merge: 0, skip: 0, warnings: 0 };
      for (const r of this.customerCsvRows) {
        if (r.action === 'new') c.new++;
        else if (r.action && r.action.startsWith('merge')) c.merge++;
        else c.skip++;
        // 要確認警告(処理に関わらずカウント)
        if (r.matchWarning) c.warnings++;
      }
      return c;
    },

    async executeCustomerCsv() {
      if (this.customerCsvRows.length === 0) return;
      const counts = this.customerCsvCounts;
      const total = counts.new + counts.merge;
      if (total === 0) return;

      // 警告行が残っているかチェック
      const remainingWarnings = this.customerCsvRows.filter(r =>
        r.matchWarning && r.action !== 'skip'
      ).length;

      let warnMsg = '';
      if (remainingWarnings > 0) {
        warnMsg = `\n\n⚠️ 注意: ${remainingWarnings}件の要確認行がスキップ以外になっています。\nこれらは別人の可能性があります。本当に投入しますか?`;
      }

      if (!confirm(`新規追加 ${counts.new}件 / 既存補完 ${counts.merge}件 を投入します。${warnMsg}`)) return;

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.customerCsvImporting = true;
      let success = 0;
      let errors = 0;

      try {
        const target = this.customerCsvRows.filter(r => r.action !== 'skip');
        for (let i = 0; i < target.length; i++) {
          const r = target[i];
          this.customerCsvProgress = `投入中... ${i + 1} / ${target.length}`;

          try {
            const payload = this.buildCustomerPayload(r);
            let ref;
            // action は 'new' or 'merge:<id>' の形式
            if (r.action && r.action.startsWith('merge:')) {
              const targetId = r.action.substring(6);  // 'merge:'を除去
              if (!targetId) {
                throw new Error('merge先IDが不正');
              }
              ref = doc(db, 'customers_temp', targetId);
              payload.updatedAt = serverTimestamp();
            } else {
              ref = doc(collection(db, 'customers_temp'));
              payload.createdAt = serverTimestamp();
              payload.updatedAt = serverTimestamp();
              payload.source = 'csv-kakoikomi';
            }
            // mergeの場合は補完(空文字を上書きしないよう、空はpayloadから除外済み)
            await setDoc(ref, payload, { merge: true });
            success++;
          } catch (err) {
            console.error('行' + (i + 1) + 'エラー', err);
            errors++;
          }
        }

        this.customerCsvProgress = `完了: 成功 ${success}件 / エラー ${errors}件`;
        alert(`投入完了\n成功: ${success}件\nエラー: ${errors}件`);
        if (errors === 0) {
          // 成功時は2秒後にプレビューをクリア
          setTimeout(() => this.resetCustomerCsv(), 2000);
        }
      } catch (err) {
        console.error(err);
        alert('投入処理エラー: ' + err.message);
      } finally {
        this.customerCsvImporting = false;
      }
    },

    // CSV行 → Firestore保存形式
    // mergeでもnewでも同じビルダー(空フィールドは除外して上書き防止)
    buildCustomerPayload(r) {

    async findTestData() {
      // 検索基準
      const TEST_NOS = ['1001','1002','1003','1004','1005','1006','1007','1008','1009','1010'];
      const TEST_NAMES = ['青山太郎','飯田花子','上野次郎','榎本美咲','小田俊夫','加藤健太','木村花子','佐々木太一','鈴木愛子'];
      
      // customers_temp 全件から条件マッチを抽出
      const matched = this.customersTemp.filter(c => {
        // 条件①: importedFrom が 'kakoikomi' であること
        if (c.importedFrom !== 'kakoikomi') return false;
        // 条件②: customerNo が 1001〜1010(4桁文字列)であること
        if (!TEST_NOS.includes(c.customerNo)) return false;
        // 条件③: name がテスト架空名のいずれかであること
        if (!TEST_NAMES.includes(c.name)) return false;
        return true;
      });
      
      this.testDataFound = matched;
      this.testDeleteConfirm = '';
      console.log('🔍 テストデータ検索結果:', matched.length, '件', matched);
    },
    
    async deleteTestData() {
      // 入力検証
      if (this.testDeleteConfirm !== 'DELETE') {
        alert('「DELETE」と正確に入力してください');
        return;
      }
      if (!this.testDataFound || this.testDataFound.length === 0) {
        alert('削除対象がありません');
        return;
      }
      
      // 最終確認(三段階目)
      const targets = this.testDataFound.map(d => `${d.customerNo} ${d.name}`).join('\n');
      if (!confirm(`以下の ${this.testDataFound.length} 件を本当に削除しますか?\n\n${targets}\n\nこの操作は取り消せません。`)) {
        return;
      }
      
      this.testDataDeleting = true;
      const { db, doc, deleteDoc } = window._fb;
      let success = 0, errors = 0;
      
      try {
        for (const c of this.testDataFound) {
          try {
            // 削除前の二重チェック(再度3条件確認)
            if (c.importedFrom !== 'kakoikomi') {
              console.warn('⚠️ スキップ(importedFrom不一致):', c.id);
              errors++;
              continue;
            }
            if (!['1001','1002','1003','1004','1005','1006','1007','1008','1009','1010'].includes(c.customerNo)) {
              console.warn('⚠️ スキップ(customerNo不一致):', c.id);
              errors++;
              continue;
            }
            if (!['青山太郎','飯田花子','上野次郎','榎本美咲','小田俊夫','加藤健太','木村花子','佐々木太一','鈴木愛子'].includes(c.name)) {
              console.warn('⚠️ スキップ(name不一致):', c.id);
              errors++;
              continue;
            }
            // 削除実行
            await deleteDoc(doc(db, 'customers_temp', c.id));
            success++;
            console.log('✓ 削除:', c.customerNo, c.name);
          } catch (e) {
            console.error('削除エラー:', c.id, e);
            errors++;
          }
        }
        
        alert(`削除完了\n成功: ${success} 件\nエラー: ${errors} 件`);
        // 状態リセット
        this.testDataFound = null;
        this.testDeleteConfirm = '';
      } finally {
        this.testDataDeleting = false;
      }

    parseSalesBulk() {
      this.salesBulkError = '';
      this.salesBulkPreview = [];

      let parsed;
      try {
        parsed = JSON.parse(this.salesBulkText);
      } catch (e) {
        this.salesBulkError = 'JSON parseエラー: ' + e.message;
        return;
      }

      if (!Array.isArray(parsed)) {
        this.salesBulkError = 'JSONは配列である必要があります';
        return;
      }

      this.salesBulkPreview = parsed.map((item) => {
        const out = {
          date: item.date || '',
          productName: item.productName || '',
          quantity: Number(item.quantity) || 0,
          unitPrice: Number(item.unitPrice) || 0,
          amount: 0,
          paymentMethod: item.paymentMethod || '現金',
          customerName: item.customerName || '',
          staff: item.staff || 'TAK',
          isSample: !!item.isSample,
          note: item.note || '',
          productId: null,
          error: ''
        };

        if (!out.date) out.error = '日付なし';
        else if (!out.productName) out.error = '商品名なし';
        else if (out.quantity <= 0) out.error = '数量不正';

        if (!out.error) {
          const product = this.products.find(p => p.name === out.productName);
          if (!product) {
            out.error = `商品マスターに存在しない: ${out.productName}`;
          } else {
            out.productId = product.id;
            if (out.unitPrice === 0) out.unitPrice = Number(product.sellingPrice) || 0;
          }
        }

        if (out.isSample) {
          out.amount = 0;
        } else if (item.amount !== undefined && item.amount !== null) {
          out.amount = Number(item.amount) || 0;
        } else {
          out.amount = out.unitPrice * out.quantity;
        }

        return out;
      });
    },

    async executeSalesBulk() {
      if (this.salesBulkPreview.length === 0) return;
      if (this.salesBulkPreview.some(x => x.error)) {
        alert('エラーのある行があります。修正してから再実行してください');
        return;

      const { db, collection, doc, setDoc, serverTimestamp } = window._fb;
      this.saving = true;
      let success = 0;

      try {

        console.error(e);

    async autoTransferSampleCost() {
      const month = this.expenseFilterMonth || this.currentMonthStr();
      if (!month) {
        alert('表示月を選択してください');
        return;
      }

      const monthSales = this.sales.filter(s =>
        s.isSample && (s.date || '').startsWith(month)
      );

      if (monthSales.length === 0) {
        alert(`${month} にサンプル提供記録がありません`);
        return;
      }

      const breakdown = {};
      let totalCost = 0;
      for (const s of monthSales) {
        const prod = this.products.find(p => p.id === s.productId || p.name === s.productName);
        const dealerPrice = prod ? (Number(prod.dealerPrice) || 0) : 0;
        const qty = Number(s.quantity) || 0;
        const cost = dealerPrice * qty;
        const key = s.productName || '(不明)';
        if (!breakdown[key]) breakdown[key] = { qty: 0, cost: 0 };
        breakdown[key].qty += qty;
        breakdown[key].cost += cost;
        totalCost += cost;
      }

      if (totalCost === 0) {
        alert('原価情報が登録されていない商品ばかりです。商品マスターで「代理店価格」を設定してください');
        return;
      }

      const noteParts = Object.entries(breakdown)
        .map(([name, v]) => `${name}×${v.qty}(¥${v.cost.toLocaleString()})`)
        .join(' / ');
      const noteText = `[自動]サンプル原価 ${noteParts}`;

      const existing = this.expenses.find(e => e.isAutoSample && e.sampleMonth === month);

      const msg = existing
        ? `${month} の自動転記レコードが既にあります(¥${(existing.amount||0).toLocaleString()})。\n¥${totalCost.toLocaleString()} で上書きしますか?`
        : `${month} のサンプル原価 ¥${totalCost.toLocaleString()} を販促費として転記しますか?\n\n${noteText}`;

      if (!confirm(msg)) return;

      const { db, collection, doc, setDoc, deleteDoc, serverTimestamp } = window._fb;
      this.saving = true;

      try {
        if (existing) {
          await deleteDoc(doc(db, 'expenses', existing.id));
        }

        const lastDay = this.lastDayOfMonth(month);

        const ref = doc(collection(db, 'expenses'));
        await setDoc(ref, {
          date: lastDay,
          category: '販促費',
          amount: totalCost,
          paymentMethod: 'その他',
          note: noteText,
          isAutoSample: true,
          sampleMonth: month,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        this.expenseMessage = `サンプル原価 ¥${totalCost.toLocaleString()} を転記しました`;
        this.expenseMessageType = 'ok';
        setTimeout(() => this.expenseMessage = '', 4000);
      } catch (err) {
        console.error(err);
        alert('転記エラー: ' + err.message);
      } finally {
        this.saving = false;
      }
    },

    lastDayOfMonth(yyyymm) {
      const [y, m] = yyyymm.split('-').map(Number);
      const last = new Date(y, m, 0).getDate();
      return `${y}-${String(m).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
    },

    async loadCashbookCarry(month) {
      if (!month) return;
      const { db, doc, getDoc, setDoc, serverTimestamp } = window._fb;
      try {
        const ref = doc(db, 'cashbook_carry', month);
        const snap = await getDoc(ref);

        if (snap.exists() && snap.data().isManual === true) {
          this.cashbookCarry = Number(snap.data().carryAmount) || 0;
          this.cashbookCarryIsManual = true;
          return;

        const prev = this.prevMonth(month);
        const prevSnap = await getDoc(doc(db, 'cashbook_carry', prev));
        if (prevSnap.exists()) {
          const prevSummary = this.calcMonthCashSummary(prev);
          const carry = (Number(prevSnap.data().carryAmount) || 0)
                      + prevSummary.income - prevSummary.expense;

          const oldCarry = snap.exists() ? (Number(snap.data().carryAmount) || 0) : null;
          if (oldCarry !== carry) {
            await setDoc(ref, {
              yearMonth: month,
              carryAmount: carry,
              isManual: false,
              updatedAt: serverTimestamp(),
              ...(snap.exists() ? {} : { createdAt: serverTimestamp() })
            }, { merge: true });
          }
          this.cashbookCarry = carry;
          this.cashbookCarryIsManual = false;
        } else {
          this.cashbookCarry = 0;
          this.cashbookCarryIsManual = false;
        }
      } catch (err) {
        console.error(err);
        this.cashbookMessage = '繰越読込エラー: ' + err.message;
        this.cashbookMessageType = 'err';
      }
    },

    async saveCashbookCarryManual() {
      if (!this.cashbookMonth) return;
      const { db, doc, setDoc, serverTimestamp } = window._fb;
      try {
        const value = Number(this.cashbookCarryEditValue) || 0;
        await setDoc(doc(db, 'cashbook_carry', this.cashbookMonth), {
          yearMonth: this.cashbookMonth,
          carryAmount: value,
          isManual: true,
          updatedAt: serverTimestamp()
        }, { merge: true });
        this.cashbookCarry = value;
        this.cashbookCarryIsManual = true;
        this.cashbookCarryEditing = false;
        this.cashbookMessage = '繰越を更新しました';
        this.cashbookMessageType = 'ok';
        setTimeout(() => this.cashbookMessage = '', 2500);
      } catch (err) {

    startEditCarry() {

      this.cashbookCarryEditing = true;

    prevMonth(yyyymm) {
      const [y, m] = yyyymm.split('-').map(Number);
      const d = new Date(y, m - 2, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    },

    calcMonthCashSummary(month) {
      let income = 0, expense = 0;
      for (const v of this.visits) {
        if ((v.date || '').startsWith(month) && v.paymentMethod === '現金') {
          income += Number(v.amount) || 0;
        }
      }
      for (const s of this.sales) {
        if ((s.date || '').startsWith(month) && s.paymentMethod === '現金' && !s.isSample) {
          income += Number(s.amount) || 0;
        }
      }
      for (const e of this.expenses) {
        if ((e.date || '').startsWith(month) && e.paymentMethod === '現金') {
          expense += Number(e.amount) || 0;
        }
      }
      for (const a of this.ads) {
        if ((a.date || '').startsWith(month) && a.paymentMethod === '現金') {
          expense += Number(a.amount) || 0;
        }
      }
      // 🆕 v0.5: 銀行預け入れも貸方として加算
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(month)) {
          expense += Number(d.amount) || 0;
        }
      }
      return { income, expense };
    },

    get cashbookEntries() {
      const m = this.cashbookMonth;
      if (!m) return [];
      const list = [];

      for (const v of this.visits) {
        if ((v.date || '').startsWith(m) && v.paymentMethod === '現金') {
          list.push({
            date: v.date,
            type: '来院',
            desc: `${v.customerName}(${v.menu || '-'})`,
            income: Number(v.amount) || 0,
            expense: 0
          });
        }
      }
      for (const s of this.sales) {
        if ((s.date || '').startsWith(m) && s.paymentMethod === '現金' && !s.isSample) {
          list.push({
            date: s.date,
            type: '物販',
            desc: `${s.productName} × ${s.quantity}`,
            income: Number(s.amount) || 0,
            expense: 0
          });
        }
      }
      for (const e of this.expenses) {
        if ((e.date || '').startsWith(m) && e.paymentMethod === '現金') {
          list.push({
            date: e.date,
            type: '経費',
            desc: `${e.category}${e.note ? ' / ' + e.note : ''}`,
            income: 0,
            expense: Number(e.amount) || 0
          });
        }
      }
      for (const a of this.ads) {
        if ((a.date || '').startsWith(m) && a.paymentMethod === '現金') {
          list.push({
            date: a.date,
            type: '広告費',
            desc: `${a.category}${a.note ? ' / ' + a.note : ''}`,
            income: 0,
            expense: Number(a.amount) || 0
          });
        }
      }
      // 🆕 v0.5: 銀行預け入れ
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(m)) {
          list.push({
            date: d.date,
            type: '預入',
            desc: `現金入金${d.bankName ? '(' + d.bankName + ')' : ''}${d.note ? ' / ' + d.note : ''}`,
            income: 0,
            expense: Number(d.amount) || 0
          });
        }
      }

      list.sort((x, y) => (x.date < y.date ? -1 : x.date > y.date ? 1 : 0));
      let bal = Number(this.cashbookCarry) || 0;
      for (const item of list) {
        bal = bal + item.income - item.expense;
        item.balance = bal;
      }
      return list;
    },

    get cashbookSummary() {
      const m = this.cashbookMonth;
      const sum = this.calcMonthCashSummary(m);
      return {
        income: sum.income,
        expense: sum.expense,
        endBalance: (Number(this.cashbookCarry) || 0) + sum.income - sum.expense
      };
    },

    get cashbookByCategory() {
      const m = this.cashbookMonth;
      const incomeMap = { '来院売上(現金)': 0, '物販売上(現金)': 0 };
      const expenseMap = {};

      for (const v of this.visits) {
        if ((v.date || '').startsWith(m) && v.paymentMethod === '現金') {
          incomeMap['来院売上(現金)'] += Number(v.amount) || 0;
        }
      }
      for (const s of this.sales) {
        if ((s.date || '').startsWith(m) && s.paymentMethod === '現金' && !s.isSample) {
          incomeMap['物販売上(現金)'] += Number(s.amount) || 0;
        }
      }
      for (const e of this.expenses) {
        if ((e.date || '').startsWith(m) && e.paymentMethod === '現金') {
          const k = e.category || '(未分類)';
          expenseMap[k] = (expenseMap[k] || 0) + (Number(e.amount) || 0);
        }
      }
      for (const a of this.ads) {
        if ((a.date || '').startsWith(m) && a.paymentMethod === '現金') {
          const k = `広告費 / ${a.category}`;
          expenseMap[k] = (expenseMap[k] || 0) + (Number(a.amount) || 0);
        }
      }
      // 🆕 v0.5: 銀行預け入れ
      for (const d of this.cashDeposits) {
        if ((d.date || '').startsWith(m)) {
          const k = `現金入金${d.bankName ? '(' + d.bankName + ')' : ''}`;
          expenseMap[k] = (expenseMap[k] || 0) + (Number(d.amount) || 0);
        }
      }

      const incomeRows = Object.entries(incomeMap)
        .filter(([_, v]) => v > 0)
        .map(([name, amount]) => ({ name, amount }));
      const expenseRows = Object.entries(expenseMap)
        .map(([name, amount]) => ({ name, amount }))
        .sort((a, b) => b.amount - a.amount);

      return { incomeRows, expenseRows };
    },

    get pendingExports() {
      const today = new Date();
      const exportedSet = new Set(this.monthlyExports.map(h => h.yearMonth));
      const pending = [];
      // 過去6ヶ月をチェック(当月は除外)
      for (let i = 1; i <= 6; i++) {

        const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (!exportedSet.has(ym)) pending.push(ym);

      return pending.slice(0, 3);

    async generateMonthEndZip() {
      if (this.isGeneratingExcel) return;
      if (typeof XLSX === 'undefined') {
        alert('SheetJS が読み込まれていません。ページを再読み込みしてください。');

      }
      if (typeof JSZip === 'undefined') {
        alert('JSZip が読み込まれていません。ページを再読み込みしてください。');

      }

      this.isGeneratingExcel = true;
      this.excelGenerationLog = [];
      const ym = this.exportMonth;
      const log = (msg) => {
        this.excelGenerationLog.push(msg);
        console.log(msg);
      };

      try {
        log(`📂 ${ym} のデータを集計中...`);
        const data = this.collectMonthEndData(ym);
        log(`  ✓ 来院記録: ${data.visits.length}件`);
        log(`  ✓ 物販記録: ${data.sales.length}件`);
        log(`  ✓ 経費: ${data.expenses.length}件`);
        log(`  ✓ 広告費: ${data.ads.length}件`);
        log(`  ✓ 銀行預入: ${data.cashDeposits.length}件`);

        log('📊 現金出納帳を生成中...');
        const cashbookWb = this.buildCashbookWorkbook(ym, data);
        const cashbookBuf = XLSX.write(cashbookWb, { bookType: 'xlsx', type: 'array' });

        log('📦 物販管理表を生成中...');
        const salesWb = this.buildSalesWorkbook(ym, data);
        const salesBuf = XLSX.write(salesWb, { bookType: 'xlsx', type: 'array' });

        log('📣 広告費内訳を生成中...');

    collectMonthEndData(ym) {
      const visits = this.visits.filter(v => (v.date || '').startsWith(ym));
      const sales = this.sales.filter(s => (s.date || '').startsWith(ym));
      const expenses = this.expenses.filter(e => (e.date || '').startsWith(ym));
      const ads = this.ads.filter(a => (a.date || '').startsWith(ym));
      const cashDeposits = this.cashDeposits.filter(d => (d.date || '').startsWith(ym));

      // 月初繰越を計算(画面の cashbookCarry とは別ロジック - 対象月の値を使用)
      // ここでは現状の cashbookMonth が ym と異なる可能性があるので、再計算する必要あり
      // 簡易実装: 月初繰越は対象月のFirestoreから取得済みの値を使う
      // → 異なる月を出力する場合に正しい繰越が必要なので、計算ロジック実装

      let openingBalance = 0;
      // 同じ月なら現在の値、異なる月なら自前で計算
      if (ym === this.cashbookMonth) {
        openingBalance = Number(this.cashbookCarry) || 0;
      } else {
        // 過去全月の収支を累積計算(簡易)
        const allMonths = this.collectAllMonthsBefore(ym);
        let bal = 0;
        for (const prevYm of allMonths) {
          const sum = this.calcMonthCashSummary(prevYm);
          bal += sum.income - sum.expense;
        }
        openingBalance = bal;
      }

      // 前月以前の物販履歴(在庫繰越用)
      const prevSales = this.sales.filter(s => {
        const d = s.date || '';
        return d && d < `${ym}-01`;
      });

      const [y, m] = ym.split('-').map(Number);
      const lastDay = new Date(y, m, 0).getDate();

      return {
        visits, sales, expenses, ads, cashDeposits,
        products: this.products,
        prevSales,
        openingBalance,
        yearMonth: ym,
        lastDay
      };
    },

    collectAllMonthsBefore(ym) {
      // 全データから対象月より前のユニーク月を抽出
      const set = new Set();
      const addIfBefore = (date) => {
        if (!date) return;
        const m = date.substring(0, 7);
        if (m < ym) set.add(m);
      };
      this.visits.forEach(v => addIfBefore(v.date));
      this.sales.forEach(s => addIfBefore(s.date));
      this.expenses.forEach(e => addIfBefore(e.date));
      this.ads.forEach(a => addIfBefore(a.date));
      this.cashDeposits.forEach(d => addIfBefore(d.date));
      return Array.from(set).sort();
    },

    buildCashbookWorkbook(ym, data) {
      const [y, m] = ym.split('-').map(Number);
      const rows = [];
      rows.push([`${y}年${m}月 現金出納帳`, '', '', '', '', '', '', '']);
      rows.push(['伝票No', '年', '月', '日', '摘要', '借方金額', '貸方金額', '差引残高']);

      let balance = data.openingBalance;
      rows.push(['', y, m, 1, '繰越', '', '', balance]);

      const txns = [];

      // 来院(現金) - 日次集計、TAK/日向別
      const visitsByDate = {};
      data.visits.filter(v => v.paymentMethod === '現金').forEach(v => {
        const key = v.staff === '日向' ? `${v.date}|HINATA` : `${v.date}|TAK`;
        if (!visitsByDate[key]) visitsByDate[key] = 0;
        visitsByDate[key] += (v.amount || 0);
      });
      Object.entries(visitsByDate).forEach(([key, amount]) => {
        if (amount > 0) {
          const [date, staff] = key.split('|');
          const desc = staff === 'HINATA' ? 'インディバ施術(日向)' : '整体院現金売上(TAK)';
          txns.push({ date, type: 'income', desc, amount });
        }
      });

      // 物販(現金、サンプル除外) - 日次集計
      const salesByDate = {};
      data.sales.filter(s => s.paymentMethod === '現金' && !s.isSample).forEach(s => {
        if (!salesByDate[s.date]) salesByDate[s.date] = 0;
        salesByDate[s.date] += (s.amount || 0);
      });
      Object.entries(salesByDate).forEach(([date, amount]) => {
        if (amount > 0) {
          txns.push({ date, type: 'income', desc: '物販 現金売上 8%', amount });
        }
      });

      // 経費(現金、その他除外、自動転記サンプル除外) - 伝票No付き
      let receiptCounter = 0;
      const circledNumbers = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩',
                              '⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
      data.expenses
        .filter(e => e.paymentMethod === '現金' && !e.isAutoSample)
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''))
        .forEach(e => {
          const receiptNo = circledNumbers[receiptCounter] || `(${receiptCounter + 1})`;
          receiptCounter++;
          const desc = e.note ? `${e.category}(${e.note})` : e.category;
          txns.push({ date: e.date, type: 'expense', desc, amount: e.amount, receiptNo });
        });

      // 広告費(現金) - 通常はカードなのでほぼ空
      data.ads.filter(a => a.paymentMethod === '現金').forEach(a => {
        const desc = a.note ? `広告費(${a.category}/${a.note})` : `広告費(${a.category})`;
        txns.push({ date: a.date, type: 'expense', desc, amount: a.amount });
      });

      // 🆕 銀行預け入れ
      (data.cashDeposits || []).forEach(d => {
        const desc = d.bankName ? `現金入金(${d.bankName})` : '現金入金';
        txns.push({ date: d.date, type: 'expense', desc, amount: d.amount });
      });

      txns.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

      txns.forEach(t => {
        const day = parseInt((t.date || '').split('-')[2], 10);
        if (t.type === 'income') {
          balance += t.amount;
          rows.push([t.receiptNo || '', '', '', day, t.desc, t.amount, '', balance]);
        } else {
          balance -= t.amount;
          rows.push([t.receiptNo || '', '', '', day, t.desc, '', t.amount, balance]);
        }
      });

      rows.push(['', '', '', data.lastDay, '月末残高', '', '', balance]);

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        { wch: 8 }, { wch: 6 }, { wch: 5 }, { wch: 5 },
        { wch: 35 }, { wch: 12 }, { wch: 12 }, { wch: 12 }
      ];
      ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 7 } }];

      // 数値書式
      for (let r = 2; r < rows.length; r++) {
        ['F', 'G', 'H'].forEach(col => {
          const cellRef = `${col}${r + 1}`;
          if (ws[cellRef] && typeof ws[cellRef].v === 'number') {
            ws[cellRef].z = '#,##0';
          }
        });
      }

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `${y}年${m}月`);
      return wb;
    },

    buildSalesWorkbook(ym, data) {
      const [y, m] = ym.split('-').map(Number);
      const wb = XLSX.utils.book_new();
      const rows = [];
      rows.push([`${y}年${m}月 物販管理表`]);
      rows.push([]);

      const calcOpeningStock = (productId) => {
        const product = data.products.find(p => p.id === productId);
        if (!product) return 0;
        const initial = Number(product.initialStock) || 0;
        const consumed = data.prevSales
          .filter(s => s.productId === productId)
          .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
        return initial - consumed;
      };

      const activeProducts = data.products.filter(p => p.active !== false);

      activeProducts.forEach((product) => {
        rows.push([`■ ${product.name}`, '', '', `単価: ¥${(product.sellingPrice || 0).toLocaleString()}`]);
        rows.push(['日付', '月初在庫', '仕入', '販売(現金)', '販売(その他)', 'サンプル', '月末在庫', '担当者', '購入者']);

        const productSales = data.sales.filter(s => s.productId === product.id || s.productName === product.name);

        let currentStock = calcOpeningStock(product.id);
        let totalCash = 0, totalOther = 0, totalSample = 0;

        rows.push([`${m}/1`, currentStock, '', '', '', '', currentStock, '', '']);

        for (let day = 1; day <= data.lastDay; day++) {
          const dateStr = `${ym}-${String(day).padStart(2, '0')}`;
          const dailySales = productSales.filter(s => s.date === dateStr);
          if (dailySales.length === 0) continue;

          const cashQty = dailySales.filter(s => s.paymentMethod === '現金' && !s.isSample)
                                     .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
          const otherQty = dailySales.filter(s => s.paymentMethod !== '現金' && !s.isSample)
                                      .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
          const sampleQty = dailySales.filter(s => s.isSample)
                                       .reduce((sum, s) => sum + (Number(s.quantity) || 0), 0);
          const customers = [...new Set(dailySales.map(s => s.customerName).filter(Boolean))].join('/');
          const staff = [...new Set(dailySales.map(s => s.staff).filter(Boolean))].join('/');

          const openingDay = currentStock;
          currentStock = currentStock - cashQty - otherQty - sampleQty;

          rows.push([
            `${m}/${day}`, openingDay, '',
            cashQty || '', otherQty || '', sampleQty || '',
            currentStock, staff, customers
          ]);
          totalCash += cashQty;
          totalOther += otherQty;
          totalSample += sampleQty;
        }

        rows.push(['合計', '', '', totalCash, totalOther, totalSample, currentStock, '', '']);
        rows.push([]);
      });

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        { wch: 8 }, { wch: 10 }, { wch: 8 }, { wch: 10 },
        { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 20 }
      ];
      XLSX.utils.book_append_sheet(wb, ws, `${y}年${m}月`);
      return wb;
    },

    buildAdsWorkbook(ym, data) {
      const [y, m] = ym.split('-').map(Number);
      const rows = [];
      rows.push([`${y}年${m}月 広告費内訳(TAK)`]);
      rows.push([]);
      rows.push(['日付', '媒体', '内容', '金額', '支払方法', '備考']);

      const sortedAds = [...data.ads].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      sortedAds.forEach(ad => {
        const day = parseInt((ad.date || '').split('-')[2], 10);
        rows.push([
          `${m}/${day}`,
          ad.category || '',
          ad.note || '',
          Number(ad.amount) || 0,
          ad.paymentMethod || '',
          ''
        ]);
      });
      rows.push([]);
      rows.push(['【媒体別集計】']);
      rows.push(['媒体', '金額', '構成比']);
      const total = sortedAds.reduce((sum, a) => sum + (Number(a.amount) || 0), 0);
      const byCategory = {};
      sortedAds.forEach(a => {
        const k = a.category || '(未分類)';
        if (!byCategory[k]) byCategory[k] = 0;
        byCategory[k] += Number(a.amount) || 0;
      });
      Object.entries(byCategory)
        .sort((a, b) => b[1] - a[1])
        .forEach(([cat, amt]) => {
          const pct = total > 0 ? (amt / total * 100).toFixed(1) + '%' : '0%';
          rows.push([cat, amt, pct]);
        });
      rows.push(['合計', total, '100%']);

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        { wch: 8 }, { wch: 18 }, { wch: 25 }, { wch: 12 }, { wch: 10 }, { wch: 15 }
      ];
      ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];

      for (let r = 0; r < rows.length; r++) {
        ['B', 'D'].forEach(col => {
          const cellRef = `${col}${r + 1}`;
          if (ws[cellRef] && typeof ws[cellRef].v === 'number') {
            ws[cellRef].z = '#,##0';
          }
        });
      }

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `${y}年${m}月`);
      return wb;
    },

    async recordExportHistory(ym) {
      const { db, doc, setDoc, serverTimestamp } = window._fb;
      await setDoc(doc(db, 'monthlyExports', ym), {
        yearMonth: ym,
        exportedAt: serverTimestamp(),
        fileNames: [
          `${ym}_現金出納帳.xlsx`,
          `${ym}_物販管理表.xlsx`,
          `${ym}_広告費内訳.xlsx`
        ]
      }, { merge: true });
    }

  };
}
</script>
